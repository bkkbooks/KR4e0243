body:
  text: 茅簷集别集類五明提要臣等謹案茅簷集八巻明魏學洢撰學洢字子敬嘉善人大中長子也大中忤閹被逮學洢微服變姓名匿定興鹿善繼家萬計營救不可得柩歸之後竟以毁卒世稱忠臣孝子萃于一門事迹具明史大中傳諸書所載亦大概相近然學洢尚有老母而為無益之死或頗疑其過中今觀集中與潘茂莊書曰追比方始洢将就浙獄矣又辭里中父老書曰目今公差来捉且夕将死家門傾覆無可復言然則大中没後所謂坐受楊鎬熊廷弼賄三千三百兩者所司仍追呼于家學洢積憂積瘁于前積痛于後又重以閹黨之威虐數者交廹乃無生理非真徒以一瞑不視蹈滅性之戒故學洢之孝在于大中被禍之日竭力殫心蹈危履險出萬死以冀一生今誦其與人書至性惻怛足以感天地而動鬼神而錢士升等作序惟欲以隕身殉父稱之遂諱其追逮之事淺之乎知學洢矣其集一刋于錢棻棻大中門人也再刋于其弟學濓是為今本學濓頹其家聲論者不能以大中之故曲為寛假以此益見學洢之不朽由所自立不以父䕃矣乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c8fb0f23e1d14d3522d01593090b3deb132494c2a0f9b8ab8c04935c9fe433f0
