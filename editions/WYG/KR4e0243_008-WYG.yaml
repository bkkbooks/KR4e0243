body:
  text: 茅簷集巻八明魏學洢撰書牘啓答故人書權奸之禍人國也有攻其初者有攻其中者有攻其杪者三者品識材智本相敵而候有險易其留聲實于世也亦遂殊攻初者力不費而大慝除蘇文忠所謂奸之未成臺諌折之而有餘者也攻杪者際天怒人怨之極奮然為天下報讐國狗之斃亦惴惴虞其齧也而兇鋒崩潰勢則險而功易成獨攻中者不勝忿懣之氣冒萬死以與之鬬而一擊不中肉骨糜爛追咎者亦即多方訾之謂實乖舛節奏以致于僨嗟乎攻奸猶用兵也流矢横飛不避智勇雖韓白敢自必哉而當其捷則盡掩天幸而悉歸人謀當其覆則竒跡槩弗録而舉動之紕繆乃特聞此忠臣孝子所以仰天椎胷淚盡而繼之血也先君之禍載籍所罕聞慘矣而門下光唁之餘多所未滿門下父執也豈可以面折含茹弗答竊又痛傷先君之志不白于天下也敬與門下質之門下咎先君招權府怨夫招權者揣當塗之喜怒而彊附焉因號于衆以為市也癸亥冬先君使竣見朝趙冢宰遽扶疾命駕指膺曰此身即子身也願勿坐視余當此時實愴然懐國士之感避權者且得昧平生之可否而勿與言乎冢宰徐繹之不欺漸稍稍行其言當此時避權者且得禁制之使勿行乎冢宰立意奬恬最疾夫配人與地而為之請者而先君亦最恥為人營毎一缺出四岳九官十二牧麇至先君獨無言冢宰益心折間憶平日之所可者而舉之諸營者與代人營者咸怏怏却步恨事權一出于先君不知冢宰所以深相嚮者正以不招權見知非招權之訧也即如謝公晉撫之擢禍樞也先君實不與聞先君而與聞也則謝公清標鶴立正宜内用之奚事出諸藩徼之地哉遡其禍葢本于禮垣當時䘏典濫極先君一切引㑹典裁之屹然不可移一時要人以為是可以䣃怨也于是營缺者捧厚餽至輒語曰是不難吾當圖諸魏事偶諧輒曰魏幾相厄矣吾力而得之偶不諧則謝曰吾力殫矣其如魏何也盈城要人爭借此以消釋天下之厚餽其誰與户曉之必欲避權自全計唯有悉效䣃怨者之為耳先君義弗為抑亦性弗習也至轉入吏垣則一可一否本職懼有缺焉猶豈敢為無權無怨之言官哉門下又以為乏急流勇退之義美哉斯言先君所樂聞意者居禮垣時當退乎衆正嚮用嘉言盈廷丈夫亦欲一吐平生耳告假歸去俸滿徐來拾級而取京堂巧宦信有穩徑焉志士弗之甘也意者擢吏垣時當退乎甲子二月程都諫將陞序屬劉𢎞化𢎞化于冬間即微以艱聞序當屬先君設此時循次而轉誰能訾焉者而左公忽招阮大鋮使來先君弗聞也忽麾阮大鋮使去先君弗解也大鋮去趙冢宰循次陞先君先君何疚于心而必避之當日詣冢宰固辭誠屬繇衷之請要亦禮進之道則然非可相責以義退也意者角傅櫆時當退乎傅櫆借汪文言發難皭然之軀忽擠入千鋒萬鏃中文言事一日未明則一日宜止此正力戰之時也豈解去之時哉急流勇退獨文言廷杖後宜然先君束装南駕決計歸田門下想親覩之諸同志以内外相距莫肯退尋尺一人潔身將通國鬨然而盡散于是輿馬填寓門如窒袁公揣去志不可奪特以計典為辭具疏相留尋得㫖復羣然操大義相劫制而先君亦旋念計典且近趙儕鶴陳中撰髙景逸楊大洪鄒匪石程我旋暨左袁諸公適列居人才進退之地誠舉貪墨吏一大創之庻幾哉聲震天下而更援引亷能吏為他年碩果縱居位不久亦暫見平治風嗟嗟此志誠不遂乎有心者似亦未忍厚非之也門下謂文言纖人耳若之何與交文言憍汰已甚䘮其軀以䘮羣賢誠大有罪焉然初畨下詔獄媚中貴者實請得而甘之幸脱意氣不撓及再入獄鍛錬兩月餘弗屈詔杖一百其甥悲失聲叱曰孺子真不才死豈負我哉而效兒女子相泣耶末畨下獄嚴鞫者四酷刑僃加弗屈最後不能堪始仰視許顯純曰吾口終不肖汝心任汝巧為之我承焉可也顯純誣先君贓復蹶然起曰天乎寃哉以此衊赤貧之士有死不承特為先君受兩夾棍數百穿梭嗟乎匹夫殉義水萬折而必東亦足愧簮紱之徒庸庸者矣又何怪諸君子之惜之也門下又歎攻奄之舉無應而妄發譆誠然哉誠然哉楊公初入國門也疏已在袖中矣同志以無應尼之後見妒正者走奄竇如騖而奄勢亦漸鄰于不臣遂不惜以身死之公疏單疏聨翩共起雖傅櫆陳居恭亦莫不張吻内嚮奄蓋惶怖憂就縛矣而林虜一逃士氣盡喪首事者遂以無應䝉譏嗟嗟將俟九五為應乎驪龍之睡正酣也將俟九四為應乎則劉謝車覆後人方斤斤焉守許進之戒為蓍龜不得已仍俟彼曹内應耳文襄權譎固未可數數試也終不應終不發將遂鬱鬱聴之哉門下謂萬元白死竟無繼元白者殊為羣賢羞譆有説焉大釁既開南北司訛言如沸怵内者曰蚤朝將面奏怵外者曰宫中事將面鞫頗聞面奏之罪名驚駕驚駕則立擒楊公方躊躇不輕發而内已深懼之一日蚤朝羣衷甲以出氣息茀然甘露之變在旦夕而一時冢宰所推次輔所擬内又且唯唯相奉以求成故諸君子姑緩之鄉使持之益急必面鞫苟面鞫皇上必袒内不袒外外弱也將起大獄外彊也或致急兵搢紳固因之塗炭宫禁亦因之動摇追咎者又未必不憾諸君子之過激也而門下述葉福清之言曰其始也無虎豹在山之勢其既也無鷹鸇搏擊之威福清無此言也則已福清而有此言也則身為正卿懟外芘内殺正人者非公其誰不任責而責人多見此叟之巧于脱也門下又謂髙公疾惡太峻非克容人者而先君固推之失宜昔宣徳中顧佐為御史大夫懲貪汙御史數十員臺中股栗天下最不能容人者莫顧公若也而蕩滌穢風卒賛宣宗之治當代有若人門下顧不快耶且救世之道用賢去蠧而已用賢必用賢之尤去蠧必去蠧之巨擯髙公弗進留貪汙御史弗黜而以為時中恐時中弗如是也更謂趙髙兩公之于先君也遞亞為師生當避嫌避嫌之論中人以上所不談師生也而故庇之師生也而故沮之曖昧正相等耳又謂髙公本力辭曷不善成之薦賢者但當䇿其能不能不當叩其願不願御史大夫將用以彈壓百僚者也不使不願者居之將使願者居之哉門下謂外魏誠奸鄙然失儀細事耳何遽以此逐之夫宰相失儀細事也臺諫紏儀遂獨為怪事耶事涉宫禁既曰大事也不宜言事渉郊廟復曰細事也不必言必如是直有不言而已矣又竊畏門下嚴相誚也門下謂究問時盍慷慨自陳死而靡焉誣服何居嚴鞫之日門外邏卒以千數抗辯與否門下何自聞之微傳左公語所親曰彼殺我有兩法乘我之不服而亟鞫以斃之一法也隂戕之獄中徐以病故聞一法也若初鞫輒服便送法司既到法司更無死理脱詔獄而後圖之果爾則諸公誣服未始非一䇿也至仍着鎮撫司追比則外魏亦言其壊法矣良平豈能料之哉嗟乎狄梁公承反而不死人服其智諸公承受賄而死人笑其愚殆有幸不幸焉或亦未易議也門下謂追比㫖下何不死嗟乎貞臣烈士皎然與日月爭光亦唯一死結局耳豈堪如是求多哉鉤黨禍起陳蕃劉郃李雲謝弼之儔死掠案者不可勝數虞詡一日之中傳考四獄獄吏勸自引詡曰寧伏歐刀以示遠近假令當時有求多者引繩披根不休幾不得與絶吭之息夫躬爭優劣矣今視數公竟何如也昔鄒志完得罪謫嶺表友人作玉山主人對譏之謂爭立妃者當爭之廢后之時毎讀史至此輒憤然不平人方顛沛萬里之外而更駕髙論以壓之使併不得有其名不亦刻乎或于伊川前譏志完好名伊川曰人當于有過中求無過不當于無過中求有過嗟乎仁人之言藹如固與苛求者各一轍也獨念志完一人耳而譏好名者罪其激玉山主人罪其懦貞臣烈士之不見宥于人也葢久矣悲夫上張心矩年伯書老父見邸報而西也寂然無所言洢等固問可以乞援者何人輒笑曰死即死耳何援為將就檻車洢等號泣固請附耳道老年伯姓名洢恨不得奮飛至前若崩厥角稽首而徒跣入都聲息日狠厰卒之羅緝甚密長班之口舌易騰深懼彼此交累空失所倚嘗從馬上望見顔色淚汪汪欲墮而不敢聲也今事急矣能索矣不得不大聲而疾呼伏乞臺下垂聴焉老父以辛酉入工垣值楊鎬等得從寛議處之㫖四疏力爭幾見咥于羣喙甲子入吏垣值熊廷弼等得待以不死之㫖朝審之日堅不畵題此皆昭昭在人耳目者而一生欲殺楊熊竟坐楊熊之賄可痛也室懸如磬逋積如山無端坐三千三百金若肯降㫖籍沒固所欣然樂從者而刻日追比必欲産外取盈焉天不雨金金安出乎可痛也它家或待南北信通便可接濟寒家即朝往夕来庸有濟乎況往三千里來三千里縦父老憐而圖我而艱辛措處計所費時日亦三千里南中信至老父死杖下久矣可痛也勢不得不告急于輦轂故人而有心者無力有力者無心縱叩頭頭碎屈膝膝碎曽何能出父于湯火嗟乎窮哉舍臺下更誰控乎使老父一生制行稍有不足見憐于鬼神者洢今日亦不敢以累君子而老父之負罪實薄抑使一時汙衊更浮三千三百金之外洢自度籲呼無路惟有眼看父死以自剄謝父已矣而老父之坐贓適輕罪薄既足傷仁人之心贓輕尤可壮義士之膽唯臺下速圖之學洢雖孱怯乎每聞古忠孝節烈事未嘗不慷慨流涕奮身欲往而今竟藏首藏尾曽緹縈之弗如者誠謂徒死無益專欲留頭顱為報恩地也詩有之買絲繡作平原君有酒唯澆趙州土今日之控非特秦庭七日哭也熱血萬斛悉灑向老年伯衣裾矣謹反首茇舍以待命上黄虞兩年伯書喘且絶矣兩年伯嘘而續之宜何如五體投地而姪出口無愧色入手無感辭誠以恩越尋常不用求亦不用謝唯黙黙焉鉥諸焦府死報為期此朱亥不拜信陵君意也不數日而喘之續者且復絶為之奈何舊創未合新創復開獄内既恐不能活而五日再比毎比限數百金獄外將何䇿應之絞腸達旦亦思别覔生路以暫寛兩年伯之拮据而謁鬼見帝百不一投縱具拜人之膝誰則受我唯兩年伯終救之姪四支徒存七竅盡塞唯有張眼望恩翕眼悲泣而已但願視老父為千死萬死一分未必死之人而視姪則直如既死之人唯視為既死之人然後絶意于其子唯視為未必死之人然後不絶望于其父譬如人有急疾瀕死者屢矣扁鵲惠然許之曰可生而其子夙以癱瘓廢則病夫死不死乃扁鵲之責非廢疾不足責者之責也臨楮叩頭慟哭寄潘茂先書淮安舟次古權閹之殺貞良也以什伯數有死貶所者矣有死獄中者矣有死杖下者矣有死東西市者矣若乃纍纍然列跪姦弁前訶之詬之裸體辱之弛杻則受拶弛鐐則受夾弛拶與夾則仍戴鐐杻受棍疊棍所中結為黒丁黒丁漸澌陷為深坎深坎上微裹藥傅焉不再宿複加搒掠藥裹為棍掲去棍棍擊赤肉肉敗蛆生淋漓零落肉墮堦墀者塊如碗當此時寧特無力圖生葢亦無力覓死矣而垂逝之日更嚴刑促之溽暑􅇻雷㫖故遲遲不肯降越六七日始出尸牢穴中骸漲而黒面與鼻平入殮時不忍復道嗟乎悲夫足下讀書萬巻亦曽有慘毒如斯者哉先子刻苦一生併四壁亦非我有而竟坐賄三千三百金以死口口欲辟熊楊諫草傳天下而竟坐熊楊賄三千三百金以死洢嘗中夜環走想極成癡謂此時忽有人焉以三千三百金相貸如期以進如數以輸彼縱意不在贓當用何名見殺苟得出詔獄入法司父子相抱一慟俱斃斯亦人生之極歡也而長安故舊自一二人外率視我如疫鬼間叩之輒使人從門縫中辭曰目與目相射也明日可暮来如期往閽人則厲聲叱曰睡熟矣敢相溷耶明日可蚤来黒夜匍匐惴惴焉恐死邏卒手而訖不得一見倖見矣不過攅眉誡曰慎之予豈俟囑者幸毋數數出也久之卒亦無所聞嗟乎悲夫開口告人非難無人可告之為難也屈䣛拜人非難無人可拜之為難也獨范陽長者焦然倡醵金之議深鄉酷貧之士素不通姓名者莫不賣服物以相應然多者不過十餘金寡者乃至大黄錢三四文伯夷有難豈於陵陳仲所能救哉信乎亷吏可為而不可為也亷吏可為而不可為者猶謂妻子貧困已耳今則受賕鬻獄罪延其孥反以貪吏可為而不可為不更寃哉已矣追比方始洢將就浙獄矣先子生事猶爾爾先子死有敢出而援我者乎縱㓜弟躑躅于獄門老母行哭于道路義士或有矜䘏者顧昔不能活父今以自活洢尤痛之嗟乎悲夫司馬遷羞貧賤輕仁義頗亦謂謬于聖人今而知其言之恫也貨殖庸可無耶游俠庸可無耶刺客庸可無耶先子死當葬首陽山側洢若死自思葬要離墓傍耳天地鄙陿莫可共語昔檻車發平望髙子嘖嘖竒足下不置僑良鄉賓客傔從俱似遙領足下意者扶櫬南返適又久與程君偕述才人經緯甚悉嘅然歎足下真英傑也抆血而告之哀辭里中父老書嗚呼先父之被逮也邑中送者數萬人攀舟宛轉哭聲動天既行後又承十二坊居民設醮痛念此恩無可為報指望生入城門與父老歡然一笑也而今竟休矣痛忍言哉扶柩南還又值里遞計産醵錢洢驟聞之驚怛無地先父于七月初三日從獄中寄片紙云臨行時百姓許槩縣𣲖賠萬萬不可我窮苦一生並無分銀粒米施及鄰里鄉黨今日之禍又非為合縣公事豈可相累嗚呼手書現存可出共視洢忍背遺命而妄受乎况父老哀憐先父猶念素行耳至如洢者侍生父而往侍死父而歸庸懦不孝父老正須箠殺何愛而欲活之目今公差來捉旦夕將死家門傾覆無復可言所貽破房一所零田幾畝求父老勸人買之苦凑幾兩完納以領老母救子之恩微産既盡終須一死洢自無錫别父後來不得一見晝夜痛苦只想地下相逢父老不須悲傷也但身死之後兩弟決難自存父不能葬母不能養願父老清明寒食過塚前澆一桮飯時時以衣食周老母饑寒是則洢所求耳醵錢之賜萬不敢當謹辭答唐宜之本非有大幹辦足以救世又非藉富貴以圖温飽所以冀一售者不過八股縁深不能擺落思借此作完局耳而今復如是天殆欲再費我時日也乃我則已不復愚矣平日憂先生文不近世法而先生又憂譚石孺不近世法究竟遠世法者去近世法者留揣摩紛紛豈非閒話耶舊時妄願自己及好友皆售今已不作此想便令唐先生一生不售不足為發一嘅也先生信道真篤如針就磁如嬰戀乳不復墮苦海最可憐憫者弟耳弟之好書如世人好色暫時割絶到眼又被纒綿今古文字無一不足貪者忙忙一生未知何日恬寂頃展憨山經解及讀先生來教意似躍躍欲亮矣已預愁明日此時不知光景何似道念無根真堪悲泣王立轂回生事竒矣吳奕徳事更竒令人毛髪俱竦諸友處當即刻分致之方青峒憂老父是非太明不能成務此真相愛至語謝鳯老勸南臯且勿深言政事此亦真愛鄒先生者要知國家氣運非一人所為生平意識非一時可強良臣好友各盡其意而已便間當道兩公意又寄先生懐霖雨天下之願而今乃小試于一隅沾溉雖殊霖雨則一也客過夀州無不稱亷者而于折獄尤慎每定死案訊及孩穉定知于公無寃民矣微聞徽商健訟動以人命相誣剖決稍遲或遭騷擾此語未審真否偶有便羽不敢不以相聞要之速斷而悞毋寧緩斷而詳權其利害諒仁人自有定識也答唐宜之先生家累已重而復挈兄嫂家二十四口以南不願同飽惟願同饑仁人之言可感可涕欲屈意抱闗為餬口計此在當身自裁不更事如弟者豈敢局外置喙也彦林因亾妹平時奉佛而臨終不免痛楚大減信心先生以此極力辨諭累幅不止可謂熱腸之極老父謂自少至老自朝至暮善則為之惡則不為善念善事擴之充之惡念惡事痛自刻責寡之又寡以至于無如是而已死時痛也罷不痛也罷輪迴事即不必不信何必沾沾如此惟弟亦深以為然季路問事鬼神子曰未能事人焉能事鬼問死曰未知生焉知死子貢問于孔子曰死者有知乎將無知乎子曰非今之急後自知之此非唐突兩賢語乃真實理也但做一日人便了一日人道自此而外惡用知之頃先生憐念嫂姪自恨半生放生念佛乃令至親如此此即真正懺悔語也悟此之謂悟脩此之謂脩先生以為何如寄唐宜之弟時時懐先生于心非盡懐先生之道也大半憂先生餓而已近聞于蘇州娶一妾深為色喜喜囊中殆有贏錢也但記先生寓香樹林時夢飛騰千仞與佛追隨繡鞋現而佛遂隠今繡鞋現矣可勿懼乎嘉善城出喪之聲朝夜不絶然死者皆婦人也去歲死却一男子陳賁聞自祭文奉覽屬纊之際神氣堅凝平時作文猶索索不相接而此時作韻語顧條鬯倍常可想見其胷中之所存矣弟近來頗學茹素殆宛然一唐宜之然非做夢到西方也不過愛物而已吾道畢竟以忠孝為主天下漸多事矣死忠死孝便是了生死嘗語友人云我不解禪門觀法純陽所云熱油灌頂𦂳𦂳想着臘月廿五自不忙亂請問此觀法何如與陳則梁弟性不習譽每為人作弁作䟦往往雜刺非好刺也刺則雅譽則羞故雖素所折服刺恒十之三獨于兄用隠刺此弟之厚于兄甚也乃猶有不快耶況效兄作澀語他人讀之不能句即刺亦何害兄必迫弟改作而彦林又日三四促隠刺不已遂加顯刺然使則梁與子雲同刺弟之厚于兄更甚矣萬勿更有所不快也偶因易屑解易而因及從來解易之人因兄頗類子雲而因及子雲之𤣥又因及從來解𤣥之人政如主人好竒客客之客皆至焉趿珠履者三千人非客之都乃孟嘗之豪也嘻作書至此不覺又一客至矣答則梁弟小時不畏讒日翺翔讒口中已而知畏讒間形辭賦讀者䰟悸近則見畏讒者亦併畏之矣深願其相忘于讒之外也吾兄賦讒畏邪不邪詩人有言作此好歌以極反側歌則好矣恐反側正未有極也弟更有一語于此三代以來被足下詢娒者不可勝數幸而古人弗聞即聞之亦定不與校也兄何不以古人之待兄者待今人乎尊使索回字甚急未及竟讀草草歴扇骨四五莖大槩像栁栁州也寄陳發交先生一朝遊帝都而聲譟天下每讀諸䇿未嘗不歎董賈復生此事之最可喜者矣而不幸有令兄賁聞先生之變使人舍喜而生悲賁聞先生以冉閔之徳兼屈馬之才竟爾中道夭此事之最可悲者矣而屬纊之際棄七尺如敝屣然又令人舍悲而生慕嗟乎以斯人者而立廟堂之上吾知其必侃侃死諫以斯人者而膺疆塲之寄吾知其必烈烈死忠户牖間無端死一竒男子豈不痛哉至與髙果哉為生死交又有足感人者病初起舉身付果哉果哉即憂此病不起日攢眉與洢輩語久則直以告令兄令兄曰命也死則死矣何憾是時旁觀者目擊果哉攅眉状相與姍笑之爭進他醫令兄輙覆藥不肯食恚曰吾寧死果哉手必不為市井小人所弄一時某某之流扼腕而談此病必生令兄不聴果哉明言此病必死令兄則聴之于是自内及外咸怪令兄愎而切齒果哉日齗齗焉欲驅之使疾去也令兄頗知之語果哉曰我舉家鄙翁賤翁吾獨信愛翁翁勉為我留果哉悽然曰故人無能為有送子長逝耳沒之日果俟􅎃絶而後别此時洢旦夕往反親覩其事竊歎此兩人者皆古人乃未幾而嫉果哉者作俚歌醜之作傳竒謗之甚則説侍者詬詈之且謀撻諸市竊悲兩先生之事末俗不可數見而終局狼狽乃至此敢向先生言之便中干乞慰以數行事往矣願一白其心耳家書前日王寧瑕歸聲息甚急聞有意淘汰京營爾時擾攘在門人心易亂故前次家報請此事且緩今聞其勢稍殺及是時明其政刑百務當從此舉矣請妄言整理京營之事昔周世宗自髙平之戰知禁旅不可用命簡諸軍精鋭者升為上軍老羸者斥之又招募天下壮士擇其尤者為殿前諸班繇是所向克㨗宋藝祖踵其制又選壮士為兵様分送諸道召募教習俟其精練即送闕下又立更戍法使禁旅往來邊城以習勤苦士卒不至驕惰當今京營統御之法不審若何據愚遙揣當擇數十將舉見在京營兵使分練之分為四等或竒勇或善射㧞為上等額外重賞次次賞又次留用又次斥如此則强弱分而軍心勸矣甲乙支吾不必一旦操切漸閲則漸露漸露則漸刪如此則法不驟而變自弭矣數閲之後併上等者為一軍隸大將麾下優其食以風示諸軍因擇其技精者分撥諸軍各以其技教之苟其教導有方團練有紀此即將材也如此則得兵即得將矣又詔河北郡縣召募壮士補入京營不必千百成羣毎府選二三十人毎季進送蓋募地近則無道理盤費之煩募數少則無冗弱諠譁之患到京試驗上等者照例隸大將麾下次者亦照例分撥諸營聴練如此則材武之士大半實輦轂矣諸將侵削多者行軍法士卒狠傲者行軍法如此則貪將有誅驕兵有誅綱紀自此立矣然後更畨出戍期而徃期而還調遣無常地要在繇近漸逺如此則禁旅皆鬭士矣此整理京營之大畧也請再言郡國之兵昔太祖自京師達于郡縣之要害皆立衛所按圖而索約可得兵三百三十餘萬今大氐亡慮皆空籍矣最可忿者自撫臺以至哨長無處不有常例錢上之所費甚煩下之所得甚苦是以從来兵變無不以刻減軍糧為端今日急須選廉能之吏為巡撫為兵備各設無礙錢糧収召壮士充補行伍又于其中選擇教師分門演習撫道旬日躬閲又取無礙錢糧格外奬勵有罪者行軍法如此則民間獷悍之士盡為國用可以隂消盜賊之黨而一朝虎符四出不至倉皇召募此今日第一䇿也大氐兵所從出止調兵募兵兩途而各有利害懸金購士市井無賴者欣然輕去其鄉此募兵之利也而不􅈺教訓其為害最大雖不􅈺教訓而比諸市井稍為服習此調兵之利也而各有恒業聞調則沸前日嘉興郡城幾致兵變此其害又最大惟郡國先時募兵而邊塞臨時調兵庶幾得之無奈外臣虚文敷衍漠不經心此不可不嚴行黜陟以勸懲文臣者也且無論營兵即如每縣有守城民壮約三百名使此三百人者果皆驍勇之士則一城之内儘自不孤無奈負販之徒虚名應役而吏胥勒取工食彼實不足以餬一家之口故坐置無用耳誠得精選驍勇擇師訓射每月輪差巡鹽捕盜有材立功者歲薦一二人軍門標下聴用如此則一縣三百十縣三千宫府得人萑澤失黨豈非有備無患之道乎要之一切要務須從畿輔近地始自楊守謙死頗沮忠良之氣今日不可不精選守臣嚴行訓練秋防孔棘正當日惜分隂謹述所明以備裁擇壬戌三月十一日又朔風蕭蕭歲復暮矣自去歲仲春言别載歴寒暑南還者皆言王事孔艱士大夫率憔悴而父親自奉寒儉容顔倍癯憂與勞併傷如之何初言皇子生當有差既而道路歡傳咸稱誕育家人為之欣喜乃至今猶杳然也憂心忡忡亦復惡能已已諦念長安索焉寡味家食之樂殆難名言所愁者宿逋未清暨祖塋未定耳勉強作計菜粥可支母親勤勞紡織兒等差勝儼俟此亦足以優游矣秫田焉足羨乎詩云和樂且孺詩之言孺猶諺云孩氣弄雛詐跌孺之謂也因念閨門歡集雝雝穆穆小者鼓腹老者含飴樂復何以加兹往年曽買地梅花道人墓傍誠得築屋數間種梅放竹一如劉季陵故事閉門埽軌課老蒼頭灌園其中箋詩説易絃歌自娛一門之内自成鄒魯斯亦家庭之極歡也不爾者南張故里可徙而歸族中二三父老不在南阡則在北陌啓門四望柔苖依依禾稻登場斗酒輪聚兹亦足以自適或因而置倉設塾傚法昔賢施益靡窮焉恒聞陳仲弓王彦方管㓜安處鄉黨間藹如春曦未嘗不慨焉慕之且入鳥不亂羣入獸不亂行固亦康惠之家風也纉焉不亦休乎居家之樂身同孺子居鄉之樂身同老人夫居官奚樂之有至念賦性髙伉物莫之與而奮然以一掌堙江河益令人惕若耳昔金溪胡先生毎日晡焚香謝天賜一日清福老妻笑之曰一日三餐菜粥何名清福先生曰吾幸生太平之世無兵禍又幸一家骨肉飽煖無饑寒又幸榻無病人獄無囚人非清福而何今誦斯言殆恐難遂别而後知聚之樂病而後知健之樂亂而後知治之樂事過追思曷勝悼惜乎歸與歸與謹已埽室而俟矣壬戌十一月又莫赤匪狐莫黒匪烏景象宜屬衰颯而一時碩彦盡居雄豔之地天欲以此開中興耶抑將蕰崇正人之禍而速之墜也年例之處于法不為甚刻而世情已極難堪每想公子䖍杜門不出可為寒心外計黜陟結怨尤衆方今郡國長吏鮮不以墨聞者而其心又鮮不銓諫自擬稍拂所欲便已切骨更不待重處也趙冢宰既辦霹靂手肅清百辟端在此舉豈得復顧一家哭但秉心無競者耳目欲聳威焰欲平柴子羔刖人而有愀然之色此意似不可忘耳甲子九月通陸宅婚啓代三叔祖八世風猷占諸兩姓百年好合肇自片言值良苗之懐新樂衡茅之有慶㳟惟親家詩書望族孝友名門鴻羽可儀龍徳而隠式榖廣中原之菽有齊􅈺南澗之濱洵所謂𤣥圃無非夜光將無鄙部婁不生松栢何意我孫之陋質獲稱半子于髙楣念某窮巷白衣康衢黄髪含飴而弄穉子漸可負薪倚杖而過鄰家時謀擇配今兹欣喜曷可名言雨笠漁竿止共鷗鳬作社蓽門茅屋行看鸞鳯飛来敬簡良辰薄陳嘉禮比閭相問新姻之幣帛何如媒妁致辭田父之草率至此仰兾慈顔之一笑永綿純祉于千秋請媒啓代三叔祖媒即叔祖妹壻兩家締荇菜之歡功歸媒葉百世洽葭莩之愛慶在孫枝憶君為新壻之時一堂燕喜今兒作阿翁之日兩叟龍鍾況兼柯斧之勞倍切蔦蘿之戚孫能納履我且銜桮答倪太學婚啓代春風扇物竚觀桃李之妍協氣凝祥敬締葭莩之好倚暉玉立捧牘氷兢惟儀與物而相兼故感與愧之交集恭惟某丰同玉樹誼篤金蘭夙知而成因心則友觀光帝國曽驕驥足于五陵奮翼天池將搏羊角者萬里信偉幹比隆于松栢孰朽樗敢附于蔦蘿如某者農桑自課世遵豳土之餘風雞犬相聞笑比武陵之陋俗若擬衣冠之族真如燕郢之遙而偶因兒子好吟謬辱君家問字遂藉師弟之舊好巧諧兒女之新盟慶令弟赤水竒姿定振弓裘于異日愧孫女緑窻孱息僅􅈺紡績于田家兹申金玉之音忽拜𤣥纁之賜維其偕矣又何予之徒驚蓬蓽之増華終赧瓊瑤之莫報敬陳不腆􅊃悉寸私聘趙氏婚啓代陳氏文定厥祥敬締百年之好合卜云其吉巧當三月之繁華御麗景以脩䖍展微芹而佈悃感兹燕喜豫拜鴻禧恭惟某衣冠鼎族詩禮名家令徳靡瑕久蔚連城之譽惠風及遠世留冬日之思挾䇿祖計然之竒傳範守班姑之誡女􅈺四徳門備五長固宜喬木之興懐抑豈衡門之敢望顧某倥倥自許黙黙無聞愧書劍之弗成對桑麻而獨喜毎笑瘠田數畝茅屋數椽葛天氏之民將無是歟更得賢婦在堂嬰孫在膝田舍翁之願於斯足矣是以慎簡蘋繁之寄謬期葭玉之依幸我長男許為半子天作之合人競為榮撫兒額而教之書未許佩觽佩鞢量兒衣而思其室豫祈鼔瑟鼓琴再藉氷言復申金諾慶良辰之可悦赧嘉禮之無文野饋􅇻􅇻今日繋羊而徃徳音穆穆他年挽鹿以歸雖負愧古人難語太丘之里而克昌厥後定符敬仲之占矣答蔣宅納采啓代大人常論婚姻之合最宜朋友之家蓋父兄之往還久已相視莫逆則兒女之情性自爾不卜可知此本素心見諸今日恭惟門下風神駿爽氣韻鴻深𤣥言動協古人彩筆一空作者方謂君才之莫偶竟於我子為獨親夙叶塤箎議諧琴瑟昔者攜編共業實繇戊午春初既而衣裼興歌即在當年秋秋可見良縁之甚巧先已黙定于斯時人復何言天作之合念令嗣垂髫早慧允同玉樹臨風笑孫女學語初全豈解楊花擬雪竊愧門楣之弗類奚堪筐篚之多儀来翰諦觀報章難稱問何以飾壻之珮笥中素乏瓊琚問何以華壻之裘爨下誰􅈺綺錦檢書相贈聊用致我惓惓垂盒而歸人將見其濯濯深慙輶䙝仰兾莞存陳宅聘啓代大人卜云其吉衡門睹芳草初妍文定厥祥敝帛借春暉若麗占風猷于八世慶協睢求締好合于百年情深燕喜涓心佈悃拜手陳辭恭惟叔翁親家門下英才飈舉靜詣淵渟腹貯天人堪射漢廷之䇿目營時務常為梁父之吟豫章巃嵸以干霄根荄特固河漢澎濞而注海滃溢有源觀其精意所歸尤以孝弟為亟撫摩猶子忘飲食教誨之為劬整肅閨儀知婉娩聴從之必謹人言無間至徳可師幸屬葭菼之依依逾感常鄂之韡韡昔者吾友邈焉古人褆躳與顔冉齊鑣掞藻令班揚郤席菲材殊窘於一得蘭味乃通于二難鑄思而擬態風雲砥志則爭光日月千秋自命三人同心尋結兒女之盟葢縁兄弟之好令姪女周旋内則夙閑少儀次小兒粗習古辭曽無竒致謬因同調舊有成言兹當良月之辰爰舉納幣之禮名雖遵古物不及儀剪荆是供纒錦奚需乎青雀提壺已簡繫轅併乏夫烏羊花纈云何草率而已受嗤俗目我亦深以為慙仰揣慈顔必且文之曰儉粲然一笑祉及萬年答耿撫臺啟代大人屬者罪畹突至羣甿大猜訝有司寛兩觀之誅羞大藩同三危之域攜帑狼顧如穰矦之就陶擁客鴟張似陳豨之入代萑苻多窟桑柘皆驚若留先帝之罪人必誤吾君之赤子恭遇台臺衡覽全勢特奮孤忠請命自天投奸異地直為海隅蒼生一大抒其忠憤之氣明示亂臣賊子無所容于葢載之間佇觀郊遂之重移皆賴驅除之獨勇慨自訛言驟煽迄今罪罟猶張殲之則庸妄堪矜或念雉罹之慘釋之則戎心何底又懲魚漏之疎纔一見璺而已艱孰似黙銷之為愈奠安兩淛屏翰萬方某迂拙難回出處無據嘗操觚而磨盾謬附同心頃捧節以還朝未遑拜手方懐耿耿忽荷拳拳敬致一縑薄伸萬縷舉章陽東名宦書代大人竊聞循吏之撫民也居無踰衆去乃令人思先王之報功也生苟利民沒而祀於社蓋萬世薦豆陳豋之大典總當年攀輪臥轍之餘情淚灑峴碑祝同畏壘伏覩故邑侯章公聲色不大情偽盡知清静興歌勿炫察魚之慧閭閻安堵坐觀馴雉之風惟不忍草菅視民故能令桑麻徧野國無薤本户有棠隂當時幾信定逺之平平歲久方憶道州之下下目脊脊紛更之後猴冠而虎翼者滋多悟欣欣色笑之中草薙而禽獮之畧盡堪方召杜兼軼趙韓至覩小子之有成彌念古人之無斁審聲知髙山流水神契鍾期相馬畧牝牡驪黄識超伯樂手與目而俱了藝與道之交資雖家庭所以相期其諄復不過于此惟民之母實士也師在往古猶罕其儔豈邇代庸能數值而睠懐及此感嘅忽生治非斁于故而飭于新俗毎厚于生而薄于死朱鑣耀日頌禱讙騰素繐搖風徳音沉寂間有桐鄉廟貌驚鍾虚之嵯峨半由烏巷簮纓詫箕裘之翕赩若侯雙鳬輕泛未及展翰翮于一時且侯雛鳯卑飛又尚息扶搖于六月世情宜為冷落我里倍覺關情瞻生祠之遺容緬髙風而回首慰兹父老責在縉紳用是援引舊章議崇名宦匪徒銘五世之澤實欲扶三代之公一言為榮萬民是若茅簷集巻八
