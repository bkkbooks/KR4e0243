body:
  text: 茅簷集卷三明魏學洢撰詩擬古仍古韻肅肅戒嚴裝惻惻將别離淒淒朔風急迢迢天一涯歡顔好相慰淚落不自知羨彼東園鳥依依家寒枝留云道方逺别云心欲緩出門申相問此去何日返木葉蕭蕭下潸焉驚嵗晚為子長相思為我加餐飯二十里躍青驄垂鞭折楊栁忽憶樓頭人含愁對窗牖今日非相忘當年漫分手古鏡若明月寄贈閨中婦皎皎契闊心千年共相守三泉落不上山泠泠響空石誰能將此辭寄語逺遊客歸來相宴樂樽酒且勿薄堂上邯鄲倡美者巫與洛但苦杯行頻不解苦離索華燈照道傍車馬填第宅酒酣髙歌發長鑱舞三尺人生行樂爾惡用相煎迫四箜􅔃且莫彈簫鼓且莫陳我有知心言悽然傷爾神飄忽逆旅客何假亦何真命儉意偏奢戚戚不得申朝為園中華暮為陌上塵斗酒非不足安用爭要津請歌行路難匍匐良苦辛五華山千餘仞夾栢青雲齊枝枝遥相葢餘隂覆瓊階上有雙鴛鴦達曙酸且悲行者問閭里云是焦仲妻前車勿馳驅駐馬且徘徊援琴譜清曲曲罷聲轉哀可憐被逼迫重傷相見稀生前痛離别死後徒雙飛六未别視别輕别時太草草恨我非晨風送君桑乾道天長路曼曼江空水浩浩花落悲鳥啼身與秋風老七昨暮共攜手明月射東壁細語何喁喁屈指猶歴歴十五入君家三見庭草易朱樓足歌舞匆匆逝焉適慕彼侍中郎薄天振髙翮男兒重榮名故巷少行跡青絲絡馬頭黄金飾車軛怨君輕别離怨君亦奚益八春風媚佳節同遊山之阿何用相贈遺下山摘女蘿女蘿非有私贈遺頗相宜託根北山側施蔓南山陂但存纒綿意不怨相逢遲怯怯愛春華及時願揚輝既邀眄睞榮甘同秋草萎同牀而各夢繾綣空爾為九脈脈當户繡不知雙淚滋人謂石蓮苦未解濳相思蓮成嬌欲泣淚落還漬之持此長悠悠芳菲復㡬時十静夜思婦泣自言秦川女嵗晏淒無儔寒碪伴機杼蕩子歸不歸漣漣涕如雨鈎簾望明月明月上幾許清光知我心佇立無一語十一游思隨飄風逺歴杜陵道道傍合歡花悉成斷腸草紅顔不堪駐妾愁君亦老為樂逮良辰歸來何不早人生數離别百年非壽考忙忙風塵中榮名詎為寶十二洛陽多麗人羅袂紛相屬道逢七香車芳風漾微緑夾轂願借問來遲去已速幸我遇狹斜目逺路更促彷彿見蛾眉不用豓妝束嫣然一流盼朱顔美如玉所思不可見彈古相思曲曲中竟何言理短情自促野卉非不香采之徒躑躅今日白頭吟昨日黄金屋十三行役出北門悵然見新墓樸樕集歸烏荒榛翳村路生人盡黄土有晨終有暮死者夢已覺生者懵未寤落落初栽栢泠泠泫殘露金帳苟不死我亦圖自固百年飼螻蟻古來有長度行樂惟富貴先為行樂誤亮彼墓中人當年曽紈袴十四化久誰復戚年少相與親灼灼豓繁華棄捐歸荒墳骸骼變旅穀樵豎摧為薪所幸身既死不更愁殺人感此凋朱顔怊悵悲前因十五誰為不死人懐此終日憂來日當大難今日且行遊行遊須及時古語恒如兹口爾身不然留為今人嗤今古更相笑逝者無還期十六颯颯寒氣發重以夜猿悲居人歌北風征人賦無衣一别渉九秋心知無久違門前候征斾遥遥覩容輝歸馬驅倍疾親為授前綏荷禂道相思百年願同歸夢君逺行邁送君出重闈驚淚浹芳席勸君莫分飛須憶離别時出入頻相睎從今脱車輻勿復闚雙扉十七薄暮逺音至戚戚心恐慄向前視尺圅手書粲分列妾顔三五月夜夜清光缺思君歴秋冬惠缺戲題家塾好葺柴闗早下帷貧家父子習毛詩傳經邀得康成在訂字須闗叔重知茅屋主人恒菜色蓽門好味只園葵先生莫漫歌長鋏花老春深歸去遲散愁冬意絶蕭瑟樓頭日日隂愆期雪不至無厭雨偏淫展恨頻看史凝愁獨擁衾自知人性後惆悵到于今二得意固無伴愁來誰可商未呼桀溺隠且學牧皮狂枘鑿從千態牢騷付九章漸疑蓬户内亦不復黄唐三長日茅簷下輕風動短衫菊花聊自植蓬徑不為芟入俗刃初試畏人枚可銜只應深自戢清影倚長鑱四超俗還諧俗由來不可兼黄虀今已熟竹葉且微霑見月思姬晉臨流憶謝瞻泠然神欲徃風輾逺村帘重過蔣氏蓮雪居用昌谷韻十月嚴霜飛江空天在水沙礟霣紅籜荒日下平地大野曠肅殺萬物絶狐媚獨存漢宫秋西風亂葱翠孤村澹微晃草濕泫寒淚驚絲轉危葉片片楓林醉荒磴蝕苔衣窞黒閴幽邃平疇忽波立煙白失涯涘潭深古龍吼石滑蛟涎膩客雁呌髙旻千行作人字怒濤盪雲色參錯駢巖峙杳隔闤闠聲時見斷蓬起急趁半篙日櫂入茸蘿裏苦蔓罥黄葛樹卵小垂紫深林人有無敲石煑丹髓吳舠狹谿轉斜光照新穟短籬晒殘錦芙蓉映縞帔碧篁韻淒澁欹瀬枯枝墜縠雯雜輕靄櫟徑浸沈毖歸鳥飛影疾帆落園扉閟枯籐束方笈病螙避芸氣牀頭魚腸劒銅花射朱几青鳥憶瓊瑶白鳳含𤣥粹墮髪成蝸牛筍迸北垣圮耳熱商歌發苦調咽秋思冷熖摇素壁古廟笑木魅長夜讀天問璧賤麩胡貴腸輪幾迴直心事颸風似壯士破刺促殘編擲疑義詭譎石皷辭鼎彝漢郊祀聱牙故期期不諳奚復恥巨螯勍如鐡觴政蒼鷹吏懽集餘閒情柔絲漾芳餌嫩粉琅玕脆肥緑銀光紙下堦莢錢薄閉閤檢陳事懶譜難㤀曲羞裁雀臺妓三閭倘前身數疑宓妃至賦成六螭舞萬岫倒行次風髙山骨瘦月小蛾眉悴長天若鵞溪一潑瀟湘意凍霞珊瑚頳老鶻刀稜翅草甜蒺藜硬鐵騎沙塲戲霜撲平城兒愁絶崑崙使王孫擁羅幕葡萄鬧横吹夾屏金鴨煖睡熟鮫綃漬黛拂青蟲簪蒨脱胭脂臂此夕氍毹懽幾人酸腸刺丈夫貴行樂窮達聊自肆歸家㺯錦孩剪梅帖花子賦得客帳夢封侯燕山飛騎白如練羽林夜詔趨金殿宫妝武妓唱鐃歌甲光雪照銀花片材官小臣拜稽首肘後銅符金壓紐丈夫此舉不足竒虎頭燕頷蚤有之會須萬里築鯨鯢忽然牕角射明月布幃斜掛猩紅血别蔣季我本無心人啁笑雜凌厲我本有心人臨岐惜分袂季也知我者不言領深意暱我墳典志去我卒嵗計譬人慕青山夢裏皆詩思及覩青山色錦囊無一字春風好相憶一鼓蓮花枻野鴿有序予得一鴿松陵更覓一為侣飲啄必偕朝而出必相向鳴舞暮宿亦然半月後偕飛廬上後至者忽颺去留者延頸逾時悽然獨下自是絶不復出飲啄亦希又半月去者忽復來相向而鳴彼若相招以去此若相招以留卒各分散予哀其意詩以招之野鴿莫飛去離羣真可哀重來勞夢想臨别苦徘徊多此一時聚飜令兩地悲未能遽留汝問汝幾時囘二野鴿莫飛去離羣别恨多故鄉難遽割彼此幸相過甕黒棲秔米盆青貼芰荷不妨時飲啄問汝意如何題茅簷幾度移屋陋巷兹來倍笑汙窪短檻蝸涎詘曲頹簷螙篆槎枒門許故人題鳥壁容穉弟塗鴉飲酒誰共一斗讀書差羨五車春月懐人薜荔秋風吹夢蒹葭無榻堪留孺子有蔬頗類茅家霜後老農餉蟹雨前詩客攜茶矮菊浸浸彭澤盆荷小小若耶未得山棲聊爾倘云市隠非邪歸鴉肅肅歸烏帯夕陽蕭條寒色上垂楊遥空潑墨侵雲亂樹杪浮青瀉影長數畝荒烟山寺白半竿殘照短牆黄故園擇木知何處客路聞啼秋思凉二日落鐘鳴霜樹紅悲鴉作隊逐西風萍踪散亂投青靄野陣糊塗布逺空歸路依稀官栁外人家黯淡暮煙中黄昏漸到枝頭寂露脚斜侵古木叢三日暮煙生五栁村飛鴉陣陣晚來喧西風峭急迷歸浦冷月荒凉憶舊園老樹半枝留逺夢枯藤千尺踏霜痕嵗寒蹤跡元如此雨宿冰餐不足論四觸眼淒淒惹夢思特憐烏鳥下來遲憑將暮色雲千里借得青天月一枝桐井不堪荒白影栁堤非復淡黄時倦飛語澀聲難譯應是長林歸去辭五城外林光照水清城頭擊柝子烏鳴危枝半折棲難穩片葉孤飛夢屢驚風雪終宵羈客况煙霞作伴故人情寒碪敲碎三更月黒影參差荇藻明六天髙木落萬林衰古栢啼烏忽滿枝可是墓田喧野鵲依稀漁艇着鸕鷀移株苦削風霜片顧羽時飛煙雨絲到處有山皆可托傍徨遊子暮何之七歸鳥嗚嗚傍晩回暮林蕭瑟自徘徊孤飛覔伴聲偏急緩調無腔意更哀秦女停梭無限恨何郎困獄可憐才夜闌似譜烏棲曲月白星稀冷畫臺八擬將秃筆露槎枒一掃寒林百隻鴉啞啞悲聲淒月色蒼蒼疎影綴霜花横鋪亂簇難成字冷水孤村着處家枝重露濃清夜永漸看簷角起朝霞讀史述矦生翩翩信陵君夷門㧞竒士白手搏强秦緩急莫堪使一䇿虎符飛再䇿鐡鎚起殺氣入邯鄲秦軍無堅壘此時夷門客長笑送公子頭顱留謝人事完身足死藺相如秦王㑹澠池邯鄲出孤注帳下千熊羆笙筝亂如雨提瑟藐萬乗耽耽視毚兎一夫瞋目呼虓虎不敢怒殘絲奏殺聲雪鋒交五歩昔年柱前血今日堪相汙壯哉藺夫子千載有餘慕魯仲連鄙夫爭一身身外匪所計有如魏帝秦何與魯連事先生獨倜儻慷慨决大義五嶽倒地輕滄海連天沸吐舌如吐刀鋒鋒着人厲白日走秦兵先生天下士屈平洛陽雋年少投文弔沅湘愍纍堙鬱志訊纍逺自藏謡諑雖蔽明美人安可㤀苟能歴九州故都可徜徉嘿嘿不忍去抱此九廻腸騷人恨無限千載為悲傷伍員楚臣報楚怨楚人心膽寒但當收讒夫葅醢流餘臠斷棺笞故主倒行劇無端長蛇棲郢宫舉國髮衝冠秦庭七日哭安得不悲酸荆軻蕭蕭易水波日晏客未至十三死灰兒勉强共大計坐中擊筑人何不充秦使田光死也餞於期死也贄空死一無酧烈士喪英氣願逐酒人游哭盡不平事張良子房婦女容冷致澹人意鴻門撞玉斗從容自遊戲想其眉宇間消盡浪沙氣壯心未肯降偶爾付劉季萬户亦何庸賞功漢家事穀城拾黄石歸來好閒睡蘇武蘇武挺竒骨矻然不可移齧雪兼咽旃掘䑕還牧羠孤臣合窮死不用青天知區區惜朝露故人真女兒李陵李陵飛將雛千弩應弦倒萬里搏單于匈奴不堪埽箙中花箭盡鼓死龍城道名敗志不成身與氊帷老日落望鄉臺酸風嘶荒草子卿不相理十年恨盈抱朱暉我乃踽涼人好譚快心事文季年十三倜儻露竒氣睨璧紿少府片言重把臂公叔濟長河望風走汚吏讀此浮大白五斗不成醉李文姬文姬巾幗流乃是女智囊三子返閭里怵然暗悲傷鳶肩闞如虎六尺危朝霜十年酒家傭一朝歸故鄉姊弟相向哭行道淚滂滂阮籍當年竹林中歩兵儘髙妙登山賦英雄慟哭兼長嘯却令兩豎子代我解人誚此中深意存醒人那能料吾有數斗酒壘塊可堪澆田疇夜讀劉虞傳胸坎生不平無終有一士烈烈千人英欒布不足數申胥難與京吾将夙嚴裝萬里從之行誰為同心人千載陶淵明龎徳公龎翁襄陽人不識襄陽縣躬畊有餘暇支頤玩時變鹿門漾春風吹落桃花片區區一角天兒輩已足辦周瑜公瑾起江東翩翩美年少瞞兵百萬來風流劇談笑一箭火鴉發糜爛連天徼黒熖走江陵飛光落刀鞘奔濤沸鼙鼓鮫舞鯨魚跳賦詩横槊人驚魂腥孤嶠潮轉紫旗迴江青發紅照諸葛亮受託誠不易知人良獨難南陽雖子房誰為鄼與韓将相兼簿書心中多苦酸十出九空歸一身亦凋殘為君歌梁父中夜發長嘆孫嵩北海孫賓石沉烈有深意道逢賣餅人一呼魂魄悸攜手同車歸上堂拜昆季門外正狼虎聞聲莫通氣事平相笑出戹屯乍成字問君複壁中還有幾名士劉琨越石志四海中夜起長歌萬國徧戎馬淚落成江河失路歸無家同心媾女蘿銀甖血猶泚轉眼仍操戈英雄功不成慷慨呼奈何祖逖英雄不得志此事休問天劉生幽院死祖生亦可憐擊檝渡中流激昂先着鞭一夫搆内難壯士功不全浩歌唾壺缺使我淚漣漣荀崧女灌荀家有嬌女艾年方十三桑弓鵶翎箭匕首霜花鐔月黒跳孤城重圍密如蠶平明轉戰出軍中殺氣酣不假七日哭蚤達尺八圅援兵走風雨髣髴破章邯借問驍将誰髮覆青蟲簪王衍㔨勒少雄桀倚嘯上東門爾時正窮賤猛志凌中原杯酒較帝王意氣何軒軒却笑王夷甫白首工清言勸人着柘黄齪齪不足論殷浩深源不出山令名跨江東虚聲可坐鎮那足敵梟雄角巾歸烏衣澹然流髙風悠悠行路口理合深彌縫才窮氣先折咄咄徒書空謝安安石東山時優游絲與竹以此理世務馴若山中鹿當其㑹新亭朝野盡蓄縮從容諧笑間不言使人服臨風毎懐想可人温如玉王羲之茂𢎞經世才安石更文雅逸少故風流豈是悠悠者殷謝噉空名人心同敗瓦好語不入耳世事解人寡作書換鵞羣山水秀而野王猛景畧敬仲匹西北千羣空觀其馭鄧𦍑大類隆凖公古來草創業善作期善終敵碁難盡殺須讓東南風賭墅得勝著殘局收全功方信敬仲竒小白徒英雄劉裕一夫驅千人寄奴天下竒新洲射長蛇没羽血淋漓青衣雙𢷬藥一呼忽失之鮑風腥帝劒快事恒如兹殿前一横盻愁殺桓家兒顔延之顔彪酒之狂儉徳類知道超然繁華外落拓自為好沉飲匪荒宴春郊臥芳草千秋兩歩兵孤懐恣傾倒謝家豓芙蕖秋深竟枯槀樂陵王妃淫風扇齊梁遺事供唾罵讀至樂陵妃忽然涕盈把可憐樂陵别握手淚潺潺帶玦割相贈此去何時還郎留壁花白郎去池水殷恨恨腸寸絶玦莫留人間天乎如有情玦當化為環賀若敦丈夫營四海守口當如㼶漫掉三寸舌焉保七尺軀賀若大将才功滅身亦俱快錐刺兒舌兒舌血模糊快口刺人心憯毒過矛殳感兹酸楚言三復還長吁讀史雜述兩吕虎負嵎将相徒手搏誘虎棄深窟縛之若狐貉飛誡閉殿門馳節斬長樂成敗呼噏間日出欃槍落二英雄圖退歩可嗤亦可憐馳逐威八荒日暮求三山手植金光草吸露還餐煙悲哉秋風辭茂陵乃無年三審事貴審幾急湍迸石罅東京横貂璫羣狼啖天下但當殱其魁何用苦不赦日入慝相求驚鸞飛下樓徒令千載人念之雙淚流四桓郎好竒筴百發無遺矢嗟彼佳人兒置之若充耳身棄千貔貅獨行不知止病馬忽騰槽駑馬棧下死何代無㹠􅀈酈兄不欺已五烈烈南風惡人傳天下樂浴盡簏簾香銅駝立荆藿當時生桓文楊家作伊霍傷心箭頭書吹向金墉郭六海上拾鳬毛陸離三丈長豈不洵文采對之神色愴繁華少年子三五自成行銅駝且流血金谷且流觴為我問廣武天道何茫茫劍解穿壁飛不解斬河陽七番兒歌阿干鮮卑山色寒阿干歌聲苦鮮卑水酸楚武皇虎豹威猛力廓郊圻骨肉快相啖諸兒還日稀秦川血没腕六宫已灰飛為歌阿干曲曲終淚沾衣八番兒花箭强金簳狼牙脊單枝折如朽十九勝千百兄弟相為依一如箭在笮敦弓交驩好角弓刺乖隔我作折箭吟阿干第二拍九時危保七尺恬淡頗有餘志扶大厦傾那得屏人居岌岌宋鼎折扛者須賁諸袁劉兩骲箭射堋安得除青青石城月夜夜石城閭黄􅘼捧玉璽乳嫗竟何如十吳翁初虎嘯顧盼生雄風領軍三十年對之何夢夢跛奴一朝至探鷇還呼熊昨日昭陽殿今日單于宫徒令韋衡州熱血噴長空十一女蝸五色石用之堪補天石破天柱折明月落長安龍子髮未燥竒績凌齊桓明月照四海如何坐愁歎短歌悶欲絶敲碎黄金柈十二天生普六茹梓發周家廬刺𤓰遘厄㑹惜哉劍術踈一夫叩刀入壯士皆次且随王有樊噲趙王無鱄諸白日脱驚龍彈指空躊躇十三後庭歌玉樹為樂殊未央金貂雜蛾眉擘箋飛瓊觴天子好風流六宫遊冶塲懽娛不終日隋兵来醉鄉千年燕支井破月照荒凉夀葉繩毅先生秋月皎皎秋風髙綺筵笑語心陶陶畫簾輕捲衆羅拜琉璃琥珀浮葡萄勿用起舞翻鷺翿勿用雜筦聲嘈嘈袖中有詩調頗勁須令子晉吹洞簫吹徹仙家栁枝曲笑紋幾折紅瓊瑶再吹先生考槃樂先生聞之轉嗢噱黄髮鬖鬖白晝長手中但持銀不落閒拈碁子記觥籌常時失數添杯酌簷外晴雲擘絮輕偶然目送渾㤀却入秋逸興更遄飛年年勝事供林壑紫螯繡鐡汾湖蟹黄脂凍玉汾湖雀兒郎團坐共酕醄乳下孫孩解嘲謔醲醲春釀送来頻量勝不嫌觴政虐微酡就枕夢于于朱頤忽解眉忽舒陶家徒有五男子但覓梨栗無詩書眼前列坐斌斌者對之不飲當何如伯也有孫頭角異仲也筆落鮮霞膩叔也畸想劈天荒季也夙辦凌風翅更兼小阮躍竒姿春波㶑􅗷秋風媚酒觴墨壘較雄雌一家旗幟分行次長離蜿蜿采毛長将飛未飛聲啾􅀈龍門萬仞古桐碧百鳥不敢相翓􅀈上有神鵠翩翺翔頫覽九土知圜方衝颷一舉造旬始仰吸沆瀣儲餱粻黄鵠髙飛青鳳語身輕儼逐朝雲舉回首平生春復春豓風幾度桃花雨安期贈棗棗如𤓰銀宫多少同心侣自出三山仙厯深折鐺石髓留誰煑野渚優游盡室閒道顔瀟灑仍如許倚杖門前秫稻香東家雞酒西家黍緑楊深底纜漁舟斜光村落歸樵去武陵源裏避秦人料得當年僅能爾數竿紅日照窗紗未梳短髮杯先至金掌何須覆玉漿趁流挹取方壺水醉鄉元接大蓬萊自來中聖長如此甕頭沙洛富如澠黒甜半晌重釃起一日小飲一百杯百日小飲盈萬杯從今大飲三千載酒波喧沸如奔雷坐看桑田變滄海糟丘酒池相轉迴舟行野眺曠無際潑空雲萬重無心閒㸃染港口出漁翁二雲沉波影暗寺古鳥聲集平疇三尺青風披見蓑笠放歌贈程子長愈也具五窮鼯也具五窮子長之窮參有之子長之窮將無窮子長工作字筆尖常帶鍾王意子長善苦唫藻思雜組曩與今子長陡然逸興劇五指拂拂寫竹石老籐夭矯挺長虬仰看青天僅盈尺子長子長何多竒觀者咄咄爭嗟咨郭生風鳶亦儘好那能調合富家兒自畫自題更自咏飢時飽看徒爾為黝雲慘澹酸風急葛巾吹折當窗立五侯七貴漫相邀字爛袖中終不入熟朋作伴到門前肘後推之轉羞澁窮人着處逢途窮朅來住我東城東浮圖挿天孤影直鐡隼摩厲穿長空幽瀾有泉自清泚竈煙寂寂聽晨鐘牀頭秔米并日涸安望斗酒酣新豐當今國風殊偪仄覔一蕩子不可得濃人不入裘馬場淡人不受煙霞癖閉門數箸析秋毫縱能好書不好客滿堂盡是愬貧人誰能一畫療貧䇿安得彌天僻壤皆齊梁十里一置田孟嘗又安得孟嘗筵前各置郭有道不至誤列君雞鳴狗盜旁吁嗟乎為君作歌抒中腸曲終拍絶空傍徨寄人西風峭急愁雲結鎮日閉門春事劣幾囘竚旭射窗紗褰簾又詫紅梅折年年二月亂花香今年尚墮前年雪柴扉蕭索客來稀劇譚誰伴玲瓏舌歩兵習嬾愛沉酣文園耽句成消渴常聞外靖難内寧隨身小病何須絶忽然長嘯盼吳鈎離竒病骨非雄桀平生壯志勒燕然㑹須踏碎千山月丈人劉覽古人齊間通𢎞景岐黄説奚奴松下曬書回連雲剪藥清泉冽石鐺曽否煮金櫻相詒乞在蒲觴節九日同嚴知章澹如兄弟遊茶磨山和周頤和詩叟朅來松陵叩好友到門恰值九月九主人大笑攜上船船頭載花腹載酒舟子勸上姑蘇臺衆客首肯我獨否青山只作名句觀耳目熟爛妍亦醜但問誰家富脩竹我船便纜堤上栁布㠶直指吳山麓石路犖确爭猿猱日脚射頰赤汗泚傴曲不啻肩重負詩翁却攜乳下兒七十又五健趨走山僧烹茗餉梨栗柿如火紅大如缶紙鳴漸覺寒颷生起覽竒蹟竟何有稻香未老農暫息羅拜大士集村叟奔上絶頂瞰湖光帽欹花落風生肘洞庭縹緲波雲沉彷彿頑沙臥千畝夢想晴濤匹練飛此來未足舒窈糾臨行爆竹響空谷青煙一縷千峰吼細雨斜侵濕布袍放船倒出蓮花漊木蘭短檝浪痕輕隨風容與煙波藪上方樹杪挿浮圖金山小寺江心陡濃濃嵐氣醒復醉逺山百簇頻回首治平前度磨盤山朱旭炯炯光照牖隔林笑指碧㠝岏共約聽歌到初酉驟觀山石埶頗仄愁無平壤安盃瓿斯須簫管咽流雲參差滿地胭脂厚吳王臺沼舊風流至今士女皆琅琇邐迤妖雲十二峯鏗鏘豓曲三千部當時爭看碧油車畫船别駐清谿口蘆花隠見舞凉風中有美人垂素手縞衫紅襯水仙妝鈎簾遥睇偏淹久笙歌隊裏浪相猜伊人莫是羅家婦拂衣獨起歩山趾夕陽晼晚清颸䬀長春橋影鞭虹霓老石粼粼水瀏瀏忽然迴望聽歌處五色斕斒恣踐蹂爛如彩帛剪繽紛亂灑石間雜瓊玖又如粉塑絶鮮明寸人豆馬棼相耦促坐但聞絲竹聲遥瞻竒麗渾莫剖應如余昔㸃中間黒衣亦作𤣥雲黝眼前聲色春花穠縱復病懶亦抖擻同來伴侣大呌絶私喜兹櫂良不苟暮靄羃羃山欲無挽衣不行煩勸誘餘響鏗然落翠微曷若趁此含清卣譁呼跳船船欲崩急索巨蟹浮大斗五栁先生淡如菊随俗爾爾亦其偶強哦古句半已殘蕉葉且復傾瓦甊酒甘不厭觴令酷衆人或辭我輒受推牕更問曀與晴皎月若出當坐守有客不語只沉思畫船還傍蘆花不笑爾癡癡一日懽逝梁久矣猶思笱石湖淜湃撼船底倩此萬頃洒塵垢迺知佳節遊名山須避佳節參前後矍鑠老翁詩興劇明朝獨去登虎阜茅簷集巻三
