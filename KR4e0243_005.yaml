body:
  text: 茅簷集卷五明魏學洢撰雜著二曹允大稿序我意中有人焉眉目軒朗意氣豪上一往之致疑將絶塵橫奔而出而其人方沉深好易與物委蛇有用世之思焉斯何人哉吾黨不再思必躍然鼓掌謂曹允大其人也夫魚腸之劍三千化而為虎干將莫邪化而為龍奇怪洵不可逆揣然埋地四丈餘光焰干天石函既發是夕反隱此其故何也將無藏逾下者光逾上與易三百八十四爻大氐藏之意居多而允大湛志於兹多抉昔賢所未竟其發舒于文心玄舌快取人格格喉間數十年者一朝吐出雖古人飲酒數升恐明亮不能過也然奇氣凌厲一世精悍之色仍自灼爍楮墨間故我嘗戲語允大子自好易耳欲使子擁皋比集年少日微言終其身必不肯也欲使子挾數册治篾篐桶且賣醬於市尤必不能子若為張丞相弟子必願入後堂飲食簪珥雜繞管絃鏗鏘為樂而必不願與彭司空同見便坐講論卦義日宴賜食以一巵酒相對然則不可一世之槩究將終不可藏而微於楮墨間露奇此亦未發之石函也全稿久留余篋兹稍歸一二以公之四方四方有人勿徒以南昌土拭之錢彥林香樹林文序辦天下之務存乎大力爾矣識逾學逾亮量逾學逾廓獨氣力之猛鷙孱弱一如色身強怯不可以學而爭昔殷浩宛然謝安石也遇桓宣武則一挫不復振非氣力實出桓下哉新亭之會或至倒手板而安石從容諧笑目如無人豈非氣力實在桓上耶新亭可以折一人則淝水可以折百萬折一人如藺夫子折百萬如寇平仲譬之文字然局勢與筆法雖殊氣力則一而已力苟不逮則雖以王逸少瞻言百里之識而陳力就列訖自宕功名之外故嘗槩論江左有絶世之力而衡出之者桓宣武也王大將軍其伍也有絶世之力而恬運之者謝安石也王茂𢎞其伍也識髙天下而力不足以達託諸簡淡者王逸少也劉尹其伍也力不克為當世雄而好競焉以困則殷揚州也庾元規其伍也案伍索之逺遡隱桓近暨昭代以問學之到通經濟者十亡二三馮氣力之優成功名者十率八九才之不可強蓋若此人苦不自知妄生夢想然時有奈何之歎私察儕偶亦鮮其人淺而索之文章一道亦復孱弱多猛鷙寡也嗟乎大力固若是艱與道場巾馭乘右軍派也數語我曰錢彥林盡掃後錞之習使人快心第在以恬持之蓋庶幾哉猛鷙之儔也而墨瀋微墮亦動思辟易千人操觚家咸懾之夫今人隔昔人逺矣然各有伍伍分之後貉粵萬里往返未定徑徑堪危我尚無以定我之所之也其能定當世士哉若問肄業所及則讀香樹林文者倣佛見昔雄走馬舞槊時吾蚤有以服其勇矣易曦矦居業序余偶入禾城寓古剎燈且舉矣聞旁舍有南音僧以楚人告須臾笑聲譁入門若將有故人夜訪焉亟相逆恍然若素所昵者而姓字格格不能吐叩之則黃岡易曦矦也嘻三年前曹楨父曾寄語曦矦之為人而晤羲矦反在楨父前不大異邪一時踊躍不快遇新知而快遇舊交徐縱談文章風氣曦矦夷然薄輕巧之習謂尺水興波易萬里無波難余心領之夫曦矦文汪潏滔湯固夙信其能萬里也而習聞楚之風剽以悍或將有千里江陵之勢發其藏則率皆湛深凝毅獨以逆而奇夫文賤順貴逆非徒數行內入一二側調之為逆也又非徒尺幅中首尾掉撥能蜿蜒夭矯之為逆也心洶洶欲奔諸筆筆洶洶欲奔諸紙巨力者逆挽而進兩息交屏萬響都寂當此之時心徑寸爾窅然入萬丈之底逆而勝如百神之遇神禹留徙惟命或不及勝而決以出則沸然成蕩天之湍不過洶洶時一加鼓鑄爾而文之奇乃百倍豪傑所以重忍力也且不見玉局之賦􅗷澦堆者乎勃乎萬騎之西來忽孤城之當道夫洶洶傾注時方將驕騁以往而忽焉遇巨力之控制是亦文心之􅗷澦堆也雖然江陵順流之奇尚未得一縱觀焉奚􅗷澦之知請舉狎見者為曦矦徵頃赴禾城從武水挂帆而西也舟子踞船尾嘯呼余卧船底間想之風一也何棹遲而帆疾蓋風行空中舟頗不相及髙為之帆以逆之風怒而舟遂駛人見其駛也以為帆之乘勝而長驅不知乃風之辟易而疾走也處極順之勢究竟得力于些微之逆者蓋如此余不諳江道焉知千里之奔流非亦抑鬱後之得志也哉嗟嗟尺水之才誰堪語此其幸為我質楨父海內同調貴相知心奚必盡須頰而識之雖謂見曦矦即見楨父可也且曦矦示我以遊草而使我並居業則雖謂余與曦矦輩日相集而䇿修辭之業亦可矣易有功稿序有功頃從鹽官來亦曾觀海潮乎潮之來也奔者如馬立者如山沸者如百萬之驕兵圾圾乎孤城之若塊也而及其去也咄嗟之間坐見滄海無寸水水之靈怪蓋若此嗟乎文章亦然天下之字散布于胸中而能者撮之為句天下之句散布于胸中而能者會之為理天下之理散布于胸中而能者挾其飛行之氣以出入于楮與墨之間汨汨乎其來也洶洶乎其壯也漰漰乎其不可禦也漭漭乎不知幾千萬里也從而想見蛟龍焉從而想見吞舟之鱗焉從而想見金銀宫闕焉從而想見隋之珠和之璧珍奇寶藏灼爍騰光怪者焉自行自止自來自去宛然豪傑踞將相之位舒卷惟意而作者莫測其所以然一日氣窒識如故法如故辭藻如故而筆墨艱澀蹜蹜不得展縱有精思存焉亦且如尋丈之魚偃蹇橫躓于乾砂涸礫中騰躍無策此則智勇俱困之秋也而作者亦莫測其所以然殆實有鬼神使之能者寤厥所繇夫乃為專氣之守罔頽放于無事之晷罔消散于得意之會逌逌焉聽吾息之疾徐而偕之寢處昌谷云一泓海水杯中瀉青蓮云黃河落天走東海萬里瀉入胸懷間奇景躍出蕩于目而沸于指終屹弗動然後真氣來往不至飄忽而難期聖人出東海不揚波此則退藏于密者之使鬼神也曩余辨曦矦稿微逗私指語焉不詳讀有功文惝如望洋焉竊驚怖其言之無極也于其行也申以叩之錢仲芳晚香堂稿序我今日而始得一畏友曰錢仲芳仲芳余髫時侣也筆壘角逐文心日奇然心腕狎熟兩相視為吳下蒙頃從天雄歸談寇平仲韓稚圭兩公往事沸然志經世焉已出其晚香堂新搆精奇偉碩巨響驚人然我蚤億其能驚人勿驚也徐語及身心性命蘄盡泊衆嗜以決鋭於其所欲往使我憤涕欲雪愧汗如雨十年來頑同石獅此夕頓覺疼熱嗟乎士生當世而傲焉自命千古之文人特懦耳非傲也士所應為止此哉唐宜之近簡余云文章之妙是兄能事餘事世間自寶重此事要不過數十年文彩耳學道之緣則又不在此今仲芳慧習偶寄文字中因從墨光見奇假令辦萊公之鐵骨與魏公之鐵膽而挾之以經營四方暇問此驚人之響也邪又不然掀揭影事隨緣卷舒且向殘書剩本中循一字半字以入忽一日相視微笑徐取所謂晚香堂稿者碎而煨山家之芋魁紙盡火傳小熖青紫我亦取我之茅簷稿續焉爾時豈有戀乎嘻此百年前嚼木語也微仲芳我誰與味此夏侣龎靜影齋草序侣龎有冷癖非興至不浪墮一墨瀋大類五日一水十日一石者會興盡隨復棄去散亂几上下或存首失尾或存尾失首任蝸涎旋其間豫每見輒拾焉篇什殊不可數數得也而吾黨問文心誰慧不得不以此事推侣龎吾嘗論文猶影也物各一形而更得光明旁映之則分身現而變態生題無定相貌之以文人之慧心則奇幻出焉且觀日昱乎晝月昱乎夜燈光昱乎書夜隨物形一俯一仰影有不偕之往者乎然而影之修短纎巨恍惚變換未始一一與形肖也然而形之變則以此盡東坡泛潁詩云忽然動鱗甲亂我須與眉散為百東坡頃刻復在兹形一也水則幻作多影焉漢髙帝入咸陽獲方鏡人直來視之影輒倒現形一也鏡則幻作倒影焉天下之物孰有幻于影者哉是故善畫者亦往往不貌形貌影形似者洵不敵寫影之盡變也侣龎想有别徑筆有别調倐訇訇隱隱挾萬騎奔突倐飄飄在孤雲深塢間倐幽艷如花前麗人忽忽多恨倐又如老衲一瓢一麈道心玄淡隨境所入以侶龎之巧心映之以侶龎之巧手畫焉無往而不奇竊笑彼還筆還墨者不憖一出靈巧殆回顧見影而驚以為木魅者也唉彼惡知文人有慧業乎曹允大臨場義序允大歸自杭以臨場義屬余序魏子曰允大之售以文也文不若允大弗售也然則天下偕允大而售者盡允大也我不信也允大之售尤以其臨場之文也文不若允大臨場之文弗售也然則戊午之允大逈不逮辛酉之允大也允大亦不信也隨矦照乘也久矣時至乃鬻喃喃焉先衆喙以佞人將無固與杜甫云文章一小技于道未為尊夫豪傑之士目營九州衡門下苦無以自寄其卓犖之槩于是姑就肄業所及神而明之冀以熟運其智慧而緣與習深不覺羈鞿于其中罷精神送時日未嘗不恨江郎之筆不如陶家之甕也以允大英姿勃發蚤當雷詬電擊灼爍宇宙間而浪費其力于翰墨場者越十年是役也亦唯疾去焉之為娛其徒以此轢天下士哉雖然允大售士自此且大譟矣有怖其橫行于文者有窺其苦心于文者怖焉者曰噴山欱野奔突非常窺焉者曰鼓行金止部伍故在于是牢騷者出而嘆曰允大故竒于文者也闈中好平故臨場稍夷或從而反之則又曰是不然允大故奇于文者也闈中好奇故臨場益奇我恐允大無鬼谷之術未必用捭闔干之乎間而事後占望者且人人自以為文中之許負也叔旡咎稿序子瞻好諧謔此子瞻一病也乃自詡嬉笑怒罵可録而誦而末世纎士爭趨之彼所謂屈注天潢倒連滄海者杳不可復得而牙頰之慧乃特熾大抵亡慮皆尖巧逼仄矣小慧飛迸頥亦時一解焉然譬如米顛奇石嵌空玲瓏不過袖中玩也東海之濱泰丘萬仞秦皇帝懸車束馬崎嶇暴風雨中而跛牧羊于其上豈不更奇壯耶且士之大其識也慧想欲茁寶而懷之當使如指李之叟在母腹七十餘年凡世目之所驚怖與胸所浡浡焉欲跳喉舌之外者疾睨之若無睹也夫以絶世之解尚將以深深之息柔之曾屑鬬牙頰之智哉雖然我將強使尖巧逼仄者舍其習而遊于寬彼實不能蓋針之鋭鋭也刺指指殷借刃焉斫防風氏之脛則廢然走耳夫士也似性實格之及周觀天下何天下號工文者半若儔也則又似有風會焉元夫子曰今之作者煩雜過多歌兒舞女且相喜愛今天下實類此矣當吾世而有人焉偉其幹鼓其氣昌揚其詞以力追盛明博大之風而又不為頑砂莽磧詒嵌空玲瓏者口實是之謂大觀其在吾叔乎其在吾叔乎蔣去華稿序往豫客蓮墅也同業者為蔣若滋去華兄弟及當湖周石僧石僧好劌刻日暮舉燭光煜煜短紙上髙吟甚苦若滋擁膝枯坐時彥所漁獵滿槖者悉屏去須字字如牟尼珠故其索之也亦艱豫謂去華曰文章快境要當令蕩胸生層雲耳何戛戛自困為每拈題竟輒相攜遊舍後之圃少選豫索筆墨甚急去華方尚羊薔薇架間弗顧也呼之迫則揮袂疾書峰峰相接波波相續深合宋人雨翻榆莢風轉栁花之句退而議者未嘗不心懾以為此犀利才也比幽情别駐則永日留花間者容有之以故一時目去華有懶癖而豫特以筆墨狼藉為二三子所誚邇來豫稍覺寤不復擲日月于句字間舊學漸墮私自笑子敬尚懶懶于子敬者更何如矣及問同社爭奇近誰雄長則唯有最懶之去華為獨酣噫嘻吾蓋蚤知之謝康樂如初日芙蕖此固以天勝者而鬬捷反後顔步兵特自耽池塘夢耳彼才庸可量哉獨念意識之轉疑進疑退一似各有候焉而弗可以強為我勤子怠我怠子勤尚未知兩家之説誰短長也請寄問髙吟與枯坐者錢爾斐冰雪文序憶爾斐髮初燥也英毅特甚不數年歸禪悅神采泠然私怪虎子勢忽焉安往昨歲作浙忠詠詠兩浙遜國諸臣又和仲芳短歌十章弔殉遼將士慷慨悲壯冷鬚眉忽然怒張吾讀之喜而不寐邇又見其擬陳政事萬餘言有痛哭無太息精力磅礴非若賈長沙前鋭而末稍漫每客造余余輒挽其裾而朗誦焉日三四周覺黃河萬里汨汨奔吾喉舌間也隨詒書云天下豪傑無多人一二翹然露鍔者不轉盼便以重擔加其項耳爾斐勉乎哉乃者偶索得小題藝一編自題曰氷雪文竟有似東野避俗自攜者夫昌黎奇東野善鳴而眉山深憎之憎其寒也爾斐惡乎寒縱曰離奇夭矯不合世蹊俗見之當大驚俗則避爾斐耳爾斐誰避哉爾斐不可以無説而處此也請為子實之古豪傑大有為于天下者未有不得力于髙寒者也豪傑妙用在智而古人之以四德匹四時也智獨居冬冬之候氷剛雪皓萬物固藏而作易者獨以此為天地用智之時可見聰穎才辨爛若春葩而不復存氷雪凝凍之意者皆智薄之徵也且天下莫奇于用智而冬之德偏言貞又可見不奇不足以言智不正不可以用奇而苟負正性其人􅍘未有不具寒骨者也古大豪傑雖身居將相噴焰燎原而凛然之色常使妖穠俗艷不得侵豈非萬壑堅氷千巖積雪固自有晶瑩朗徹于焦腑之間者哉論至此則所謂冰雪文者覺剡剡然寒光射人矣陳似木白雲軒文序似木僅十七耳而有大成之風每與我言未嘗不祗畏焉論賦毅然戴楚蜀蹂齊梁論文毅然輊秦漢軒歐蘇論道術毅然帝鄒魯夷老釋宗程朱孽陸王下上千載進退萬家守繩者必崇諧俗者必黜至夫李氏邪説袁氏綺語纎士之所狂騁湎溺于其中者直洪水猛獸距之其為經義也昂昂若千里之駒堂堂若大將之師視纎士之妍容巧舌直賤優也才與識若此奚患不千古而標格過峻意稜稜若秋霜會當以朝曦煦之私嘗與言曰我中俴而外峭病與爾同是用拾格言爾詒爾殆意我為日刓也夫天之觭也畀一長者匹一病人之矯之也病則弗去而先去其所長我臨岐塗而踟蹰蓋已久矣夙習陡發猝若干將之不可揣相嚮同病者我爾又依然誰昔也已我病無隕爾長我爾當奚從焉語云奔蜂不能化藿蠋越雞不能伏鵠卵魯雞固能矣我聞近古有純人其偕爾則大程乎苟置此文莫我猶人也文莫爾猶我也陳則梁稿序庚申秋讀則梁易屑為之序冬讀莧園集八區得縱觀其全然燭諦想未嘗不駴詫其奇也辛酉冬寄我韋先生傳尤奇絶視元美傳次楩中郎傳文長不翅軼之急索數十帙分餉同好而則梁靳勿豫頗用為恚乃者過茅簷示我侖者災再得縱觀其全則瓌矞倍曩昔焉因戲則梁曰子繆負奇僻爾應世藝毋得猶人則梁徐探近稿投余峭若亡胔清若亡淖比其蘢蓯浡興也則若八紘八殥八澤之雲足以雨九州而和中土嗟乎若則梁者真欲以此道圖後凋者也昔蘇子瞻語舒煥云歐陽公天人也意天之生斯人甚難非且休息千百年未易復生斯人余懦人也意遂信之直願與造物者相恬無事矣而世乃有強項如則梁者乎中央帝七竅倏與忽鑿之殆盡而則梁持削睨其旁不休一似必欲鑿之使出八萬四千母陀羅臂又出八萬四千清淨寶目者海濱生若人吾竊憂造物休息未有期也卓珂月稿序黃帝曰操刀不割失利之期兵莫憯于志矣夫老子曰邦之利器不可以示人其有憂患也夫操刀者刃處前鐓處後前刃黃帝之術也後鐓老子之術也刃鐓無兩柯黃老有兩術哉過用其鋭以戕物物必反戕之不通于隂符而刃是操申韓所以愁血指也卓珂月負奇性自稱其文有刀劍之氣驟讀之刻畫峻峭洵有類刑名家者比其精言握固雖隂符及五千言不能過又不覺肅然却立驚其智深而勇沉而愛珂月者猶以恣筆詆訶橫口凌轢為珂月憂夫酒入舌出舌出身失古人痛以為誡而善默者反用沉醉六十日自全詆訶凌轢惡知非古人所以不臧否人物者哉雖然竊嘗有窺焉師尚父八十年藏身似老子而會朝一戰似黃帝計當年雄姿悍魄視七十萬衆如拉朽而敬勝數語又何其小心翼翼也大凡才智搏擊之會奇鋩迸射莫可逆制而一柔之以小心則自平當此之時徑寸內亦自覺有兵氣銷為日月光者刀劍將可得邪古禮有之進戈者前其鐏後其刃進矛戟者前其鐓夫以利器為天下殺機之所聚而雍容出之則禮樂宛然矣又何事前刃後鐓者之多械也噫此古今才智之所聽熒也敬就智深勇沉者商之支小白新語序豫讀唐人詩嘆前後作者交相困前人之困類剝笋力去數層僅足攻膚殼而佳境乃在後後人之困類披沙先至者捷攫精鏐以去而後特﨑嶇瓦礫間拾賸寶自雄開元大家獨踞前後之會而奪其勝翻意之夷者使沉翻詞之木者使粲翻格之滯者使動沉矣粲矣且動矣更誰翻哉止留一尖脆僻嶮之徑以遺後而後起者亦寧尖脆寧僻嶮而􅍘不肯為初盛優孟于是一代之風氣遂日遷而不窮姚合選唐詩黜去李杜蓋亦英雄無可奈何之䇿乎舉子藝至成𢎞始振訖隆萬駸駸盛唐敵矣余戲謂少陵尚未出安得盛有敢盛隆萬者舉巨觥浮之然讀小白新語翻剝殆盡縱令醉供奉左安石右諸葛浣花叟持稷契而來亦無隙覔片席地殆又文徑之極變也夫天下風氣隨才士轉倘自此混沌遂死恐小白輩不得不任其罪矣顧孔昭耦花居稿序夫風流藴藉必讓晉人晉人不知也知晉人晉人十萬里逺矣以彼超然邁往之姿中有獨到而意之所適率爾神會蓋自有其人存焉不在態度間也余每入人書室見案頭置世説一部几硯楚楚咳唾作態兩袂間時出香氣對之輒欲嘔噫嘻風流之厄至此哉吾友孔昭神思間寂與物無忤怯怯若不勝羅綺而中實淵箸其為文殆不名一家而間出小題義供客往往翛然玄淡具丘壑之致人若文髣佛有江左風夫子長著書五十二萬六千五百言而偶一傳滑稽暫爾遂足槩名山之副哉况狀貌如婦人好女者其袖中乃有百二十斤鐵椎人固不易知知人亦不易也世人見孔昭恂恂或僅以清雅相目而讀耦花草者又未嘗縱觀篋中之藏萬一取而供之殘花劣石間又以兩袂之餘氛拂之孔昭不大厄乎余故力言其中之所存見風流不墜自與貌晉容者十萬里也壬戌草房選序每歲房書行世安仁與太沖交出而士遍以其目為之郵良亦甚苦豫患弗能給僅閲一二名選垂畢輒聼友人持去終弗閲全帙蓋非徒病懶也學道者當刻自愛護慎勿多見凡劣以長鄙夷一世之心故豫之于文也鮮所涉多所欽同社中號豫為不苛頃陳發交有壬戌之選誤以淘汰之責分責豫篇什既繁厭憎易起安仁不數過也太沖則紛然至焉大槩十不得存一而參閲時復互汰其所未汰是以所存益稀友人有詰豫者謂子故非苛于文者也盍以寬佐之噫獨不聞劉夢得之論文者乎文士各執所長與時而奮粲然如繁星麗天而芒寒色正人望而敬者五行而已豫念斯言未嘗不悚然正襟而坐也文無論工拙要期于有光光既外射更當決邪正焉彼耿耿然騰一隙之熖者小明耳譬之長夏星流曾不及霣地成石惡足比數若夫詭矞自恣光熖足以駴一世而弗協于正此乃所謂欃雲如牛槍雲如馬者也直思彎烏號落之肯令張芒角乎因嘆豪傑之有正熖者千古來不可十百數文章之有正熖者千古來亦不可十百數又何况三年然則兹選也世容有病其寬者豫故非苛于文者也五朝文略序士人習緣之深孰有深于制義者哉聚兩京十三省之豪傑晝夜角逐其內而謂百世後隻字不得傳吾不信也然自洪武迄今幸存者不過遊戲不經意之小題義而至于析理之文尤豪傑之所專心致志于其中者反習焉不工工焉不傳是誠曷故焉蓋小題義得縱其材武而入于理則束且窮達攸繫雖髙奇者未免衡世法于胸中此念不淨則種種氛壒皆得而侵之技之所以不得工也工矣片語膾炙萬衆爭拾之天下但見雷同之衆而不復知作始之囏等夷視之矣此其不傳一髙材捷足之士吸取精意别傳新藻出之天下更以後出者為膾炙而以原本為餕餘棄之猶委蛻也此其不傳二一人豎義萬衆爭出其智以求勝縱復崤函之固必舉而翻之再翻之後雖新操觚者亦得以糟粕笑前人此其不傳三始而剽襲繼而脫化終而披剝前人已無餘地矣而又或有庸譾無志者于他人披剝殆盡之日依然剽襲如初于是詬厲交集併作始者亦蒙惡聲焉雖欲以隻字存得乎此其不傳四獨楊貞復閲數十年猶新然宦稿耳蹊不合于墨且禪那也理又不合于儒故偶乘剽襲之所不到以大其年豈文之正哉許敬菴鄧定宇諸公皆淵然邃于理而乏才鋒學人罕習之才鋒敏妙許鍾斗一人而已而淺于理苦心士不盡服也唯湯霍林得許石城風度髙其幟以來天下而天下翕然宗之至今末流濫觴不可户曉論題神者謂題神不在實字在虛字又不在虛字在無字處似也宗湯者遂至低聲下氣以無骨為有度無味為有養舉聖賢精深切實之理士人光明灑濯之氣悉以柔曼銷之此其弊在滅題中之所有論題脈者謂某字根某字某句根某句某節根某節相題者須如子之顧母似也宗湯者必併顧母之母夫母之母猶近也併路人非母者而母之有一人不以非母為母則坐之辟曰法脈舛繆其煩也不啻如商鞅之刑棄灰其酷也不啻如商紂之設炮烙此其弊在贅題中之所無若此者固自以為深于聖諦者也其於聖諦乃若此意者彼亦自有獨創之竒而衆特剽襲焉脫化焉披剝焉又剽襲焉以至于此與曰非也始出時天下羣而譁之非譁其奇也譁其凡耳而不逞才不使氣其説最與無才氣者便凡平時囁嚅瑣尾不得揚眉瞬目于人前者一旦位置居豪傑之上以故類多而地日尊雖豪傑負才氣者亦俯從之此無非無刺之文所以盈天下也萬厯末士始爭自震厲而桎梏乍脫或至決藩於是則有嗜古者好琢似子似經之辭以為奧而不必衆之解中之安欺人者亦不免為人窺又有佻達者以靈變自喜譬如輕俊子弟有諧謔而無莊語有疾趨而無雅步端士弗之欽也至千蹈厲者相競為北鄙之聲則憂時者已愀然如洛中杜鵑矣以故數年來壇坫蜂起而文家牛耳終羣睨而無所歸意必挾至奇之才鋒抉至正之名理奇足奪贋正之氣正足折贋奇之心仕後人爭為剽襲爭為脫化爭為披剝而精微獨到之處終有剽襲脫化披剝之所不能盡則遂將以後人無可誰何者獨垂于大塊之間使後世讀之者莫不欣然解頥逌然會心快然擊節曰異哉經史子典集之外别有奇文焉在此庶幾哉不羞一代之業乎而吾未有所宗也徒慨然嘆習緣之難破而已矣偶選嘉靖以來文妄致其喋喋云制義自序家夫子之教余文也曰從理路而入脫理障而出以故析理自娛余垂髫時已津津焉性極浮動目有所觸神輒躍躍欲揚去而一坐蒲團萬籟無響雖迄今無一獲乎然竊謂甘苦備嘗之矣每思路初入如獨行空山苔徑幽寂衣袂間時聞芳氣又如舞雩春風三三兩兩又如蘭亭好會蕭蕭散散若有意若無意得趣特深蓋爾時揣摩之念毫不入於胸故往往有雋永之味焉甲寅年始入閙場相務為聲色砌之湊之修之削之種種俱墮苦海乙卯後始憤然願為天下雄戊午膽氣差王手腕漸熟庶幾乎運斤成風胸吞雲夢澤筆湧若耶溪時時有焉興酣落筆搖五嶽詩成笑傲凌滄洲時時有焉一拳打碎黃鶴樓一腳踢翻鸚鵡洲時時有焉然有太白之跋扈飛揚而少子美之沉鬱頓挫其氣往往噴薄激射而不可遏出以質友人友人有時解頥有時擊節又有時瞪目直視由此觀之今文可喜者固多可愕者更不少也廣東知非和尚戒余云子勿使善氣善氣惡氣兩者並行世間無有差别余因思生平跳蕩之氣先伏于心而徐發于文又將遍現于容貌顔色辭氣之間此必非快然自放而已其螫必將有所中思之不覺汗浹且氣安有能籠罩當世者哉曹操挾鷙毒之性握生殺之柄一時豪傑各懷蹈虎尾之懼而禰衡毒謔怒罵恣其馮陵其膽氣誠有大過人者而李白無取焉曰魏武營八極蟻觀一禰衡及白之氣使髙力士於殿上也乘醉落筆旁若無人自以為一世之雄豪而玄宗又目為酸子可見氣之不足以動天下若此是故一往無前之氣必抑之使沉夷之使平分毫無異于庸人然後可以荷天下之事而不僨况文士尤浮蕩而不根者哉且吾嘗遊杭之山矣初涉山麓湖光千頃迤邐而上西湖忽浮樹杪間又數武忽覩浙江之濤又數武見東南無際汨汨焉若黃塵漲天者蓋海天接也俯視西湖不翅溝澮同行者踊躍呌絶謂生平壯觀仰看松梢日輪可捧而袖也反而問山僧曰頃所登嶺何名僧曰無嶺也曰髙甚矣何謂非嶺僧笑曰樵徑耳同行者相與爽然若失可見文士嘐嘐自以為氣髙天下者皆認樵徑為峻嶺者也當世不少智人下瞰文士渺乎甚少咆哮者如蛙怒呌號者如蚊鳴雄奇者如家雞稱霸于羣雛之中而余乃傲然弗顧謂胸次之磊落鋒鋩之鋭利遽可自張其熖而弗思調劑于中和不亦陋乎余今而後將空其中以受當世之藥石脫理障而出仍復從理路而入庶足以破樵徑之小觀而鋤衡白之頑骨矣嘻此豈易言哉此豈易言哉己未孟夏命老蒼頭録舊稿百餘篇而書此為序送錢彥林序彥林吳人也有燕趙風平居慷慨論人物小不快毛髮盡立以此臧否古人多矣古人不知也以臧否今人今人乃大恨夫彥林豈苛于人者交遊有一善未嘗不津津道之其意直欲遍告諸當世之人或弗應則齗斷然與之辨其好揚人善若此然至其詆訶人也亦復痛發無餘辭雖素見譽者莫不人人自危也嗟乎目前之人畏子敬子者多矣愛子者幾人哉屬者尊人出讞三輔獄報命還朝彥林將其家以北當與燕趙之士遊窺其囊則詩若古文辭凡臧否古人者皆在焉試從耳熱之後按節而歌之以求友燕市中豈盡如目前之人不相亮者哉然我嘗與北歸者言矣問有俠而隱于屠者乎曰無有也問有歌風擊築其儔乎曰無有也所見士大夫率深謹寡言頂與踵恆相接如是爾矣然則以彥林遊其間又安能甚諧也邪慎之哉吾憂其申申而詈子也子長年二十遍遊江淮而文益奇子適如其年歸囊之富必有百倍于今時者吾將試其臧否古人者何如也贈孫癡序六七年前曾遇一癡人蓬頭穿窮袴果腹而修髯性嗜酒口中多作不可解之語一發輒奇中人邀之相或瞪目直視竟日不肯對或逢人道上則又傾倒言之間發人隂事為市兒所笞罵笑弗與較叩其姓名不答固叩之則詭曰我沈雨修也因共目為沈癡沈癡云今年來忽詭而孫衣冠舉止稍易向年狂態而奇中處益絶倒頃相遇錢監軍坐手大杯灌塞上葡蔔酒喉間汨汨作江濤聲縱橫諧笑髯張如戟令遍相戲下蒼頭鮮首肯者再閲天雄健兒亦慨然發無人之歎意勃勃欲封狼居胥也於是舉坐矜肅歎雨修非癡人而雨修則出一橫幅率相逢者所曲繪其癡狀嘻嘻昔海嶽忿米顛之目至有辨顛帖而雨修顧惟懼癡名之不歸人既不信辨顛之非顛也其誰信認癡之真癡哉嗟乎余嘗慿弔往古聞沈深負奇者多托一奔走之技以物色天下士而天下士沈深負奇亦多佯狂垢汚使人不得聞天下大矣屠沽中豈無有材堪將相者乎子且飲我將以問癡者壽錢母序代大人錢長君居長安念母太安人甚以疏上聞詔許歸省適會太安人七十里中歡然謀所以觴太安人者而某適奉使過里咸語某曰子年家子也其善為太安人頌某再拜言曰慈母撫髫孺之額而祝之貴鮮不望為廟廷用者也逮起家事主鮮不望其霖雨天下然人主處璇臺紫宫中一念聖膏澤數十世一念頗霜雪亦數十世其始必各有一言入其隱以種數十世之因而外廷莫知也朝夕經筵者或知之第使映心之語纂組以入君上之黈纊而片言神動則濡澤于物將無窮是以賢者恆樂居焉又或延佇朝端無可為黔首請命即德意層纍而下逮官府文書止矣終不逮赤子之身志士或恨之譬之委嬰兒它人手而旁睨焉旁誨焉縱人盡如我終不如內諸懷而親哺之之為快也故良二千石之得行其志也與天子侍從臣等蓋嘗論之親乎上者功大親乎下者澤浹皆足快霖雨之願者也今太安人誨令子蓋有成績矣長公遭遇明聖顯皇帝親擢為第一人天球太衡寶之次君又方為天子守股肱郡髫年所祝何以踰兹長君入禮闈也每日焚香祝天曰臣委蛇辭臣之末靡可藉手以報明主是役也願為社稷羅賢人太安人聞之色喜往次君讞三輔獄多所平反邇守大名聲名蔚然著焉太安人聞之又色喜兩君所以怡太安人者何如哉方今沖聖嗣服殷憂未平大名古天雄地正萊國所謂北門鎖鑰者京都保障實馮焉疇沃帝心疇固封守吾知兩君慰太安人者當有在也夫世人全活鱗介尚能為其親延齡况兩君佩慈訓也以出方且夀吾國夀吾民而太安人取什伯于億秭中夫庸可量邪某不敏竊謂引眉夀于無涯者莫過于此敬隨諸君子執爵以獻賀某尹序代安福某矦令瑞安仁聲遐聞於朝僉謂瑞安不足以久辱也於是下邑二三同人在帝都者相集謀曰若忘里中父老言乎行矣善事天子苟圗利桑梓其為擇廉令當今百辟誰有右某矦者乎舍此其焉求由是則冡宰以更邑請矣而瑞安吏民聞之馳詣中丞直指籲留者日數千人乃合疏上請如吏民言諸同人復要冢宰固請久之乃詔許下邑方矦之遲遲來也窮鄉之民日出挽市人衣而問曰公來乎曰尋至矣民則大喜歸而傳告里巷已見迓者弗時至復疑曰公來乎或曰弗復來民則戚戚自恚曰吾儕小人窮民也敢冀乳哺乎且怨曰諸大夫孱儒耳豈能致良吏與汝曹無何矦至民大喜過望既下車吏例進器具財用惟腆矦愕然曰誰實作俑乃蕩中人數十家之産以媚新令趣持去更以其直進我將購田埋骼焉自潤名一錢以上者有如日令下民皆引壺觴相慶而好持令短長者咋舌寒立尋出教與門下諸胥史約門外主寬門內主嚴居無幾悉汰諸胥史冗食者又居無幾悉發其宿辜被譴者帖若乳貙之就束也而小民則快若燖雞之出湯火喜如不勝自兹百政具舉令朝發而謳吟夕作咸謂矦之于民也洵所謂殫心者而矦則時進逢掖士商藝諄諄然導以甘苦之所熟嘗士心倍歡會矦以覃恩拜綸綍之錫國人胥慶茂才十餘曹徵言于某某思宋韓公之入西府也蘇子瞻使門前諸生作賀啓數百言輒裂去曰明公豈此少哉要當有輔于左右者今某誠不習諛而新政之快又巧如人意所欲出將安所托以附古人詩言之在彼無惡在此無斁庶幾夙夜以永終譽往下邑之迓矦也瑞之人靳弗與相與距城闉而詬雖古雍輪鞅不前者寧越斯乎臨下邑數月耳民已豫愁渝年奏最天子復謂下邑不足以久辱當奈何嬰之念乳哺也蓋若此自今以往民一如矦之所行者而謳吟焉矦還一如民之所謳吟而行焉嘉惠庸有既乎然則二三子入賀其亦賦振鷺焉可也茅簷集卷五
