body:
  text: 茅簷集卷四明魏學洢撰雜著一易屑序易變易也善易者矚諸爻所處何位旋矚今日所處何爻匕箸之細幃幕之暱以迄輔猜主調宫禁制䟦扈掌旗皷平􅌓眙之變而翦數百年藪伏之姦㒺不瞭然覩成畫下畫上畫單畫雙畫司候於惚怳之中而偕之為俯仰夫所謂觀象之易連山歸藏遐哉邈已橋庇馯臂周醜之屬亦闕焉亡傳覩記所逮尚其占者恒多長卿誠鄙乎然解候隂陽災變也先敺旄頭劍挺墮地長翁能知兵謀小黄令以易為治微章成務之功焉而君明更直日用事尤精恨閹髙復生卒塞涌水之異爾西京易學大氐皆尚占也而子政謂京氏學獨異田何豈其然哉豈其然哉獨怪輔嗣孤塋冷火猶能邀客談𤣥今讀易注讀窮微論慮亡弗津津㑹心者湛於易若是而槩視象數為小流易家尚辭自此始晉之涎狐也宋之耽焉蠧也今株焉而已嚮其利則前足䑕後足兎之蟨也已矣成務者誰邪余乃喟然嘅善易之難其人也日夕披六韜與兵何與曾不逮屠狗販繒胸無半字者崛起握大將之權日夕翻奕譜與奕何與曾不逮窮寺五尺之䜿目不出楸枰而擅國手日夕㸃周易與成務何與曾不逮市上瞽人受錢數文或能為窮甿指辟趨之路易之無禆于人與人之無禆于易也易奚尤焉昔子雲覃思渾天為太𤣥懼其泰曼漶也益之以首衝錯測攡瑩數文掜圖告而曼漶乃轉甚故和仲譏其以艱深之辭文淺易之説千載而下意雄􅈺於辭爾庸冀寔用至聞耶律楚材入委珮出擐甲治術堪翓􅀈隆中而星辰圖書律厯至方言禽語靡所不曉人未嘗不豓而詫焉以為王佐才也而王佐才之所湛灊玩繹者則又於曼漶之太𤣥為特深嘻兹誠曷故焉葢子雲仍漢中葉子装易學猶存髙康言當身隕博士弟子互誡勿談易而獲正傳者學俱亡章句苗裔依然丁將軍也是故三方九州二十七部八十一家二百四十三表七百二十九贊其九九大運以大衍為崑崙然則雄它製皆尚辭𤣥未始尚辭也彼將以是撠膠葛而騰九閎浡滃雲而散歊烝殆不能不為艱難者與而􅨸以三筴絣以象類文不虚生然則𤣥未始不尚辭實未始專尚辭也以楚材精解數學闚徹胥靡是猶穰矦披六韜奕秋翻奕譜也雖欲不寢食斯編洞悟厥㫖而出之以成天下之務庸可得哉余友陳則梁口能劇談過雄博覽半雄而好深湛之思類雄然雄徧為前人優孟貎遷自序序法言青之于青爾則梁為小序則不翅軼雄及其為易屑也覃思研精摘抉杳微匪不戛戛乎陳言之務去而卒不持昔人荄兹之解藳本葢數更矣一準于理彼謂視古修辭寧失諸理者真令人齒冷也夙與蜀才競險而易道反於夷庚雕蟲篆刻悔猶弗盡弗悔顧幾盡之則梁而尚辭焉已哉且又非尚占也離王離鄭而往參焉其象辭之間與余既觀易于則梁氏行將觀則梁氏于易且叩則梁所處當屬何卦且叩則梁今日當屬何爻則梁嘗别為同人注矣余離于訧也差鮮余亦則梁卦中人也且叩則梁與余當屬何應一人一書一事一畫一日一畫萬人億人一畫萬事億事一畫萬日億日一畫審于斯也易將與庖犧氏接奚論商瞿嗟乎作者既不易解者良獨難方子雲著書成岌岌隣醬瓿爾陸績宋𠂻迭相述而至范望注十萬餘言文中堯夫迭相予而至君實畱心三十年苦思已不没矣詎敢望施行况易屑數言雞跖集之將雞肋擲之豈有為則梁楚材者哉然子雲稱昔人之辭廼玉廼金夫屑故金玉屑也金可以曜虎玉毋以抵鵲知必有為則梁氏桓譚者庚申七夕錢氏家乘序錢王之子孫徧天下渡錢塘挾岐黃言以世于魏里者亦四五家其族迭生顯人恒情好炎則傅之賢者避其羶則反逺焉以是時離時合無恒譜然至追泝苗裔則無不扼腕而談武肅王事眉頰皆動余往來諸錢間或藏遺像或藏廟器或有藏武肅胄者未嘗不奇之然意其好事云爾邇從王孫輔之所徧觀家乘載錢氏宗派特詳及讀武肅所製序與其慶系譜圖父寛以前七十一世為籛鏗去竹畱錢寔為定姓祖鏗以前八世為黃帝黃帝之父為少典是為第一世祖余不覺囅然笑曰嘻英雄亦復爾邪余交游多錢姓鄉知其武肅王後爾今日乃信其為少典黃帝之後此一奇也少典訖籛鏗為十世籛鏗訖武肅為七十三世武肅訖愈齋公始由淮甸入嘉興為十三世又十三世廼訖今王孫通算一百六世夫自少典黃帝以來世代緜邈竊擬其祖孫相續為萬為億為秭至巧歷不能竟矣今日乃得約略其數為一百六世此又一奇也兹隔什百武爾猶然離合之不常而思泝𤓰瓞於渾噩之前信邪其傳疑也邪然前武肅者不可考而後武肅者入宋為世胄則可考即餘派曼漶不可考而派之初分各自為岷為崑崙者則可考武肅自傳疑爾王孫豈傳疑也邪嗟乎王孫吾于爾武肅有感矣昔唐季䘮亂人寢食白刃中行者慮亡不濺血没腕而我吳越數千里之内嬉遊歌舞者一百餘年國有英雄豈非生民福邪吳越備史稱武肅微時有瞽人善相骨值武肅者再歎曰天下亂矣朞日内再遇貴人然則英雄之生又豈生民幸哉方今承平累世敵踞甌脱地以哮而椎埋之雄間出没海嶼短衣怪狀之客飄忽聚散莫可跡其後者三吳間隨在皆有緯之不䘏而憂宗周竊懼天下庸庸乆矣非英雄不大治非英雄不大亂安得材如武肅者使生詩書帖括中雍雍從經生起家入佩委出持鉞為聖天子澄清瀚海以毋詒九重宵衣庻幾哉享英雄之福而不攖其害爾王孫中儻亦有奇偉髣髴者乎嗟乎英雄不常有江南髫孺負販盡耳威名者獨武肅一人爾英國以下博古者罕能道魏國以下雖子孫披牒亦復掩巻茫然葢皆孟嘗所云不知何人也已矣身為神明之胄而黙黙鮮所感嘅自許逺志厪覬一詔祿於朝孰非它年不知何人也哉夫士亦各自鞭筴爾馮故紙而弔經綸蘄為國樹千年之績才或稍格焉姑屬其笑語所接覩記所逮嵗時伏臘所往還者相與莫逺具爾以無愧先民不然邇則弗暱而往是圗則是少典黃帝諸漠不關情之人舉引為族黨宗戚而族黨宗戚反不翅少典黃帝視之也無用問苗裔為矣此則王孫尊人命修宗譜意也浙忠錄序代大人流俗之士將圖内便其欲而外懼無解于人也則例舉古聖賢髙論之可附者以為自扞之楯遂以此人無心而天地無氣於乎悲哉自語黙取舍出處進退以至生死之闗古之人何處不立隄防今之人何處不開遁徑天下幸無故耳苟不幸有變勢必至餵豬之輩盡得以匹夫匹婦之諒笑人此忠臣義士所為中夜决起慷慨發洛陽之慟者也方今聖天子在上崇顯節烈以震厲百辟特詔議先臣方孝孺諡併賜𦵏焉命下之日臣工忭舞于朝耆老加額于野咸聳然若方先生復生嗟乎人臣詔祿而後即以要領付王家績之成不成命也才之能不能質也獨此九死不回之氣挺于天壯于學畱藏于百千萬世縱復烟銷塵隕恒皎皎與日月爭光試觀諸楊勲伐豈不炳爛當年而精采曾不敵正學之百一豈非為正氣不可泐哉昔正學少時見典册中載往喆遺跡輒慨然慕之今錢仲芳亦近取浙中鐵漢彚為二帙而正學為之先若將挈焦府筋骼日薫習刀鋸傍志士之聞風而興也葢若此頃郵寄一編遺予予為正襟讀之讀而悲恨不使我有淚千斛讀而快恨不使我有髯千尋助皇上鞭流俗之頑而迫之痛者必是編矣抑聞之泝江者必探其源養勇者必厚其本一腔裂而十族捐此特湍之遇峽而鬬者也苟正氣無根則恥心易散談它人而勃勃欲張者臨己身而忽費躊躇仲芳儻亦念平居幽獨中自有所謂汶阜者乎兩漢郡國名吏紀序王室之患莫亟于民窮傷哉今日東南之民何如也佃者受人田數畮長夏火耨持緼袍質于市以糞比秋少收數鍾粟緼袍不得歸相與聚婦子而啼總量終嵗適足供它人耳八口無與也不獲已貸貣毋錢勢家乘其迫而厚責焉度不可再貣急之度産尚浮于本則故緩之以需其息之盈一朝𣙜取雞犬屋瓦靡遺焉甚者鬻帑不繼軀命隨之矣農人曰我農人獨然耳及觀㕓棲者晨興啓市户輒愁桂玉古樂府所稱盎中無斗米儲還視桁上無懸衣者又比户然也夫天地之植何日不蕃息而民之瘠乃若此敢問財安歸乎曰於乎有兩窟焉沒之上則墨吏獵以去輦十之一二之長安餘之私舍舉世相事為故常下則所謂勢家權子母者也抑豈獨權子母而已小民力耕疾織得屋數區膏腴數畮乾餱小失人輒攘而餽諸勢家片紙朝入則産夕破倉卒自餽獲酬釐粒者已不翅厚幸矣或兩有所飽則兩勢家中剖之中人以下大氐皆壞令甲凖産定役葢猶寓董江都限田遺意焉邇士人一通籍輒擁膏腴纍千百而煩役不及又且詭覆它人田議繇之日又且為它素封者請小民日夜幾潁水之濁而不可得貧人益貧若斯者豈謂薤本難㧞哉一董少平立攝讋耳而郡邑吏剖符以出類不能無慾莫敢皦皦為百姓爭相與為儒兒意葢曰爾為彼也我為此例耳毋互相執可也有此兩窟民是以不旱澇而嵗常歉不疾病而神常癯彼農人勞困極矣利最微人又交賤之計不如為商賈夫商賈匪可以無貲也竊見庻人在官者懷檄入民家莫敢仰視至城捽其項入市庖坐而醉飽焉啗畢更重索錢又見勢家蒼頭喑啞逼人數步之外細民笑頰承之見主猶可見奴怕欲死此兩者商賈殆弗如然彼實具牙角材農人未易羡也弗能者廼抑而為負販負販不給不如摴蒱摴蒱不給不如穿窬穿窬一再試則膽張而慾倍夸于是大盗生焉夫大盗正所謂盎中無斗米儲還視桁上無懸衣者也敢又問財安出乎則唯有仍出諸鄉者之兩窟而已矣於乎田儋項梁之徒殺秦吏如草芥勢家驟遭剽掠玉帛子女灕然咄嗟頃耳而守若令方且沓沓如故本之不䘏標亦蔑圗似百年常可以苟安豈不悲哉孝宣帝拜刺史守相輒親見問二千石有治理效輒以璽書勉厲加秩賜金或爵至闗内矦常謂太守吏民之本夫處閭里而謂治本在守令守令更有本焉若廟堂上謂治本在守令則守令真治本也余故輯兩漢郡國吏之賢能者為紀治本治標咸備焉而􅈺兵者尤述之不厭詳於乎斯又漆室之啼也夫壬戌冬日慈乘小引錢仲芳刻放生彚編凡古徳導人愛物者其言皆萃焉予更以事實實之爰輯慈乘嗟乎刀鋸臨前哀鳴飲泣觸目悲痛不堪囘想頃聞齊滕之亂死者蔽河而下有婦人母子被殺其手尚抱兒者莫不哽咽應知物可憐憫亦復如是無論是儒是佛總無䇿頑此心也而恬于殺者或飾言理固宜然嗟乎人心各自知必欲言衆生當殺者此屬何意我甚願賢者勿爾也我甚願賢者勿爾也老子初繹序小時讀韓昌黎原道遂隨衆闢異端語老氏則岸然以原人訾之今而知其言之羞也諦思目前之事何事不以妄發敗諦思目前之人何人不以勝氣乖我乃何人敢譙訶賢聖乎它亡具論觀其誡孔子曰良賈深藏若虚君子盛徳容貎若愚去子之驕氣與多欲態色與淫志是皆無益于子之身吾所以告子若是而已又曰凡當世之士聰明深察而近于死者好議人之非者也博辨閎大而危其身者好發人之惡者也為人臣者無以有已為人子者無以有已夫以此誡孔子誠不審於當年奚居若輕躁如洢不有若發其痛而鞭之至聲辭交惻者乎朝夕念兹尚懼負仁人之諄復而乃訾之為原人多見其不知學也聖人之道大而無弊者莫過于易願學焉尚未有暇也先讀焦漪園先生所輯老子翼百家詮釋奥義蠭起而于心猶有所未安姑取顯達易曉者組而記之名之曰初繹葢粗令句字無窒而已它年辭義習熟視五千言了了如家人語孤存本文可也壬戌冬日勸影齋集序顧病已好苦唫也地崩山摧壯士死而後稍稍通猿鳥之路此路險怪曾經五丁蠻開之而昌谷窮其勝前而潮州後而玉局近而天池諸家以至朝鮮女人俱嘗有車轍馬跡焉此豈真不通人烟者哉然自嬴秦以來蜀道屢闢錯入蜀漢入蜀艾入蜀温入蜀崇韜入蜀全斌入蜀宜為通涂乆矣而廖將軍墨葉渡之捷至舁船上山奇幻出前人所未有然則狂􅊧險覔之功誰謂生賀後者易為力也余有懶癖不能攻堅擇一夷易之徑尚羊其間正如武陵扁舟自行自止毎遇桃花深處時復欣然儻再來失故道則亦鼓棹返耳因思混沌既鑿而復完幸遇懶太守耳若遇謝康樂山口詎足當蜀嶂哉今而後君鏟蜀嶂我向桃源宿緣不偶弗得通雞黍也不可知凡心既盡遂老于其鄉也不可知又不然入而出出而復入也不可知疑凡疑僊徑路難測蜀嶂未必不與桃源相接則我與君忽一日焉相遇于一天亦不可知也髙星弁散騷序昔夏矦湛贊東方朔雄節邁倫慨然想見其人及覽班固所次軼事髠之笑孟之哭情狀畢備未嘗不為絶倒恨不使正則聞此一散其侘傺之懷也然讀朔自悲哀命數章余又不勝侘傺焉然則曼倩至此尚不能自散其騷夫又誰散哉余友星弁善詼笑舉坐頤解有厭次之遺風而自著散騷數種顧似有鬱邑於中者始信古之人嘲哂豪傑跆藉貴勢其騷情政自深也假使星弁與屈左徒東方曼倩同行澤畔或同遊金馬門星弁與曼倩抵掌諧謔不審左徒作何情事與左徒流連攬涕浪浪霑襟又不審曼倩作何容顔忽泣焉忽笑焉騷情其有不散者乎桓譚曰史遷著書成以示東方朔朔皆署曰太史公余怪子長見知于曼倩如此必熟知其滑稽者曷不以次淳于髠之後或謂其正諌似直中情未易語又何不遂與屈原同傳也葢以其騷且騷而散也夫夏幼青維摩集序西泠之距維摩室也似不啻燕郢然黃葉舷師序幼青西泠集誡毋得綺語相呵師何以不秀鐵若余曰不然日酣醉花草間而神不傷艶之膚者也慧根之士誤落情網性類幽想類苦徑類惨澹冷寂葢非必怨阻脩也雖促語含睇意忽忽恒若離别彼婉孌善懷者亦非必其零落雖方嫣紅宜笑而徘徊擁髻已悄然野田荒草之悲洵如是也自其懽忻悽惋之屢更而所謂夢幻泡影者已歴歴嘗矣穠華相逐去去忘歸境入淒凉愴焉囬首一夕油壁之影漸沒而寒鐘驟聞履下即無生路也然則維摩室隔衆香國四十二恒河沙佛土尚聚彈指間何况西泠也耶雖然它年方丈畢集女人以花散幼青身且觀幼青墮否墮則追憶昔侣幸偕我入薝蔔林余將拾花微笑曰仁者勿復夢西泠也曹𦙍矦招隱篇序淮南小山賦招隱士招隱士使之出也陸機招隱詩招隱士使之入也王康琚從而反之謂大隱隱朝市則介出與入之間嗟乎八公山之雞犬未必同升而憔悴憶華亭之鶴隱之難乆矣其孰從而招之隱不獨有隱徳亦兼需隱才考槃之詩曰獨寐寤宿永矢弗告葢既隱者必不復招人而北風之詩曰惠而好我攜手同歸凡招人者必其未隱者也詎獨未隱而已且懼弗獲隱焉曹生𦙍矦余隣也夢寐恒在山水間余樂其人時與飲酒出其所為古文辭相示曰招隱篇大都寫薖軸之娛而余讀之顧不勝雨雪之痛愾然作而酹曰子毋言當今幽山叢桂之間不待其招而往者幾何人矣顧有不能隱如余者日僕僕闤市又有招隱如子者與余為比隣得無復有招招隱者乎悲夫小集自序至人之所味必淡其取諸古也亦不貪故墳索之圃天下之所縱漁獵也而泊然弗嗜或衆所共著時取而諦藏焉葢亦猶宣曲之豪不急金玉而急倉粟也奇好紛紛曾足駐一盼哉而文人則異是目之所接無不可艶羡正如見蒟醬則思開僰道見卭杖則思通莋都明知無毛髪之禆而多欲不禁終以自疲此揚子雲所以中道悔也予于物幸少嗜獨悞好書好書悞已且不羞為辭章之士於賦好正則於詩好元亮每逢木葉揺脱意悄然而生悲未嘗不歌離騷也尚羊籬落逌然如有所㑹未嘗不吟陶詩也悠悠無事借古人之遺榘以自遂嘯歌夫亦何不可而奇好外偪或又舍此而從之繇是賦則軼入于夸麗之塲詩體亦棼駮而不可壹心之不易淡也葢若此竊聞之嗜好千變復歸其初是以發軔恒於斯税駕恒於斯予習雖屢易乎然叩諸中而津津焉娛予心者故有在也它年馳我牽反我所而佚我焉其仍在三閭五栁間乎秋殘十咏小引常笑杜工部破屋數間狂風巻其茅以去飛挂林梢邨童攫取之自此長夜沾濕斯亦黯惨之至矣而詩顧曰安得廣厦千萬間大庇天下寒士皆懽顔嗟乎公之念天下寒士若此哉余所識才士無多人率無弗寒者而顧病已家為酷貧其友王蘭九之貧也則併無家嵗且暮病已過余曰蘭九行至矣纜船我門前枯樹下我兩人者將以嘯歌卒嵗因出蘭九秋殘十咏視余余讀之懍乎若薄寒之中焉夫士之坎壈懷不平也雖春原芳艸裘馬翩􅗁對之常有悽清之色矧以秋人為秋聲且得不神顇乎若劉晝每言使我書數十巻傳世當不易千駟今蘭九挾崎嶇歴落之調其所以致窮有餘矣而又好與病已處其窮殆不可量詩安得不傳吾知千載後定復有﨑嶇歴落如蘭九者向秋風黃葉之下倚扁舟而讀之讀已復歌歌已復泣泣已投其紙于流將見此數咏者飄飄焉泛泛焉出没于荒蘆􅍘岸之間也題周伯譽集後余之知麻城有周伯譽也自讀江漢人文始也葛水鑑評伯譽不擊刁斗絶似飛將軍而舳艫十里旌旗蔽空則飛將軍未嘗有此大戰竊歎詫以為知言比訊其人則麻城已無周伯譽乆矣頃與易曦矦語相對惋惜且詘指海内名士凋落殆盡泫然悲才人之易折嘻兹䂀矦懟辭也曦矦從黄岡來所經山川之紆曲人物之龎襍其間以才死而惋惜焉者僅數人以不才死而泯泯焉者不知幾千百矣誰謂才人偏折也哉獨以伯譽奔騰澎汃之勢噌吰鏜􅝅之響度將逆三眉之顔行而轉鬬而前以决勝爭霸于天壤之間而忽焉中道夭三立未成溘先朝露墓籜再霣後浸淫與泯泯者俱已矣才人不獲盡其才是則才人之怨也嗟嗟李白謫仙也不得嚮天上圖一捧硯而李賀獨被召奇矣然李賀去踵賀後者仍不少得毋字刳句砌不稱大篇白玉樓中亦復紙下如飛也邪伯譽死才人自此鮐背矣短歌䟦墮地而後刻刻皆死期也但未測死法耳死于餓死于杖死于縊死于毒死于水死于火死于刀死于鑊死于千鋒萬鏑人總謂不如死于病嗟乎枕席之上悽淚暗滋苦汗猛迸嚥㗋輪轉一響而絶亦安見其愈于烈烈死也哉丈夫身荷軍國方以徒死為臣子辠豈堪更以不死為君父羞世之豪傑自命者未及見敵騎輒踉蹌奔還抑何其不知慙也友人錢棻弔遼死事將吏作短歌十章敲如意歌之聲辭慷慨余歌信公詩為之亂曰人生自古誰無死畱取丹心照汗青浙忠詠䟦曾不聞錢生斆吟也往嵗忽作戒殺詩十章剴切奇妙逈出子瞻汁韻詩之上頃余讀仲芳浙忠錄方為之慷慨流涕而錢生忽投浙忠咏一編微獨激昂磊落足與慿弔古人即其詩古澹幽峭韻格亦直踞第一流嗟乎丈夫在天下一蟻子不忍與作苦事大節當前視頭顱一蟻子耳壯哉錢生豈徒斆吟云乎哉茅簷集巻四
