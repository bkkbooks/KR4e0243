body:
  text: 茅簷集卷七明魏學洢撰雜著四志伊尹之所志論士君子之矢志也必一噓一吸恆與天地萬物偕流行而後適滿其性量之所屆蓋性也者通天下者也乾坤之小往大來蒸民之嬉躍條嘯以迄卉木榮悴昆蟲鳴蟄罔不惻然如中其肌膚而其救天下也始急其任天下也始堅苟所志漠與天下不相關縱孤詣凌一世乎不過了一人之事而已於天地不得為功臣譬如曲澗清泚石齒齒焉漪瀏瀏焉不過餴饎資也孰若應龍伏層淵之下奮層𤣥之上而挾江海之巨流以霖雨九垓也哉故志狹者成就狹志閎者成就閎規局萬岐總各肖其初願之所擬此子周子所以論希聖者必志伊尹之所志也而疑者曰尹之志竒矣相天子放天子而復放其所相之天子而復相其所放之天子非常之原黎民懼焉誰復敢蹈其轍跡哉而不知此特尹之轍跡耳非其志然也志何在曰思天下匹夫匹婦有不與被堯舜之澤者若已推而內之溝中嘻大哉志乎躬耕此志應聘此志就桀此志逮其後牧宫之役桐宫之舉冒萬世之不韙而直遂焉者總此志亡論草朽木腐如巢如許如樊仲父石户州伯者不足語匡濟之竒即優游黼黻如夷䕫諸佐亦以為非救時之相之所為也而豈孑孑焉了一人之事乎哉問何以究此志則曰堯舜其君五十里之主創十一征之烈而九有之民歸之如流水是使湯為堯舜也因而以事湯者事嗣王是使太甲為堯舜也尹嘗有言曰湯雖仁其效遲桀雖㬥然朝行吾言而夕及于天下是併欲使桀為堯舜也夫抱一救民之大願于心而遂望人人皆堯舜若此然則後之志其志者可知也惟有一仕而已矣汨焉而弗任援也懼其濕我履也焚焉而弗任拯也懼其焦我裾也若此者了一人之事者也一于諉者也勿為也孔子曰隱居以求其志未見其人政以獨行之士力苦而志不廓自為之意居多焉志苟大矣則見人之不善若已推而內之湯火中方將疾呼狂奔而救之寧僅如探湯也耶此所謂一噓一吸與天地萬物偕流行者也一于任者也總之聖賢立志其心未有冷于天下者也處巖穴必不敢曰葹薋薜荔聊以資我嬉游處廟廊必不敢曰兵農禮樂聊以營我職業處蜩螳沸羮鼎顛震矍必不敢曰呼吸之間有雷有風有兵有戎天下悸忷聊擇一無大罪無大功者以巧脫于其間蓋其一念救民之志縱窘于不能救不可救不及救之地而夢寐仍耿耿不釋必期一伸而後已所謂志尹志者蓋如此竊嘗俯仰今古衡量豪傑李唐後得尹之似者凡四人識似者其懷英乎周唐之際如挽天潢以濯四海之汙而不見有覆手之迹此得其識者也氣似者其平仲乎一談一笑光焰萬里此得其氣者也膽似者其稚圭乎驚危之地賁育且為之肌粟而魏公獨不懾此得其膽者也心似者其惟洞霄宫使乎萬死為歸九天為正臣血欲枯臣骨不朽此可謂得其心矣雖然之數子者或龍而濳或龍而躍或龍而亢且悔舉足以霖雨九垓而較量在才情氣魄間則猶然轍跡之相尋也求志之士有願超轍跡而寤性體者乎請從學顏子之學始韓非論魏子曰韓非其衛鞅乎鞅天資刻薄人也相秦霸秦車裂于秦而韓非乃繼起生韓非死衛鞅也鞅入秦而相非入秦而死然吾不以置軒輊也死韓非生衛鞅也獨李斯之譖行而天下傷之者以為非業不及鞅又曰非才過斯而卒以斯故死非遇不及斯斯相久矣非以羇旅入秦輒思翹其失而奪之位非䇿也則又曰非智不及應矦睢惡是何言哉應矦入秦昭王方失勢而倚任為獨尊故得遲之數年而一朝發之始皇時天下既定矣擬一再嘬而啖其全矣而主臣相得斯又方自託于摯望之儔非新從韓來苟不效蔡澤之逐應矦且奪之旦夕間而敢幾幸于曠日持久之後哉故非入秦而死天也天必死之未有能生之者也不為應矦死為應矦亦死未已也為應矦死即為衛鞅亦必死即甚焉而為當日殺韓非之李斯亦必死曷言之非韓人也韓人入秦即微斯將無猜乎就使始皇見說難孤憤五蠧之書而慨然與之游逐李斯授之上相不一年而為韓之情形必自敗也敗則非亦必不得其死故曰非之死未有能生之者也欲勿死則莫若用之韓用之韓則藉弱韓之資而信賞焉必罰焉堅城而廣蓄焉今其書具在固灼然僃成畫于胸中者也或從或衡借十年之暇以內修之國中韓雖憊尚足當天下之衝而兹又已矣不得已乃思存宗國於秦廷不亦難乎吾不能不三歎焉荀彧論獻帝春秋曰董承之誅伏后與父完書言司空殺董承帝方為報怨完得書以示彧彧惡之隱而不言完以示其妻弟樊普普封以呈操彧恐事覺欲自發之因求使至鄴勸操以女配帝操曰伏后在吾女何得配上彧曰伏后無子且嘗與父書言辭醜惡可廢也操曰卿昔何不道之彧陽驚曰昔已嘗為公言也操曰此豈小事而吾忘之操以此恨彧彧卒憂死袁暐載彧之陋若此裴松之極辨其誣唯余亦深以為誣也獨計偶無是事耳果有之當若何曰是不難泄人言以求利勇士不為況危君父乎文若之不言固宜或見詰則從容對曰彧蓋熟思之自董承既敗公僃天下之為董承者密矣奚報怨之有使遽然白之則㬥怒之下舉動易乖或將有投鼠而忌器者天下萬世其謂公何此彧昔日之所以不言也豈獨昔日不言而已即今日事覺猶望三思後行毋詒忌我者口實如此則辭直而謀忠操當為之奪氣縱不然豺狼肆㬥毅然以大義折之豈有九錫且力爭而不爭弒后者哉抑嘗案年核實彧仰藥于夀春明年操立為魏公又明年伏后被弒賊操之狠必無藏毒數年者袁暐之繆又不足置辨也已擬治安䇿竊聞之極治可以有為極亂可以有為中伏危亡之幾而外蒙治形是焉可以有為哉匪獨不可有為也并不可以有言宋蘇軾曰天下無事則公卿之言輕于鴻毛天下有事則匹夫之言重于泰山方今承平日久士大夫聞纖介之警恐恐如不及夕聲息少怠則復縣縣焉如將層纍而上以至公卿訖黃髮兒齒而猶未已有杞人睂為之顰未有不欹脣而咍齒且為冷者也嗟乎賈誼謂抱火厝積薪之下而寢其上猶危明耳今則實類于此清平之天下溫飽者享之窘迫之天下羣推而還之人主人主乃倉卒簡付責之平日不任世福之臣火未及然豈容謀徙薪者置一喙哉詩云彼人是哉子曰何其今日之謂也雖然請敬陳其愚夫當寧所蒿目而籌者敵也敵不在邊場在華曷言之今天下非嘗罹水火塗炭之苦也非有大徭役鰥人孤人不能自存也非有九年潦七年暵浮骸枯莩之相枕也敵人困一方耳又非遽為天下病然而黔首思亂頰肉衡起市上年少游食往來多好談非常之事巨盜出沒海島者張其焰以招亡藉亡藉多樂往萑澤之黨亦且殺吏卒燒官艦甚則道遇邑二跪責而醳之民懷百金以上得鼾睡者蓋寡矣至于狀貌詭特聲音衣服龎雜彯忽聚散者遍播三吳間度必為所不可為而莫能詰其蹤尤有隱憂嗟乎今時何時尚可不察其景也邪昔魏羽林郎焚張彛第殺其父子髙歡曰時事可知矣遂散家財結豪傑今蘇松諸郡細民憾巨家者動輒火其居掠其財驅散婦女官吏莫敢嬰其鋒而亂從怨生遙聞者往往稱快夫自古奸雄舉事未嘗不挾衆憤以為端憤怨下泄大亂之本也危亡之不恤而快私臆以為嬉維彼愚人覆狂以喜斯之謂矣邇天象屢變國遭大喪人心恫疑未定街巷飛語日數四相驚傳稱熒惑星降地則為兒童謡言自古奸雄搆禍吸數萬之衆于一日夜之間者未有不煽訛言者也詩曰民之訛言亦孔之將可無寒心乎哉帝王攝伏天下乘人心之畏懼以立紀綱而法令以虛聲傅之苟人心肆然無忌相與角知勇之實而窺破虛聲之無用則居人上者情見勢詘蹴若徒手之不可搏今夫主之訶其僕也詢之不敢對撻之則解體受笞豈真力不敵哉豈真計官府箝縛將有後患哉一時惶怖若或制之而不知其誰制此之謂人心人心死則人人攘臂起矣是故紀綱者立於無形禁於未然鈇鉞束而生鏽下民莫之敢攖彼張彛被殺曷嘗不斬八人以謝張彛然既敢于殺張彛勢必至八人亦不可斬民譁于國寇驁于野紀綱蓋若斯矣為張彛者殆矣為髙歡者未可測也頃江南米價驟踊百姓羣擁而號之官市人羣擁而和之公堂之上執升斗而踞以詬夫民至柔亦至悍矣一夫到縣門胥隸挺胸而呼頭搶地乞哀不已什伍成羣輒若笞長吏而亡罪意象若此憂時之士所為慟而幾哽者也項梁微眴守通墮首田儋縛奴狄令隕命莫謂此往事也堂下譟呼堂上頰再赤再白勢亦卒卒矣法令何日不繩民而民亡畏懼寖至此憂時之士所為哽而復慟者也人元氣耗散衣冠談笑猶人也勞苦寒暑乘之則立仆今天下耗散久矣特勞苦未極寒暑未甚之時耳可不大懼與問曰民胡以不畏法曰不畏吏故問曰民何以不畏吏曰吏多欲故刓法故非法不行故不行法故平時多枉法故法不足畏急時雖奉法法亦不得施然則振紀綱者安出哉獨有清吏治而已矣其道莫若懲縣令之墨而重郡守之權國家分千八百國之民委多士多士爭啖之鮮懷惻隱者但有人焉循例取盈不至受賕鬻獄斯即今世之伯夷矣嗟乎祖宗朝深疾叨吏往往置重辟塗炭既極宜亦當寧所動念也貪廉者黎民生死之原一經剝削數十年生計蕭條而直指操白簡從事率取一二科貢抵出匣之鍔搏兔耳無搏虎者比赴大計則蒼頭已先行李入矣郡守儼臨其上方以他日之臺省意之惴惴不敢遌而彼亦日夜為臺省地於外大吏亡所憚民以此益窮案漢書朱博召見諸曹吏書佐及縣大夫視其可用者留不能者罷黜薛宣移書屬縣貪猾不孫者皆解印綬去更易平陵粟邑令二令視事數月而兩縣皆治繇是觀之黜陟更置郡守得自操漢二千石之權蓋若此其重也今請節取漢制令郡守得進退諸令夫令朝下一紙于邑府夕聞之至疾也生民疾苦通國難憮至審也訟獄田賦未嘗掣之肘至寬也守取此五六人者考校短長至簡也非甚惛瞀鮮至繆盩者矣令方逺而文于銓曹近即有銓曹焉彼方逺而文于臺省近即有臺省焉月有代巡歲有大計束其內營之思而近注之于守藝不得不轉注之于民用以嘉惠元元是或一道也且民之去天子也逺膏澤不數轉涸矣其得實致之民者郡邑臣耳譬之刳竹接泉百折入室而邀澤微汲諸宫中餴饎惟意何則逺近之勢異也故郡守者天子託以襁褓民者也儼然臨數諸矦之上不可謂不貴矣然而外蒞郡國惟恐不疾去之郎官出守者回跂承明之廬夢寐猶悒蓋國之權勢不存焉寄赤子人手而使怏怏有自卑之心兒安得肥故郡守不尊奸墨吏無所憚未有能澤民者也澤民之道積貯為先鼂錯曰堯湯遭水旱而國亡捐瘠者畜積多而僃先具也髙皇帝即位首出楮幣積穀已又詔天下每縣設四倉其制本李悝平糶之法李悝本管子輕重之權管子又本周公遺人之意豈非利民之良政哉顧邇年青齊之菑赤地千里蓬麵槐虀之不給析骸殺子以給之然而四倉之制故在也散滯糧出紅朽一飽飢民者幾人爰書所入固聖制藉以糴粟者也吏平時不沒罰鍰者幾人夫民不羣聚不亂不流散不聚飢寒迫身盜賊蜂起豪傑鼓而用之則不測之禍可一旦搆從古山東一帶易亂難平游俠聚談古帝王若出諸袖彼時守土之臣得以補苴亡恙魁桀不至乘間發者幸耳天下詎易有今日哉然猶可解曰被重菑若近日江南米貴往歲未嘗不熟也特小歉耳非有山東之害并無戊申之水也㑹市價驟踊民相率以平糶請吏遂相率遏糴又各限定價國中商賈不通居人大譁夫貨亡常趨爭集價昂之地價昻則境外之粟將入境內之粟將出盧坦之儔尚將故揚之以徠逺商若之何其平之且平糶者平庾廥之宿峙耳非平民間粟也既不克取我陳食我農又不克走吏圖泛舟之役而抑人價以為平雖肆人于市價將益昂惡乎平之哉古亦嘗勸分矣勸之非逼之也今則彊取焉故米價雖抑猶昻于平時巨家未為失竒贏而不任橫逼復不利富饒之聲各相顧不肯發繇是胥卒需索窶人喧譟藏米藏鹽捕商捕賊岌岌不自堅而富民困彊有力者若巧通賄者終匿不肯發也繇是塵甑之家持重錢入市日晏亡所得米而貧民困諺曰傷寒不藥是為中醫救荒之謂也然兹皆一時失䇿耳大端則病在庾廥之空虛粟足支一年歲即惡民不胸懼民不胸懼則價騰而不隃不然者小不穰而足以亂夫國家非能長無事也其禍必中盜賊其發必乘凶年傳曰有僃無患可詆云見彈求梟炙邪然而吏習呰窳誰昔然矣菑害遙鬲頓忘往昔之倉皇且懼適果奸腹而阜後至者之槖姑逡巡已耳外臣不尊墨吏不懲實政不修思以奠萬民杜後菑是猶救脛而引其足也未有能至者也顧瞻時局不覺忽流涕焉勢有與國俱終古者其門户乎今羣臣號一家耳實戰國也朝聽陳軫而天下從莫聽張儀而天下衡一從一衡滔天燎原天子之權散于下四海之利聚于內雖有賢守令不能不伺鄉背以為工吏道淆雜生民憔悴綱紀日壞職此之繇門户之肇也必果敢材知冀自樹當世者也羅所同剪所異將自遂其所欲為而朝端翕然從之強者類合弱者詘服纎夫垂危亡援者乘時倚焉當斯時也順風揚帆雖豪傑不克自持而况羶趨之伍慠焉以騁多為輿議之所非識者蚤已料其勢之不長矣别有果敢材知者出焉鋭然犯一時之鋒以與為難而鄉所不收者翕然從之輿議所棄顯為射的大率皆狼狽而首事者亦為之殉此時局之一變也當斯時也強者類合弱者詘服纎夫垂危亡援者亦乘時倚焉後之視今猶今之視昔再變之後脈絡淆混垂危亡援者或鋭然首發天下之難端忽佞忽賢忽合忽離雖黃帝孔子復生不可致詰君子之憂時也睹氣焰之方張愀然以為過當默自逺引新鋒嗣起隱隱馮以為望而君子又以為過當則又愀然逺引焉是故門户割裂獨垂危亡援者獲延旦夕之命而大君子常獨立于淒清之地果敢材知究為人殉則首難亦亡利焉總之為羶趨者用耳矣故親君子逺小人古大臣入告爾后者未有先此者也而近日聞之輒心痛計獨有綜核名實而已矣旅而排一人其意必不在一人也而人主不問案罪狀如牒黜可也不然是陷忠良也旅而進一人意必不在一人也而人主不問卓有顯績庸可也不然是比周以相謾也聖主優容言路豈至大譴大訶稍示薄懲則言者固已不信于天下矣譬之樹然數摉其根枝葉自脫兩造之功罪立剖則言者自寡矣明主不可以再嘗人臣幾幸萬一之眩而難必萬一之寤萬一之涂知者所不趨也則謾者自寡矣非不比周益堅也而雷霆之下怯者先獻其肝膽則其交必敗矣且夫優容者非槩弗詰也謂恕其誤觸乘輿也若辨官論事則必案實而窮詰之盛世可以枉天子必不可以枉臣民枉天子無罪所以信言臣之氣綜核名實所以平言臣之囂昔宋仁宗之世議者譏宰相奉行臺諫風㫖而天下號治平言之囂也蓋愈于閼然噦噦之鳴混入于吠景吠聲之中而不可辨則聞者賤之故言路不清言必不尊核之者尊之也且論風俗之勍必曰怯于私鬬勇矣卒逢巨奸反為弚靡者或有之故綜核名實者正愛干將之刃勿使妄割將以留大用于髖髀也議論之囂詩人憂之故曰噂沓背憎又曰如匪行邁謀居平紛紛相嚙一朝緩急萬喙爭沸于法當危嘗讀宋史至李綱傳國事既大壞矣而門户益堅厪存一綱必逐殺之而後已此忠臣義士所以擲卷而起號慟不能止也名實混淆議論嘈雜雖堯舜不能以治天下其最急則莫若簡大臣詩曰告爾憂恤誨爾序爵簡大臣序爵之本也要在與之共朝夕而躬核之三公六卿分叩厥職生平留心軍國者必鑿鑿洞利害可見施行中庸之材能陳害不能陳利大率皆內懼其或囁嚅游辭者賜骸骨歸如此則朝廷大臣肅然非嫚娒之資矣然後舉綜核之政下與賢佐謀之天下雖大天子當夙夜籌者止十數事外大吏中丞已下天子當洞悉肺腑者止十數人黼扆有人則要襋固已全挈矣更時訊郡國疾苦吏能飛詔褒之奸墨為諸道最飛詔收之時出一二如髙皇帝朝則天下固已大震疊矣鼓動一世豈必程石哉明主餘力為之耳孝宗在馭羣輔疑不足以稱明德而閭閻熙熙海內咸理則以晝日三接泣留大臣明主求治之願誠有以沁入乎元元也君臣同心言路參之郅隆可立待也且其益未可更僕數大臣不獲上詬厲爭集之則柄墮小臣大臣苦衆喙勢必附離左右以內惑主而外抗天下則柄墮大臣羣下不得望顔色執政內比庶正紛亂鄉非挾神武之姿馮社稷之福不為秦者幾希則柄墮內臣詩云匪教匪誨時維婦寺知士蓋深憂之曩者幸犯至輕之疾而率此道也以往則必有極重之禍君臣歡洽百患不作萬世之利也程頥曰人主一日之間當接賢士大夫之時多宦官宫妾之時少蘇軾曰尊卑闊絶而上下之情疏禮節繁多而君臣之誼薄誠得君臣歡洽芟節儀數大臣坐論臺諫入侍取祖宗之天下直如農夫麃蓘蚤夜謀之欲區㝢毋平不可得也東事則在慎擇經略臣而久任之今士大夫習見塞草邊雲者少矣天蠶肌栗見蜂色動聞金鼓而志不懾且神往焉者百不得一一夫出關數百萬生靈託焉宗社安危寄焉亡具者一擲百萬徒以國僥幸此非可以輕議舉也乍入虎幄如循暗室久乃稍明苟非販國誤國明有徵驗皆當寬時日解文罔以徐需其成此非可以輕議易也今則不然舉朝推一人方叔召虎復生今日矣小不效則舉朝攻之杜重威韓托胄亦復生今日才不才豈倐忽相反哉旁觀為之也封疆之臣亡暇伺外敵而息息探中朝勢安得不危或者果不勝任亦有之然後之方叔召虎慮有今日久矣非舉者之誤則易者之誤也國事其可數誤與夫戰氣未復難語大創小失利亦必有之裁出國門而人已數日月其後少選彈文及焉大者浪戰以塞責小者諱敗以掩罪它年搆非常之禍必此之繇大抵當今之世寬于用法而苛于論人其寬也喪師辱國靦然懷首丘之思其苛也藁首縣街之疏無一人得免夫今之人固非不知解文罔也罪小見則立訾夫所謂解文罔云者豈虛言而已正並其罪而寬之也儒者之所謂甚大當局之所謂甚小罪之大小不可不察也昔范仲淹焚西夏嫚書宋庠曰仲淹可斬也以正人論正人而苛責一若此多口之不赦蓋已久矣誠能破大衆之論開功名之門則莫若久任久任則莫若重用之重用之則莫若舉攻守之略進退之宜錢穀之出入惟其所欲為勢未可動遲之小衄誡之端緒已睹則展十年之期使隱然有自為戰之意而事乃可以大濟此學士之常談實籌邊之長䇿也今邊臣曰遼兵不可使遼田不可屯此豈中事情哉彼殆有懟辭焉度其後無可居之功也重用之則且言調兵之害官縣金購士士罔應者閭左亡賴利其數金未就募而先懷中道解散之心頃浙兵北行橫奪民舟拔劍抽矢目䕫䕫以睨渡江而死沿涂劫掠動則曰我且往而死誰敢難焉兵戈所至何變不生即日者米價之鬨或以為商賈阻塞故既涵中國腹心之患而比到麾下則又適足為啖敵之資此但糜金賈害耳竟何毛髮禆邪語曰戰勝之威民氣百倍敗兵之卒沒世不復然唐之亂也河北亡敢戰者有李光弼之嚴明而壁壘皆精采也宋之渡也畫江以南亡敢守者有嶽飛之強毅而强敵辟旌旗也故兵法曰有必勝之將無必勝之民遼人不守遼而必合天下以守之邊臣之計愎也且更言屯田之利屯田一鍾當轉輸二十鍾其故甚易解也蘇軾曰百頃之閒田則足以牧馬千駟而不知其費聚千駟之馬而輸百頃之芻則其費百倍其解更甚辨也故趙充國所將厪六萬人耳然猶曰難久不解徭役不息恐為明主憂今聚天下于一隅而大農日輦金穀飽之無時休歇縱不遺一矢不亡一鏃縣官固已坐困矣遼故熟壤也非砂磧比新遭大兵膏腴盡棄量非患勢家豪右之梗也新畬每每置為石田多士如林置為象人邊臣其何辭意者甲士朝夕待戰乎則請以耕待之曩者局守圍城草剃禽獮移駐郊牧游騎徘徊置士必戰之地則怯者忘生示敵必戰之形則勇者畏死繕鄉亭浚溝渠植果木鋭者刃罷者畝且戰且守縱耘耔之弗時不猶愈坐困乎且懼其侵軼我也則請即以其智困之夫漢之胸奴逐水草轉徙無常而東人則異是其城郭屋居猶我也緣南畝而飽猶我也猶我之懼彼侵軼也誠屯重兵要害以游騎往來敵懈則若鷙鳥之發敵來則止夏燔麥秋燔禾我不以此困彼彼即以此困我爭先處強亦存乎將而已漢隴西三困于胸奴民亡勝意邊吏底厲其節敗敵衆殺一王而民遂振故將不可恃一戰之威士卒可藉一鼓之氣今縱憚大創乎且用伍員肄楚之法使士習敵而與之狎一日得利則邊人可復使也且勇怯奚常之有人有莫行遇盜者怖甚盡被服以獻已復遇一舟私念窘已極矣不若一效盜之所為其人怖甚亦盡以被服獻黎明視之即鄉者亡失之被服也夫人一也為盜則勇人盜則怯欺弱畏強彼與我一而已矣乘客兵之方集而疾議練乘轉輸之方給而疾議屯用以外擾敵內護耕雖黃石復出不能易也為將之道在急收死士句踐式怒蛙自剄而獻其首者十三人死豈真足樂哉誠有以激之也今士卒誠憊蹈白刃赴湯火不辟艱險者豈繄亡人燕趙之郊摴蒱飲酒報仇殺人走死地如騖者不可勝詰兹皆不過市魁盜桀耳而其人方自詡慷慨奮邁有澆酒趙州之意誠羅而致之此可以氣使也才苟可用隂揣其所欲而微飽之彼將惟上之所驅方其激昂自負未嘗不曰士為知已死也亦未嘗不曰斬脰陷胸丈夫固樂為之而究其元則未有不為利用者也韓非曰利之所在皆為賁諸俗諺曰重賞之下必有勇夫非虛語也昔者韓信破趙廣武君進一䇿則知之成安君不用則知之呼吸動靜亡異同室而今者敵至百步之內尚踉蹌四顧不北何待故制勝之道在急擇死士而善視之以偵則逺以戰則猛以守則堅鄉曰錢穀出入惟其所欲為范睢所謂金盡者功多也若夫戰勝廟堂則止有慎之推轂之日而已矣嗟夫勢有貌緩而實迫責有似夷而實危惟京營為然祖宗朝豼貅之隊騰驤帝都近大抵亡慮皆寒乞矣即錦衣號親兵舊滿十萬聞近不過萬人既實無萬人之用而大農糜費仍歲耗十萬騎之資墮軍實而長亂萌刻髓之憂也然而逃絶既多世俗卒以句補為苦百姓則補之難貂璫紈袴嵎負其間景詭之籍相目不敢問則治之難勢必藉操閲為簡稽然難盡閲彼且一身數名當之則清之雖屠沽灑削各有私業并操亦不可得數則練之難戎政薛操期少密耳沸然投要牌詬呼合軍皆注妻薛紀綱至此不為張彞亡幾耳能勿寒心乎哉大都今日之京營不足禦敵而足以亂驟動之則虞召變苟且旦夕則虞養奸恐當事者未可髙枕卧也為今之䇿急擇大臣沈深有膽略者為司馬武臣威望壓諸將者佐之而明赦已前隱占者勿罪與之更始武辨久于其事情弊當盡知偏裨已下各接所部理之主銷籍不主實伍懷罪效職已所侵匿者必先吐矣見存者如制立豫糧免朘削需蹛之苦材藝拔其羣額外賜決拾之資諸將才且廉應時尊顯之蕰畜日久扼其口而奪之食或戀弗能割則擇其爵髙而罪多者斬一二以狥如此則令出而不驚罰重而兵不譁大將軍再閲之後軍政肅而羣偷息矣浮餉漸復驍勇可漸致縱多豢寒乞萬餘人非軍政之大患也為治之道有賞然後可以有刑紀綱既亂有格外之賞然後可以有格內之刑賞行自賤刑行自貴賞行自賤者散十萬之羡便可鼓百萬之歡聲刑行自貴者罪彰而勢獨直狐兔縛之寂然衆怒之不嬰而聲畏天下此安危之幾治亂之轂不可不察也然而天下之事非錢不行開倉廪振貧窮數千里之水旱民亡菜色者窖粟多也冒犯鋒刃呼而先登者為厚糈使也浮餉未復賞格先行不憂不繼者帑藏盈也綜核名實必從財用亟行之孟子曰無政事則財用不足私念財用之流也必有所歸歸君上君上足也歸百姓百姓足也不幸中飽而歸羣奸羣奸亦足也然法令不修氣象凋瘵往往公與私交困兹曷故焉蓋嘗思之人情用本富者守財嗇以奸富者使財輕農夫秉耒而耕百錢掛要生死以之商賈則稍稍輕矣鬬雞走狗摴蒱六博黃金散而復來又輕矣吏胥割人肉而不疼視錢益輕偷衣美食醉紅紫以嬉笑儉嗇者齪齪不足道身死而子孫困蓋財用諸田宅器用田宅器用在也葬諸衣食酒色則擲瀚海而已矣一郡縣之內穴而啖者不可計數一省之內不可計數一津梁關閘之㑹不可計數一漕糧錢鹽之局不可計數至京師則集五方之奸而穴焉奉閹寺通戚畹交卿相鮮裘怒馬目偷而氣髙使奸弄財老于吏者弗能詰即如大工一舉內自諸宦下至乞兒胥衣食其中民間可一金得者倍未已也必什百之木石材貨舊可資匠石者必弗肯稍採必紆致之數千里外郡縣興人徒百舍重繭牛馬道斃然又弗甚惜且惟懼速成焉必稽之數歲之後然後已夫天子與士庶異矣貧民入市不取贏不歸富家委僮僕則少損焉士夫不諳直直常倍帝王之家豈真與齪齪者競纎嗇哉然綜核之朝必明知之而故寬焉可以明知之而寬千萬不可以欺暗昧而奸錙銖寬以千萬千萬而已苟奸錙銖必至萬億及秭而猶弗既此綜核之大凡不可不察也司馬遷曰俗之漸民久矣雖户說以眇論終不可化夫焉能使一日皆夷齊然治道去其泰甚泰甚不去不可以治借一二貪黠之尤以懲羣吏則羣吏廉羣吏廉則穴而啖者無以售其奸內自宫禁外訖都鄙量其所稸動纍巨萬尊賢豪購壯士惠黔首國不益賦而用自饒此其經也司㑹不察守鬻爵為竒謀夫鬻爵者苟且之政在所必革者也吏受賕于內輸者取償于外舞文弄法僞章刻畫穴而啖者遍天下所得秋毫所喪丘山此直憫虎之無翼而傅之耳明主弗取也明主之道任賢使能信賞必罰三公九卿下逮州邑之小吏一以此道齊之故君心不求治無治道可為也君而求治則救時者必以綜核名實為急擬上御暖閣召輔臣劉健李東陽謝遷面議章奏因健等極言鹽法之壞命户部通查舊制覆議行之謝表𢎞治十八年伏以響洽雍喈帝眷續千秋之喜起法蘄修舉臣言厪五位之綢繆先朝本樹良規能奉行則利源自闢聖世悉遵成憲共稽核將弊竇立清拜手揚言撫心懷愧臣健臣東陽臣遷誠惶誠恐稽首頓首上言竊惟帝王總攬海宇最要者在密邇大臣宰相翼贊熙明至大者在肅清庶政至于理財之急務尤需經逺之良圖自九府鹽鐵交資官山兼以官海而纍代鹽屯互濟足食還可足兵馴至本朝備收羣策念東南之美利不盡將以私煮富姦雄念西北之峙稸方艱將以供億困閭左莫若輸粟塞上用鼂錯之忠謀因而取引運司殫劉晏之長算一引納二斗有羡在商賈為費少而息多九邊省萬里之勞在朝廷為計深而利逺于是千耦蟻集萬鍤蜂屯凡彼草萊所翳荆棘所叢處處我疆我理自此虓虎之旅豼貅之隊欣欣且飽且騰蓋中外之血脈既聨將士卒之心膽自壯而法行良久弊遂多端國漸捉襟下徒仰屋何幸九重之睿照俄驚三接之光榮兹蓋伏遇皇帝陛下祥摛戴玉道契寢繩垂愛景以字人披薰風而扇物億萬姓日在襁褓猶歎國未太平二三臣每乞筋骸輒云卿忍捨朕父老頻為加額舉朝不覺淚流乃既勤殿陛之交復聽暖閣之召龍顔晬穆念臣等為師保公孤天語溫和視臣等若家人父子特軫萬方之利病遍翻百辟之封章君都臣俞盛事堪留韶管爾可我否愚臣亦協塤箎相顧解頤共喜聖朝無事不禁顰蹙獨傷鹽政多乖深恨繆盩于祖宗備陳顛末于君父行鹽地不加擴而引日增因多留滯之引給鹽引不加增而價日益因多徙業之商盜販公行在在鴟張無忌則私鹽之橫堪憂場蕩朘削㷀㷀鵠立無依則餘鹽之禁宜緩孰官舳孰私載夾帶之宿蠧難清或戚畹或宗藩奏計之蔓延特甚要其壞法之最莫如改折為先海之大不知幾千萬里無涓滴得佐軍需餉之出約費幾千萬緡何絲粒不仰輸挽棄沃壤為荒磧佃者投耒逃亡處樂歲如凶年兵皆脫巾詬誶流弊若此法制安存賴吾君之聖明立下詔于該部嚴核創垂之初意速議改轍之令圖積歲因循一朝整飭臣等材同襪線職傍衮衣鍊五色石以補天自慙蹇劣鑄六州鐵而成錯每切憂危喜值垂磁謬期攻玉伏願虞門日闢禹磬常懸因健等三人之愚忠溥收一得因鹽法一事之潰壞遍惕萬幾則宮府諸臣爭效媚兹之欵而吏兵諸局盡呈振刷之觀矣茅簷集卷七
