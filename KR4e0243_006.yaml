body:
  text: 茅簷集卷六明魏學洢撰雜著三趙母傳家夫子數言趙歸父壯時居窮巷饘粥不給而達旦浩歌無足戚歸父者則又數言歸父母能守死立趙孤也嘗逮事舅舅病疫親為視湯藥家無可任左右使者親為滌笫蓐間舅之歿也趙母亦疫且革矣躍而起起而仆仆而復蘇猶急索衰絰加諸身也逮事姑姑病疽內潰幾殆趙母親嗽吮之已復病疰血穢餘年腥觸不可忍趙母日為之湔浣乃其姑又繼姑也夫巨家好為富貴容新婦晨興拜舅姑平居或不通人聲一室之內如客如路人下逮里閈禮法寖微焉翁爨婦績婦坐翁立幾真意有存者然其咈也則亦翁詬婦詈嗟乎有不恥為若翁浣笫蓐者哉蓋雖女猶難之事後姑尤鮮有令聞何者乾餱相詒言貌煦煦則各自謂有慈孝名文而不情其藝不能長也齰疽濯穢其真良婦乎哉久之歸父之父殁數絶數蘇孑然影相弔也兩閲月而生歸父歸父之叔乃為祟有屋數椽奪之有田數畝鬻之未快也聚族而迫之嫁弗聽則將碎其子趙母號曰天乎未亡人何靳悉捐遺産以活此兒此兒何罪于是家四壁立蚊虻噆膚機札札不輟或冬夜龜手不廢洴澼絖日策其子使成名因得而卒業焉然迄今已五十餘年歸父猶困諸生間識者固已代為歸父戚矣歸父名璧父名錫嘉善遷中人也歸父母姓顧氏二十五歲而歸趙二十八嵗而寡六十六歲而家夫子言之令顔其廬八十五歲卒卒踰年而洢為之傳曹鴻甫傳吾里有躬行君子曰曹鴻甫先生諱烈字允和更字鴻甫病不復能讀書也自號青箱居士先生幼不好嬉動履有度羞與凡兒伍長乃益攻苦出入經子先秦兩漢言其讀史則揚厲千古慨如見之至圖書律吕天文地志之類鈎微摘隱抉前人不及䆒者著為論古奧竒碩蓋浸浸成一家言矣顧弗以自詫曰觀象測數于身心何當吾人精神當與千聖相陟降奈何唶唶為掌故言哉遂矢志濂洛諸書亭如也矯如也無逐纎趨者已乃肆力舉子業業既工而病作歎曰我家世業儒數窘於遇我復終於此命也夫伯若季在余也可無恨于是悉謝故業聖人之學乃益專其學以無欲為極立誠為本病稍篤勿復事耳目枯坐一榻怡然自娛每語洢曰人知生之必死不知死之未嘗死也吾支體日就銷脫矣靈覺不減于疇昔此非前吾生而存後吾生而不亡者哉顧常自歎曰死可也就生人之法則我未可死昔人尚友尚而論世吾輩誦詩讀書顧交臂失當世之士冀得負笈就正如心齊之於文成者而病弗能也資既不敏不能如匡之傭作栁之手鈔冀得廣蓄典籍緣粗遇精庶幾其有獲焉而貧弗能也吾其為天地之螙民矣夫每居恆頥解輒曰此生無所樂獨幸見歸季思先生擇交邑中戞戞乎其難之時相過從者惟吳蘧菴先生志逺朱蘆墟先生國望卞子厚先生洪載莊含英允燦蔣永完寶衷蔣永徹鑑𠂻暨家夫子而已嘗有風之詘意為糊口計者笑曰昔人十日九食而得不餓死今我一日再食猶欲營營何人之不知足也且我不能強吾心而佞吾口明矣洢侍病半載猶子視我慎言語節飲食諄諄誨之不置數見其憐憫僮婢曰夫人既舍其父母而父母我矣虐使之忍乎因誦元亮疏云此子亦人子也其介而慈類如此卒之日父母昆弟從容握手神色不亂息漸微也以絶年二十八子尚幼手輯蒙養録果行編遺之俾之仿繩尺云魏學洢曰於戲先生洵古人也與哉憶隨先生時余髮既燥矣亦非不知程先民者然距今六七年所飽食終日無所用心余其免矣乎未能也羣居終日言不及義好行小慧余其免矣乎未能也然則當日之輕窕纎薄意必有甚于今而先生之敦重嚴毅又於今日為無兩然則曩者余事之其殆以余為非人也思之未嘗不汗下叔廷薦者亦受業先生之門者也恆道先生善誘人述古昔稱先王輒欣然庶幾遇之於戲此豈吾人之奮厲則然哉然家夫子每疑先生戒容色毖辭氣動靜語默進退出處無之非考亭者而晚顧與考亭懟專好姚江之言惟洢亦疑之乃今而知先生之志苦也憶隨先生時先生之疾深矣越數日輒嘔血數升自度病必死居恆語及悽然有日暮途逺之悲彼恨不一朝頓悟快覩性命之全而茫茫窮經云乎哉不得已而希捷徑于姚江宜也若吾曹悠悠忽忽怯于循途思先生其亦可少愧矣嚴公傳公諱國望吳江嚴扇人余婦王父也嚴傳自勝國代有聞人公生而家業饒稱富人然仰焉取俯焉拾若唯恐業旦夕耗者故雖不可謂無尺土一椽之藉而其功與篳路藍縷跋涉開家者不殊居亡何遂成素封於是戚黨空乏者周之所相識待人舉火者給之值歲饑饉者載道富家類不能出升斗貸也甚且乘其迫以為利者有之而公則慨然出其粟以賑塘且陂國人苦之誰不秦越人視者而公則起而考工不愛傾其槖中資人皆稱之曰嗟乎天子如尊卜式以風四方二千石豈足道哉以故吏吳者咸矜式焉晚而杖於庠然公故甚憎事字閭里若嬰兒唯懼有一人焉譁於側者即里中或譁焉公必曲為之居間唯懼其有不釋然者故髮之白者且黃矣未嘗一識郡縣吏足跡所至亦不能半千里然而致有獨鍾名畫够集雲巒煙島絶壁斷岸變態朝夕几案間笑語人曰吾蓋日與茹芝之徒杖履逍遙於其際也課長子以周易課兩孫以尚書晚乃為仲子計農桑籌芻牧遍藝果木鬱然畏佳其病也客為之寫生公謝曰余嘗聞之吳文定公矣畫像之作記禮者所不載賢人所不道不若紀述生平以詒後昆可以行久長與其寫生者神之不存行見不可傳者與槁骼俱也因自為行狀以卒論曰海內賢士以什百數然必澤及人者為真浮閻之叟樂為人緩急田夫里婦相語於寒窗風雨之夜往往為流涕而姓名弗傳不亦悲夫搢紳貴人閭巷或切齒乃走聲名于四方者又何比比也此豈真有深澤哉於戲若嚴公者庶幾不與槁骼俱也乎沈少蘭傳南張吾宗之所聚族而處也南鄰北舍煙火相親士耒婦杼户無異業吾夢寐恆樂居焉因念篤行如沈少蘭者洵古人也慨然有懷疏其佚事少蘭名應奎余兒時猶及見之身偉而頎其聲雄數賈于四方里中呼為大客云慷慨好義有古烈士風及居家則恂如煦如嬰兒如視二人俯仰為顰笑者五十年父埀老教授里中少蘭閔父劬即日逆以歸家中藝蓑草蓋厚利也父日往來陌上視之少蘭曰奈何令老人僕僕赤日中乎即日剃蓑草嫁諸女弟凡奩具及往反禮際無弗僃物焉且有儀曰此吾親所素愛也里中父老時至則取雞黍斗酒相餉必極生平歡曰此吾親所樂與杖履往來也偶一歲中父老多物故者少蘭戚然謀諸婦曰是廬也吾志庚為之而力弗逮也雖然親老矣他日忍以不安其親者安其身哉遂庚之雖力詘舉贏勿顧焉里中嫗多事佛茹素母老將從之少蘭憂甚夜就寢矣且二鼓矣趨跪卧前曰兒貧邪兒泄泄邪兒奉養未至邪兒婦服勤不如意邪涕泣引咎者萬端季弟賈于杭蕩兄資少蘭終弗言唯恐以昆弟之故憂二人少蘭初無子子猶子元錫深厚元錫已元錫將婚少蘭有子矣家又替適以事滯蕪湖寄家人紙云元錫婚事莫苟且苟且是我以子薄猶子也我寧後日薄于我子之婚後子之婚也視元錫果薄然少蘭已弗及見矣伯父嘗以役之官當笞少蘭俯而代伯母無居為之小築一椽一壁必躬焉已又無以葬為埋葬事啓土覆土無不親閲焉者嘗買陸氏屋主人及居間者欲立劵少蘭堅弗從叩其故曰彼中丞簣齊公後也中丞吾鄉賢者市其屋已忍矣更忍令子孫執劵而咨謂某氏子契乎客有鬻他人田者已而敗請立屋劵以償少蘭愀然曰彼固衣冠遊人間者今事露顔色不勝沮喪矣又何庸劵為里人聞之各悽然入情謂少蘭長者嘗賈于杭值杭饑擔麥千錢而竒羣商利其迫而閉之糴少蘭則減價盡糶之居里中人或以急請輒貸之錢或不能盡償弗較復請則復豫人以事叩門雖夜半風雪塗潦險阻無一辭卒之日逺近若失左右手曹伯化傳曹伯化者豫鄰翁也豫舊識其子宗鄭近比屋而居往來益親宗鄭嘗言王父心玉公有古人風居嘉興白苧村精岐黃言任俠樂施豫蕩其資者再比老亡子家日落徒四壁立故人沈憲副陸川先生及弟介川先生聞之喟然曰誰令曹豪俠一生而老無歸者不幾詒握齱笑邪此乃吾兩人過共延至嘉善居焉相與給之者甚僃陸川兄弟卜墓地併為心玉買地墓傍曰百年後死者有知我二三老人當時相過從也心玉公晚而娶于吳年六十伯化始生伯化幼有至性且甚穎教之誦聲朗朗徹户人咸厚期之然心玉公老矣家又窶安能執脯脡從博士弟子遊乎亡何教之岐黃髮未燥輒能療竒疾見者皆曰真華陀家兒也顧弗肯竟學獨好為大書書日益工因得以餽遺餉父母間客他所人為陳新果非父母所嘗食弗敢食也久之娶婦郁孝聲益聞當是時心玉公已八十吳亦六十二矣四顧蕭索度無可為怡老具而郁事之甚歡心玉公年八十三臥病郁親嘗湯藥衣不解帶者纍月比葬毁瘠幾不勝喪既而善事吳十年如一日吳老婦舍哺哺之如哺嬰兒吳年八十終伯化歎曰微是婦我何以事我二人繇是深祗敬焉終其身未嘗不雍雍也郁沒遂不復娶撫諸孤極慈伯化雖食貧乎不自䙝于人其與人也莊閭里多安之嘗道遇癱瘓者困頓大雪中留治之不數日其人起而杖再數日棄杖走矣其人願傭沒齒弗聽資而遣之髫年所習間一再試以起人于厄往往竒驗然亦不數試也與豫鄰二年卒婦郁舊厝祖塋鄉者沈氏所豫地也宗鄭更市地合葬焉葬畢宗鄭過豫偶語及墓銘所自昉豫因曰昔子瞻不肯作墓銘退之則為之劉乂嘗持韓金數斤去曰此諛墓中人得耳不如與劉君為夀韓蘇小異如此雖然文自因人傳耳人何嘗因文傳苟非其人縱隆而金如丘陵亡益也宗鄭曰子于韓蘇則奚居曰韓過濫矣蘇亦過峻孝子之愛其親何窮之有聞他人懿行懿行視之苟其出于親也者不翅軼曾閔而過隨光也此非苟為私而已不爾不足以為孝士能弄數寸之翰而人子閔然以死者要之稍有足述即與述焉爾惡用孑孑為宗鄭泫然再拜曰苟如此不孝孤之幸也不復望銘墓敢丐數語藏于家豫避謝曰敬諾遂為之銓次其語雪鷗閣記雪鷗閣者何荻秋菴雪鷗閣也荻秋菴者何子吳子别業也蘆花之菆小樓出焉馮樓而觀之蹲而伏戢翼而卧泛泛焉若隨游波而上下者為雪鷗閣閣負陸爾前堤爾短扉側啓偃枝登降爾乃波濤涳涳焉步履之下徐陟之峩然閣也風蕩之則扁然舟也遙望亂葦中炊煙斜起小艇倒出者漁棹往也旅而歌椎髻而方筐者田豎返也䬟䬟者風起于青蘋之末也齒齒者石也往來漰湱者湍相擊也水與天接介焉者徑尺爾矣露之晨星之夕遽而望之忽若大江之中橫亘豫章者焉霍焉開也廓焉解也栩栩乎其得之也長天萬里鵝溪絹也短籬茅屋頽枝殘雪疏疏而密密者龍眠畫也西風搖落草木萎黃有懷伊人川上徘徊則瀟湘而洞庭也子吳子嘗與玉峯歸子錫山髙子詠歌于其間謂可以寄趣也荻秋名焉閣之為雪鷗何蹲而伏戢翼而卧泛泛焉若隨游波而上下者馮樓徐觀則類有然者焉故名爾也門人魏學洢讀書于此而樂之曰藏焉修焉息焉遊焉趣其寄焉已息關文僕才非繡虎性比寒蟬一意硜硜百事憒憒困守鄴矦之架頗類專愚數窺董傅之園實有懶癖慨一覆之弗進懼三立之無成撫躬自知逢人堪拜夙懷千里負牆之願愧缺九年面壁之功巾馭有叔度之汪洋游思盡戢廷玉有伏波之矍鑠懦骨立堅對此兩人慚無一得徒抱五窮之技曾無十駕之勤逺馭難期坐馳不止鴻鵠將至關我弓而射之鷽鳩何知控于地而已矣猶未免為鄉人也是焉得為丈夫乎今年以來失學尤甚三月三修蘭亭之禊偶駕南轅五月五賦蒲觴之詩尚稽北棹春夏倐易德業俱蕪不著祖生之鞭幾失江郎之筆彈馮歡之劍鋏羞澀難堪碎阿黑之唾壺感慨交集笑頭角自露今何成乎覩髀肉復生重自悲耳羌申申以自詈忽蹙蹙其靡寧弓梗手生坐虛猿臂筆枯心折殊負燕頷若欲憤發為雄庶幾翻然更始用是布帆無恙束笈自攜勿憚百千之劬將集二三之侣發交鋭志舊業一夕九回季若熱衷世資一日千里自謂糾合有日行將摩厲以須不虞客子之徒來適值主人之多事長松共祝喬木初遷賓戚麇至者浹旬杯盤狼藉者并日余自案塵成積乍與書幌相親如負重擔而弛于塗息肩方知勞頓如行日中而入于室舉眼無一分明嗟神氣之未蘇覺孱軀之甚憊若非還我幃帳之適何異加以桎梏之刑兼之蕉葉酒腸難與荷筒痛飲河朔十日豪舉竊嘗慕焉沛國五斗解酲實不能也于是息心絶客决意掩關放腳長眠先學希夷之睡低眉枯坐徐結幼安之趺蕉䕃成林時剪葉尖書字薔薇作架每從枝罅傳餐夫執輿者為誰任其來往得其門者或寡聊且優游搆子虛篇汗青欲遍何須邀伴同觀讀留矦傳浮白自豪安用攜朋共飲留心妙諦莊誦六如流覽昔言愛觀五蠧擁書萬卷南面何以過兹拈花一枝西竺似乎不是子曰吾弗能已矣詩云終不可喧兮倘遇同調之儔言念索居之苦集屨户外駐馬江干喜不可言私則有請聽髙賢之快辨誠勝十年讀書奈不敏之凡才未堪三日刮目稍俟檢編有獲便當躡屫相求今仍積弛之餘未免退速是懼謹閉崤函之谷一丸泥為封若犯鹿門之關三寸管如律古錢說人洵不可以有嗜也嗜則愚仲弟初讀史豫為撰紀元考因戲為輯古錢非直以稽改元也圜法不修錢制紛錯可藉以觀世焉不二日貿唐宋錢者接踵多不辨文幕朝鮮亦有至者而開元太平居多開元非𤣥宗錢也隋末錢幣濫薄至裁皮糊紙為之武德中行開元通寶輕重折𠂻逺近咸便故其流于世也獨繁太平不知所起吳主亮梁敬帝皆改元太平疑俱無錢宋太宗號太平興國意者其宋錢與最後得小錢一其文曰貨泉大錢二其文曰大泉五十皆新莽物製度始末具載班固食貨志及范曄世祖論中四愁詩曰美人贈我金錯刀夫既不以莽故賤錯刀我于此泉又奚憎哉舊錢纍百一旦以數者為之長自後繼至大氐皆重出豫意亦怠甚矣而來者不止或晨户未啓髫孺已持錢候門外豫于是聞而笑曰弟汝亦知買齊桓公㰱血盆者乎程氏嗜古玩酬此盆千金衆皆以桓公不㰱血譁之程恚曰僅言不㰱血耳誰語汝無盆豫解之曰贋與否吾惡乎辨諸昔唐裴相國得古盎有九字帶其腰莫能識兖州魯生曰此大篆也九字乃齊桓公㑹于葵丘歲鑄以篆驗則字勢存焉公寶之猶鍾玦郜鼎劉舍人蛻笑之曰桓公九合諸矦葵丘之㑹是第八盟是嵗安得以諡稱公大悟使今日之言贋者而盡如劉舍人言贋可也不然且聽主人之寶之也漢武帝有故銅器問李少君少君曰此器齊桓公十年嘗陳于柏寢案其刻果齊桓公器一宫盡駭以少君為數百歲人使主人之言真而果如李少君言真可也不然自今以往且願愛子之千金衆皆笑曰舍人易少君難聞者莫不絶倒今豫一時游戲耳而居然以愚癖聞于人與彼買盆者曷異哉好而不已周景王大錢行有至者何況西京三官錢弟其識之人洵不可以有嗜也瘞雞銘白雞來自吳江畜余家朱冠素裳其行昂昂聲嘹喨可里許最善鬬數攻敗其羣聲息所至鄰雛率望風徙去而其雌之來與雄俱一飲一啄必偕焉亦時時藉雄之藝以侮鄰雛稱霸者數矣客曰余嘗遊燕趙青徐之間摴蒱六博蹴踘縱飲稱豪俠者相踵也竊觀其鬬雞焉兹雄蓋英彭之次云居亡何田家子詒余雞一黑鬛而絳身內之羣㑹日且暮失白雞處則血淋漓被毛羽雜他雞無辨與黑鬛者鬬方罷也蓋初角時各無聲似銜枚然又似恐人中解之故各不相舍以至困而白雞之左目遂喪明值老嫗至乃分置他所而雌適以其雛來見之驚而郤徐而前遂狂呌不止雄稍稍就之若相慰焉者雌則轉而奔雞羣熟睨之見黑鬛者兩翮血縷縷遂奮翅搏之逐北數百步觀者壯焉然雄亦從此憊矣雌遂不復食相徙倚一夕死而雄之死顧反後其雛凡十三悲鳴母傍主人憐而瘞之園自是之後則黑鬛者稱霸里中矣銘曰生乎雄死乎恫取而瘞之同其宫楚子之葬馬與夫子之埋狗也嗟寧從其隆春夜與仲弟論文數條鳳凰之鳴髙岡也大音金小音鼓而凡鳥方以鵙舌為竒不亦劣乎今文集實類此矣壬戌以來時傑各造似子非子之句以為古奧即枵腹者亦競為之嗟乎精思渺識實闢千古之未有直振筆出之而勢已錯愕矣何藉鵙舌為若徒鵙舌而已雖里耳盡驚豈堪見明眼之士哉胸懷磊磊落落或平或異要當與天下共見之自知為衆侮而佹其舌以欺人光明者之所羞也勿為也唐人由初而盛而中晚蛇神司令矣誰能挽江河而之山曰殆不然宋慶厯間文士尚纎譎而軋茁之調興此亦鬼賀之儔也歐陽子立二蘇之幟以令天下而羣譁者咸懾伏無異辭夫士顧願力何如耳文中子曰亂世之徵文章匿采振衰者方將逆挽天潢豈得遂下流之便耶然則株守先民與曰嘻庸然哉庸然哉驃騎驍將耳對茂陵曰不至學古兵法察其夷然不屑之意目中無孫吳久矣況肯為程不識乎近世號法家者大都守黨孰之所共曉而間出律外之律例外之例以尊已而繩人善用之不免為街亭初著小錯通局不敢下一子誤用之則房相之陳濤斜已矣試想牧野洋洋檀車煌煌駟騵彭彭維師尚父時維鷹揚豈不卓為天下雄也哉法家論法法應如是運用之妙存乎一心蓋才情之傑出也才與情一乎曰是不同能撫弄柔翰者盡才也妙極哀樂之致者幾人哉古人中唯三閭大夫與司馬子長情最深讀其文如刺船蓬萊海水洞湧山林杳冥悄然將移我情蓋皆得情之哀者也詩三百篇其可歌可舞可悲可涕者情不啻千變而苟非有慧心焉曲盡之安用不情之藻繢乎故曰情生文文生情才與情合斯之謂文人智勇項相望也獨困于理場如之何曰貔貅萬隊仰函關而不攻可謂雄傑乎析理者當鼓其才情之鋭以蹂躪于其中其酣也如嶽鵬舉從百萬軍中奪其纛而舞不然者亦當如李臨淮納刀于鞾旗三颭及地萬衆致死庶幾哉戰苦陳雲寒舍其難而優游于花草之間曰吾能為空靈也直嬰慧而已矣細若氣微若聲斯稱溫養焉不能似木雞奈何曰黃鍾大吕定無細響舉武若山者吐音必若雷如必以優柔為極詣則詩家第一清弱者先據之矣何從數李杜哉八風十二律用之各有攸宜而材力之所賦學力之所就要當無拂乎其人之天不度其器而槩以羽聲律之不致靡者幾希故世有謂簫聲類鳯鳴者余辨其為失伶倫之傳夫威鳳振九苞之采萬鳥悉臣伏焉而聽其音乃卑若冶婦之妖柔吾不信也況所謂望之似木雞者謂未鬬之時也以言乎文則未操觚之時也若爪距之鋒交而仍若木雞之不動則健者攫殺之矣溫養安在哉尚奇者宗時傑尚正者宗先民今兩無當焉惡乎文曰文章一小技於道未為尊然亦從乎所好焉耳達則為歐蘇窮則為李杜豈能舍此而他慕耶噫吾于詩業未之盡也商詩業而遂及此茅簷集卷六
