body:
  text: 茅簷集巻一明魏學洢撰賦攄懐賦并序余頫覽流俗百憂繽紛竊不自知其何心也間於記誦之暇紃察平生一簣方施規局略覩撫衷俞熱託徑俞寒余殆有私錮焉夫鑪冶既分資格斯剖狂者恒樂獧士鮮懽蓋或區之非烝民能自為也昔幽通抽緒于北地思𤣥蔚起于南陽大都借葩艷于前人攄素懐之獨往胷臆自吐鬚髮可遺余竊訢慕焉爰綴斯篇用鳴厥志雖非楚聲亦姑自廣云爾辭曰嗟余懐之坱圠兮勔襲跡于前修神斾斾以應縣兮恐厥疹之弗瘳蹇獨行以亢回兮軼雰􅙟而彯輶纕酷烈為佩兮餐沆瀣為羞駕迅猋其淜滂兮曳氛旄其哹哹佽蜚為余犍芝兮造父為余持輈䇿我馬毋契需兮登迥路之悠悠既晃朗以遐征兮下臨睨乎時俗相樷井之諰諰兮曾不可乎偕服競脕顔以蠱媚兮宵容與而昕伏集衆垢于厲鄉兮寄生涯于詆䛢黨人既以為常徑兮恬不恧夫齷齪余不忍覯此恒態兮挽青天而慟哭聊鼓盪以貢憤兮紛吾離此羣訽既詈余之眐眐兮庚若憐余之寡就出門閴無人兮入蹇産而傷獨伴纗蓩以相饟兮孰胡繩之為淑宜蘋蘅之節離兮被回飈之􅂒􅂒諶蘇世而特立兮又何病乎塊鞠忽中情之倉兄兮欸堦前之秋霜氣沆碭而曾髙兮天㦧懔其不陽遒披離此芳藹兮顇蘀蕭瑟而霣黄恫芙蓉之方茁兮曾不及其芬芳豈鷶􅀈之先鳴兮抑遌時之獨後也羣生各有攸當兮何良辰之不又也誕流睇以懰慄兮志欿憾而難平傷庸夫之渨涹兮羣嗌喔而謍謍彼裮被之曼著兮余乃諓諓與相迎必骫靡以追曲兮寧處廓而無友生緬哲人之榘矱兮疇蠠没而颺聲締扈珵以勿替兮惟兹瑤瑾與琇瑩瑩緜邈其難虧兮瑾翕赩而可帶荃既淫溶溶其靡岸兮逝將萉焉以蟬蜕漫湎湎弗裁兮懼一朝之狼狽獨不相夫迷涂兮洵沕潏以滂沛徒褰裳而無航兮固余心之所害意蛩蛩其弗懌兮㡬儃佪而自憐不可訊之厚地兮不可謀之旻天事沉洄而好還兮何獨長此迍邅遡愍風其蓬龍兮埃坲坲以湍㳬荃瞞瞞而上下兮胥滔湯而弗遷余將與此終古兮曷禁涕泗之漣漣昔鮑焦之自沈兮偕務光而不反聴燕市之悲歌兮白日慘焉其晼晚弔湘纍于汨羅兮傷幽蘭之九畹步兵值窮路以號哭兮豈好言之可輓彼焦先之枕露兮襲冷風之䬟䬟文詡之擊几兮戀周道之阻修桃椎家乎世外兮伯倫葬乎醩丘若潯陽之兀敖兮永嬉嬉而自由悲者莫可與晤語兮豈樂者獨有好仇疾溷濁而莫遯兮吾聊與之媮遊雖歌與哭其異徑兮余知其相對而長愁恨髙風之邈邈兮挾昊穹以俱浮余獨叢此坎毒兮當涉世之末流安得霜翰之凌飛兮奄忽越此九州覽九州之曠漭兮余惘惘焉誰屆或趨余以返轡兮勿踽凉以自隘如蟬翼之孑孑兮疇頔步而可施衆徾徾其唼佞兮相態以狡辭被竒服之攝葉兮衽旁挂而不可撝辟之九戎而索賴兮賈用喪夫珍䯸既蒶藴其黴黧兮秪槁悴而見欺超迴軑其猶莫兮戎乃鞏鞏而自私荃苟不識予之妙婧兮曷羣喙而呰之更嫮飾以自暴兮長沉菀其何為繹行言之娓娓兮幸来者之可諫先民各繽紛其成章兮何獨樂此謠訕聊洋洋而為客兮侶鸞鷖于雛鷰雜筐簏與鷄駭兮盛蘮蒘以瓊玹偕隴亷以同升兮何閭娵之可唁伊至人其藏器兮翫時故之相嬗苟余鼎其勿抎兮孰沈㝠而可賤觀周行之凌䃍兮竊又愛此春華芳菲菲其葰茂兮敖冰雪而揚葩睼亂流之澆鑽兮志悶瞀而不嘉既紛員其波逝兮廬中垢而為家余將矯矯其獨殿兮肯喪心而黨邪禹功未施于臝國兮厥躬靡焉先自化上青天而無階兮墯江流而驟下兩驂釋鞿羈以馳騁兮孰云纖離之可駕强綦蹊以利跂兮尚恐恐或未舎苟㣻羮而吹兮眇不測其所䞣嘗上觀乎西山兮頫東陵與為隣展生介焉中處兮澹相羊以誾誾右髙歌之嘅嘅兮左鳩黨而剚人汨淢靸余趨駕兮怵餘波之相親寧槁死而萎殲兮誰嶮涂而可馴思和光之緒言兮誕錯愕其驚神余既不克刓厥志兮又轁軻以多牾不速速而擠臧兮將譨譨而取殬怊茫茫其懭悢兮顧余幃焉瞿瞿懰竀俗以擬步兮儼鵕䴊之衝霧匪中心之墆翳兮寗瞥天而無路將窮岑嵓之嶔崟兮罙幽壑之谽谺既碕礒以狋􅤹兮復庨窌而聱牙紛頵砡其巃嵸兮攀􅀈窞而咤嗟夐睄窕以無人兮殆猿蜼之所家顝嵺廓其奮晉兮瞰坑谷且焉跱䠧聞猛夫之票舉兮侶蟼螿而友豭腹巖􅠈之窏洝兮膺碅磳之怪沙豈展狎夫澮㟋兮諒坦夷于彼涂余既不難徦遰兮馺余陟乎高岡􅠡篾縷以為梯兮凌遊雯以為杭路曲坲以傾昃兮石岳岳以相望仰重巘其嶄巖兮睇故道而渺茫壁既峭而難駐兮力又竭而欲僵盼樛木其若頫兮徒連蜷而弗將勉陟巔以偃息兮恍魂存而魄亡世路既絶兮志遄歸而不可撫長松以逈眺兮身飄飄其欲墮冰皚皚而凝霜兮雲霏霏而在下鳥磔磔其驚飛兮霧濛濛而覆壄樹蓊鬱以茇骫兮刜羣蕪而聊舎竊獨樂此異壤兮將往遊乎僊者忽凄風之騷屑兮逢豺狼之㹞㹞虎豹駭而怒號兮挺敦脄而鋸齗爭駓駓其相逐兮險淪磒夫厥身余竊覩此咆哮兮殊無異乎今人中俇俇其怫鬱兮邅吾道以長邁下峭陁之嶕􅀢兮弄驚濤之滂湃鼔蓀橈與桂櫂兮馚馡馡此香馤搴白蘋于江臯兮剪杜若而為帶波顄淡以汨活兮鴻㷭涌而揚磕紛䖤蟺其相糾兮蘭舟盪而濊濊既永去此流俗兮載騁觀乎四荒泝崑崙之淫翳兮測尾閭之坱茫抨陽侯為余先導兮御馮夷與忀徉雲澒溶而無文兮天澎濞而欲狂龍卭脟圏以瀺穴兮忽苹縈碭突而益將怪鮫為之屏息兮長鯨窅其固藏怒彪休以喧豗兮意驕騁而不可降奔湍拍其相㪾兮愁大塊之不長曼余目以遊䚕兮窺煙液之所積淼浮嵐之出没兮疑風雨之窟宅齊噴沬與頡頏兮挾飛瀾而漰砉水瀏瀏以􅎊駛兮石峉峉其俞瘠此方意别有天地兮余永辭乎局蹐纚余檝以息征兮對蘆華而為客枕頑石之嶇崯兮聴潮聲之傍􅠎媮江山之浩蕩兮忘大寓之迫迮倚秋風以長嘯兮聞木葉之蕭蕭黝雲涌而上屯兮神慘慘而弗驕懐美人于天際兮隔千里之波濤鳥棲棲其慕類兮獸踽踽而寡曹日悠揚以就暮兮送去瀨之滔滔牉獨羇此窮域兮傷魂夢之徧勞余將釋結絓以宴娭兮又曷長困乎水臯量八裔之迢遞兮絙流峙而靡控鷦明怯夫修罠兮應龍廩乎衡緵慙蜚鴻之茇茇兮戾𤣥䨭以遐羾紛緯繣其弗可治兮長悇憛而增痛憎􅙵母之勃屑兮疾鴟鴞之憙哢祗居居其不合兮冀弋獲焉靡中汎曾波之溶溢兮穿魁堆之幽洞詞纚纚而永日兮覺乃悟其為夢神瞀亂以馳騖兮庸織路而遘窮行不程古人之茂則兮將倀倀其焉從勿登高山兮勿涉流水之浺瀜余初有成説兮展紃紃而可崇曰孰董義而苦特兮疇珮仁而苦同蒸蒙之昧明兮曾纖繋乎厥躬鳯皇翀于蓬陼兮蔑鳩寄乎苕叢爰翺翔其各適兮覺區宇之矇矇眡彼黨之回遹兮工喔咿與儒兒㑋獨修此好顔兮蹇瘏瘁而忸怩余生耦彼佌佌兮黽練要而自覗苟株繩墨以弗跌兮孰黕㸃而汙之覽稠木之飃芳兮亦各膺夫茂時無賤桃華之穠郁兮亦無妒喬松之後衰薫風不可數被兮孰枳塗而長治賓時俗其過苛兮惡在葛天之可居聊􅀈􅀈以媮適兮勿怦怦焉躊躇剪㽦㽦之蒿徑兮葺硜硜之故廬登逴逴之葯房兮望蠡蠡之芷閭及余年之屈橋兮滋莞藭以扶疎㡬竢時而充佩兮垂長褏之虚徐仰余陞皇之赫戲兮俛余御夫䕫魖彼謰謱之為蠆兮余偕行而􅂒􅂒借㕓于埃垢兮寗庇景于華胥憂永路之坦坦兮不愁嶰壑之沮洳願正䇿而孟晉兮長無負此居諸亂曰流光迅徂汨前驅兮律崛遄征勿踟蹰兮十琢九置喪良㻌兮目長足短成凡夫兮髙薄秋旻闞闉闍兮哫訾㗚斯羣鵱鷜兮衆不可户誅兮刻自掫兮神灑灑兮將與天俱兮離思賦并序乙卯春季家大人北之文安時序如流忽爾觱烈離思耿耿爰造斯篇情而不文亦聊以自攄也辭曰憶春陽之恢台兮擥垂楊之青青將余親于江臯兮忳余行其竛竮數辟咡余頫詔兮逝將去此而遐征各􅍵􅍵其弗懌兮中倉兄而難平陟巉巗以周覽兮覩大江之滔滔道曼曼其靡極兮愾磳􅥁之怒濤恍齊魯之在望兮迷䬝䫻之颾颾蓱島汨其浮沒兮衝風動夫布袍意徘徊而罷眺兮步徙倚乎彼􅀈勉商畧江山之竒勝兮志奄奄其不豪載宿宿以俶裝兮歸者先解維椉潮水之迅駛兮撫中心而不夷願及行之未逺兮更壹見而致辭計淹留其終别兮强自割而遂馳道晉陵之殷轔兮踰姑蘇之漫爛出新詩于輕箑兮唫數章而永歎涕霪霪其若霰兮神溶溶而無畔馮惆悵以獨返兮癙憂集而悺悺既傷兒之懐親兮重傷親之念兒戒歸櫂令遄發兮還三復而眡之匪無則言以自壯兮寫中曲乎兩眉孰有恨而非别兮孰有别而不思佯婆娑其媮樂兮各不言而相知羌萎約以自廢兮憐風日之凄其既駕檜檝兮臨迥道之三千歸期勿可道兮行逺緜乎嵗年肇發棹于吳㑹兮轄將弛乎幽燕遘女魃之儇舞兮路迍邅而不前桃李摽落以遒盡兮榴火歕而復然頃艾虎其縈懐兮又聞江南之采蓮踆烏不可與儷偕兮艸木芸芸其屢遷傷征途之躑躅兮忽涕泗之流㳬石圻沸焦煙兮望錢塘而駐斾蹈赤坂之赫威兮蹇傍徨以賴䟺欻悐悐其若撼兮懐余親而長嘅去衡泌之肅泠兮服頑沙之颺􅙟荃不堪此藴隆兮矧羈旅之狼狽臆怫鬰以繚悷兮恒假寐而獨悕惚忻忻其承顔兮或髣髴乎既歸盱余目而莫覿兮羌厭浥其漬幃每戃慌以竟日兮留夢境而弗違雁翩翩南翺翔兮寄兒以新稾憎世路之䨧曀兮鳴吾鼎之為寳鱣鯨裁于螻蟻兮虎豹吼而當道鳯凰羾乎天門兮覽九苞其猶未保挾蓬矢無肅心兮徒傷謀生之艸艸兒願及年之方將兮懐夜光而粥之薫椒桂與木蘭兮輯羽翠之陸離苟善賈其可􅀈兮將良弓以為箕出門遘夫文窮兮羣衆兆而見嗤送裘馬于五陵兮什敝貂而自私天實搆此西山之局兮詎賁獲之可為忳愁約以侘傺兮志逴逴其俞亢塊獨處此窮簷兮倚斜陽而四望感嚴威之觱發兮俄飈涌以跳逷女機杼而士唫兮幸家人之無恙日坎坎其育鞠兮獨有行乎四方俱昕夕而匪所睼兮知永懐夫故鄉跂游雲以攬涕兮霑余袂其浪浪亂曰人生孰無别離兮恃来者之可期㓜不誦夫甫田兮曷怛怛其相思凛秋賦夫安得陟高山之巔而長嘯兮傾壹鬱之肺腸秋氣蕭索以嵺廓兮天地慘澹其不光山川為之改色兮百艸替而焜黄余渺渺若有所離别兮懐帝子于瀟湘善乎秦客之言秋也蒹葭蒼蒼白露為霜所謂伊人在水一方夫臨流有煙波之嘅兮懐人虚秋蘭之佩徒悵望而無際兮目浮雲之黮䨴凄其兮若紅顔夭折而遺芳寂寥兮若病子顦顇而相對願駕木蘭之輕檝兮汜􅢨􅡰之鴻波采江側之拒霜兮搴木末之薜蘿怨予美之不返兮抒慍惀而獨歌吁嗟乎蒹葭蒼蒼兮白露未晞安非此凛秋兮怊悵怳其奚之撫枝條之菸邑兮被長風之颸颸唫王粲登樓之賦誦宋玉搖落之辭悲莫悲兮寒鴉之哀逝慘莫慘兮夕曛之熹㣲當此之辰雖戚儔嬉嬉其朋悦兮顝若惆悵而懐歸爾其銷離憂于罍斚冀湛湎以怡情酒酣慷慨起步中庭仰停雲之偃蹇聴孤雁之流聲覽籬菊之萎薾憐當日之秀榮則又徘徊徙倚㦧惻横生吁嗟乎人心不能為木石兮余將何以為情茅簷賦闉都之北酒帘之西有扉晝扃蛩吟鳥啼籬逕濔迤詰詘旁蹊臥板橋而如帶嵸樛木以扶疎繄小樓之容膝卜素心而僦居愛緑綺之静好懐青藜于古初可風可月我圖我書每訢訢其欲笑吐幽葩而自攄入披翫兮黄庭出搴芳兮蓀芷忽落英之盈褏驚茅屋之麗靡引蓬壺之細流亦濺濺而瀰瀰啓紙疏以長眺撫女墻而獨喜抱良辰之竒懐送行雲而如駛爾乃三復隰桑適聞叩門或鼓荻秋之枻或攜楓谿之綸既風輕而煙暖兼芋菽之不貧擷澤葵掇青蒓呼雛樹巔問酒鄰人悦余美之媞媞舞長袂之蹲蹲競孟晉而迨逺導懿躅以相揗于是衡門之下幽人儴佯敗瓦頽壁蘭香茝芳斜陽小鳥遙林蒼蒼觸目懽賞便姗翺翔若夫拒霜霝亂楓林摽紅疎櫺自鳴切切艸蟲則乃放柴關泝歸􅀈上髙丘瞰長空秋旻曠兮泬寥椉彤雲兮無窮懐湘江之㵆涆駕洞庭之秋風思眇眇以遐舉覺天地之􅌑瓏時焉石瀨腹堅百卉霣折日暖墻隈隴裒剩雪手枕殘帙鶉衣百結短櫩無風酒酣耳熱又胡羡乎寒江之瀇潒寒山之嵽嵲消搖容與兹樂實奢蓬窻圭竇水欹㟁斜聴曉冰之響裂呀空谷之谽谺落霞孤鶩枯木寒鴉春風蚤戾到我梅花誰歟居者或曰此伐檀君子之家閒居賦并序余自解識字即志四方年既二十亦云壯矣乃足跡不能徧千里而又客處以為常夫古人閉門讀書則有仲舒遨遊山川則有子長悠悠閒居余何為者也賦曰空庭晝永恬浪風驕秋深多慨嵗暮無聊撫几席之優游覽林樹之招搖感暇日之匪易聊攬物而逍遙其居則柴門晃朗茨宇廢蕪盤渦浴鴨古壁纒蛛艸芳木榮羅生室隅其木則緑楊榆莢青杉絳桃桂枝梅幹詘曲嶕嶢其艸則苔碧蘿翠蘇紫苕黄淡竹青青菰蒲蒼蒼其花卉則西膚娬媚䓿萏清芬芙蓉幽麗叢菊繽紛其書則陸藏鄴架出斆米船蟲註鳥譯魚貫虵連藍本麟史艸薙狐禪其朋儔則蹁蹮婆娑晤對汝我鎮日静嬉竟夕匡坐灑落斯臧方毅亦可其僮僕則蓬頭突鬢短衫蒙戎冥心蹇舌􅀈屼倥􅀈漏深秉燭睡眼朦矓其樂而遊則野袍翩翩駕言登髙漪痕新長村郭輕刀歸来揚揚鼓簧舞翿其風雨則輯楮糊窻展册獨觀豁兮目曠寂兮意殫思入而親春風蕙蘭其雪則徧啓軒廡擁爐兀坐飈轉霰迴衝幬撼座快劇欲狂憬頑豎惰其月則天空儷水堦白疑霜樹影蕭疎中庭四望偃息不能長夜仿偟其攡辭則㓜𦕈竊闚顯出涉趣埶藉寒稍機隨驚兎時采菊悠然時天潢倒注其飲則量齊玉局興邁無功愞浮蕉葉勇涸荷筒穨然獨酣茅閤從容其歌則慷慨激昂馮弔曩事伉直逢顛佞諛獲志朗嘯當哭徘徊不置其勌而夢則彳于于徐違風就日娛境屢遷任彼紓疾或平濤潏湟或層嵓嵽嵲或淋灕􅫈斚或從横瑧珌或青藜歕爓或赤松授術或結趺少林或攜登太室其蘧蘧然覺也則短檐不埽敗樗數椽鄰雞樹鳥景物依然于是悄然作而歎曰雲移莎岸天覆晴川矯首遐眺風光去年勝衣若干淹滯江南遲遲長日誠何以堪定志賦并序書曰詩言志班固曰賦者古詩之流也夫余遨墳典之囿遊先喆之衢舎魯奚適矣顧衆兆馮生各有攸騖根柢未定見物斯遷思以纂至人之餘徽繕厥初之貞性是北行而南其轅也必不㡬矣老子曰不見可欲使心不亂蓋亦自閑之善䇿與雖然土之塊然也遇水則淫膏之澄然也遇炎則沸程伯子之喜獵而復萌于十二年之後也不見其可恃哉陸行而語人曰善没善没無徴也浮江河而不波則真善没者矣袖手而語人曰竒勇竒勇無徴也舉九鼎而不䃍則真竒勇者矣尸子中黄伯曰余左執太行之獶而右搏雕虎惟象之未與吾心試焉試云者蓋假以自徵者也余故騁辭乎滔蕩之場肆情乎荒唐之域窮態極變嗜慾畢陳明晰者惽眩貞確者淫放忽忽欲身試焉已迺收其佚思返乎芳躅澹然無營屹乎其不可移斯以為定志之章習非吳粤水亦不可浮也力非賁諸鼎亦不可舉也志定于既試之後者君子所以可輕試也志定于未試之先者君子所以不輕試也孟陬之旦抽斯言以為繩余其不摯勵焉其辭曰嵗協洽之始旦兮氣凛冽以凄淚雪霏霏其䬙曳兮風漎漎而鳴厲庭木菸邑而無色兮春陽其猶未戾相烝族之嬉嬉兮各怡懌乎改嵗輪蓋嵒嵒其雲䕃兮閭閻闐噎而隂㙠士簇裘馬之劇觀兮女飾媮婧之纖製笙鼓嘈雜而狂㑹兮枌栱翕赩以增麗彼時俗其固然兮亦良辰之可憓忳邑邑余紆軫兮獨鬱結而尠懽攝提遷以遄邁兮汨赴阪之迴湍昨總角而象舞兮俄岌岌之髙冠豈不諒晏虞之為適兮時曷可乎久盤昕皇皇其遶柱兮夕抱膝而永歎卭前修以内恧兮增烈烈之重寒彼騄駬之咫角兮夙雄眄乎千里干將脱鉶而契鐡兮曾何需夫鈍砥禹龍躍而雲滃兮瑜虎嘯而颷起寧華髪之墮巔兮忽剡鋒之迅駛昔魏武誡鄄城兮道頓丘之無遺矢雖嶮夫非攸慕兮已森森堅其壁壘豪傑各有所締搆兮疇不孟晉而惜晷咨菲躬之溝猶兮足䠧跱而不前􅀈瑋迹而婁奮兮怵長路之緜緜曰姱節其可好兮羌發軔于髫年窳氓奢覦而楛耕兮莠驕驕于甫田紃余生之步履兮洵重􅀈而貤諐辟仄徑之幽隘兮杳窱而不覩天翫媚俗之追曲兮羣睮睮以嬋嬛文好顔以為嬧兮匪余心焉攸便遂肆志而横騖兮敖廷頲而不遷謂彼原我獧兮蹇宜遘此迍邅盍反性命之眩湣兮我與彼其俱然湛芳蘭以鹿醢兮越三年而易馬或厥根之漸滫兮僉委寘于中野吾誹蘭之不馥兮豈芳艸之尤也謂九畹可勿樹兮充幃之羞也滋德行以竣楙兮願及年之方華辰漸冉其逾逝兮愳霜雪之浸加謇余陗急以成性兮羌心疾乎浮夸任戇瞀之孑孑兮瑜不琢而為瑕繁弱之洞堅兮資排檠而體正儀狀曄其齊觀兮庚増飾而俞靚夐前喆之不羣兮聿矻矻其抏精疇怠荒而隆伐兮孰消搖而躋聖豐墻墝下兮恐行潦之陁崩棻林淺根以浮垓兮猋風吼而上扔蒙鳩編髪以為室兮奄焉喪其所馮馮生緫緫其靡定兮展余心之所懲余既懐此𦕈思兮冀霅焉豁其蒙蔽修途迢遞而亡鄂兮余乃夢夢其未㫼紉留夷以為帶兮緝胡繩而為帨願衆芳其繁廡兮遻蔡莽之螫㓹兹咫尺吾弗曙兮矧出門之數蹶焉猶夷而廓處兮將謭謭以永世誕周流覽觀以財擇兮余乃知吾所憩脂余車于家巷兮秣余馬于道周亂余輿兮容裔攬余􅔗兮夷猶神􅓥􅓥以惚慌兮行極目乎中州睇闤闠之囂擾兮各營營而有求津要襍沓以叢顇兮紛勺濼其綢繆焱焱聲燄之燀爀兮訇訇轂轍之殷稠遭時而適志兮競侉奓以忘憂聳層臺之將將兮駢雲屋之爛爛蘭橑􅕜㙷以交錯兮桂棟曼衍而炳煥飛檐􅟬崿其矯起兮彤軒爽嵦而晧旰絳雯斐亹以翼櫺兮杲日射疏而粲奐砥室繽紛其致飾兮琦璜雜璘珉而零亂目迷青葱與赬素兮曾莫殫其珍翫美參霄之臺榭兮又羅花木之芬芳薫風習習其拂袂兮桃李爭艷于春陽憐芍藥之妖麗兮佩蕙茝之幽香楉榴噴而然堦兮汜䓿萏于池䧜夫容綽約其臨流兮菊英矯潔而凌霜梅抗雪而揚葩兮百卉不敢與翓􅀈周亭渚而徧眺兮爛菲菲其流光余聊紀夫嬗序兮展更僕而不可詳既搴攬之娱情兮又杯斚之好合淥醽㪺以醻酢兮蘭肴烝而䢔遝熟熊蹯之鮮膩兮烹豹胎之煜爚旅臛􅏲及肥腱兮兼炮羔與雞􅌜揉黄蘇與露茹兮調胾羮而先鬻醳醳其蟻浮兮分牙籌而司酌衎芳顔之㣲酡兮忽女樂之雜敶竽瑟淫淫其繁㑹兮賁鼔震動而鼝鼝新聲參差以迭奏兮謳與歈而交嚚衽褊􅝆若交竿兮樂妙舞之􅀈􅀈華袿飄颻其從風兮羅襪躡蹀而逡巡儵鴻翥而鳬沒兮曳繭緒之紃紃歌與舞既酣悦兮客酕醄其徑醉蘭膏熠燿其逾明兮紅妝陿坐而無次嫮眼眳其騰光兮聨曾波而遺視雜杜若于輕裾兮握纖手之芳膩眉連娟以繚繞兮腰嫽妙以偠媚申厥好于九秋兮勿隃情以遐棄魂忽忽以搖蕩兮孰桑門與展季窮聲色之湛樂兮羨滄海之無期聊遨遊以媮快兮俟河清乎㡬時余聆兹靡靡之𤨏説兮忽亢志而長思初旦旦有成言兮曷回畔而自嬉不見金谷之遘禍兮誰樂極而不衰士幼服先民之烱戒兮咸敦朂以自持出艷繁華之可耆兮意黙黙其寖移朝愍黨人之湎没兮暮褰裳而就之還訕介士之特立兮長顑頷其何為曰吾豈涉而遽汨兮聊與之逶迤醉夫自為醒兮旁觀囅然而相嗤余不忍厥躬為嘗試兮夫安能乎留兹邅吾道以逺逝兮正余䇿乎徂征僕夫喃喃其訽誶兮馬裴回而不行既舒節而遂晉兮相余心之所明苟蠛蠓其可浮兮詎駊騀乎丘陵枯槁匪足尚兮亦云企夫修能去琢蠡之既逺兮將倀倀其焉憑歴闉闍而諦瓜見兮余馬且焉止息何土習之韰惈兮云游俠之所域好傾身而締交兮集輕訬之竒客美賓從之萋苴兮張威聲之赫奕冠劒紛紛其從衡兮珠履晶瑩以千百鳩俊桀以巷飲兮笑肝膽之不隔雙耳熱而長嘯兮須髯豎而如㦸或尋橦與扛鼎兮或投壺而呼白既蹴踘以澷戲兮又分偶而抃射窮鄱陽之暴謔兮輕千金之趙璧攬於菟之重裘兮槖蠭門之烏號左夏服之勁箭兮右歩光之霜刀縱晨風以馳獵兮燎千里之蓬蒿颺礫飛而蔽天兮豺狼驚而怒嘷氣歕勃其不慴兮拉䖑虪于窮臯踏深雪而夜歸兮呼美酒而烹羔躍馬顧眄兮誇一世之雄豪召屠亥使麾鎚兮呼漸離使擊筑倉海忽其碭駴兮慶卿因之痛哭持牛炙而啗政兮解佩劒而贈育朱家嘻布之髠首兮要離誚訢之眇目招原朱于二陵兮各意氣之相逐忽中宵叩門兮號胸臆之不平柄人哮闞兮姦人猙獰戚人肆毒兮生人食盟中憤憤其憑怒兮訝烈熖之横生彈丸發而巨讐殛兮杳莫跡其姓名抑恂恂罔德色兮沒齒而不自鳴嗟夫人之慷慨兮殆燕趙之風也亶犖犖其磊砢兮然狙獪之雄也睚眦蠆芥兮忽肆諸路隅交游罕擇兮禍發于錙銖萬乘恣其凌轢兮悲厥終之可虞馳余輿吾遄發兮羌去去而弗顧士䞴趟以跅弛兮鮮不軼乎常度壹睢盱亡檢柙兮良古人之所惡志怛矯以亢厲兮覽八極而尚羊曩蓬矢之俶縣兮肇有役乎四方長湛鬱其弗舒兮偕秋艸而萎黄超拂㧞以遐騁兮牧余駟于邉場戈鋋林立以彗雲兮旟旐飛颺而拂蒼散貔貅于虎落兮聴鳴鐎而夜愴彼越甲鳴吾君兮竊憤醜徒之跳踉壯夫生而燕頷兮死馬革其奚傷震鬱怫以渫怒兮目閃爍而揚光吾願上闗威弧兮落曾𤣥之欃槍戲下煦煦其挾纊兮又慄慄如負霜士炰烋而鏖戰兮曾莫抗其顔行鯨鯢搏以成觀兮豺虎讋而摧藏垣墉絙于雲外兮遹威名與俱長帝赫赫詔入闗兮奏膚績而肆覲閤棘偨傂其前列兮鉦鼓嘈囐而靁振猛士騰躍以彪悍兮𤣥虬沛艾而奮進佩長劒之陸離兮肘纍纍之金印天子嘉乃成烈兮躬敬勞其懋藎玉厯頒于白蘭兮罽賓懾而内賮東震日域之景國兮西壓月􅒸之末𦙍陋驃衛之犂磔兮祗黷武而開釁虎賁罔所庸鞭撻兮屹長城之坐鎮余既難夫稾馘兮展永慕此崇功意飛揚不可以戢兮恐性行之瞢瞢毒龍矯其上騰兮海水沸而洶溶肆虓虎之䟦扈兮漫躑躅于西東憑不顧夫罿罻兮奄抱慟于良弓或葅醢之幸脱兮引猿臂而自雄顧桑榆之夕景兮忽回首而長恫東流逝以不返兮悵偉伐之俱空壯心頽于麟閣兮託逺想于喬松旋余輈以徂往兮朅票然而曾舉棄經營之擾攘兮求真人與之語願令介鳥前驅兮為通言于玉女意眇忽其臨雲兮望三山而延竚朝余發于中土兮夕余税乎丹丘羽人蹁蹮其成羣兮絶雰埃而宣逰郯神明以髙厲兮朋精粹而為儔播蜺蟠之離離兮總虯旄之浮浮攬彗光而為旍兮揭招搖以剹流掣列缺之淫裔兮駕飛廉之颼飀望舒􅀈皎其騰輝兮豐隆砰磷以彪休卬旬始其密邇兮尚神逵之可摎惄戴勝有偭懐兮合羣僊乎好㑹將祝融前效軨兮詔鈎芒使展軑蓐收跮踱以樹旗兮𤣥冥狂趡以綷蓋紛紜鏗鍧轟以輣軋兮雜遝轇轕隱以硠磕烟煴曄煜闐以砏汃兮騤瞿跐豸錯以賴䟺騰驤迭逷瞿以趯踔兮躑躅呌奡矗以濞霈青虬赤螭蹇其夭蟜兮棼棼衝嵸以奔駾忽清霞斕斒其異采兮迓僊侶之雲從揖岐伯暨偓佺兮跽羨門與韓終邀桐柏之王子兮攜南嶽之赤松既招方回于五柞兮又迎葛繇于綏之㵵誰卷巻其緝御兮候金母與木公賓翩翩交集兮於兹焉舉觴屑瑤蘂為餱兮榆瓊靡為糧吸沆瀣為餐兮斟玉醴為漿漱飛泉之㣲液兮咀石菌之華英列如𤓰之巨棗兮采木禾之芬香眷明光之媮娭兮咸欣欣其樂康賓既夷悦兮於兹焉式儛拼湘靈弄瑟兮使馮夷擊鼓子晉吹洞簫兮青娥為戞拊叩昆明之喨筑兮彈雲璈以琚楀歌太霞之妙曲兮裊餘音之縷縷耽清都之節族兮長無極以終古余竊樂此眇界兮逈異乎曩之所陳聲色沉濁以冶湯兮兹獨沕穆而渾淪心漭漭其浩曠兮憺委佗以怡神駕白鹿余濯髪兮乘黄鶴余晞身載青鳥陞閶闔兮狎紫鸞之馴馴登閬風又㣲閭兮儷無始而為隣餐六氣以遐騖兮焉熊經與鳥申驟噫鬱余怊悵兮悲滄桑之數變木羊躓而一足兮紙驢碎而成片石橋澩灂以灑沬兮銅柱垝圾其如綫紀崦嵫與暘谷兮經咄嗟而忽徧竊聞令威歸遼兮蘇眈返乎故鄄屋廬夷為鹿場兮椒壁荒而存壂白楊蕭蕭其嘶風兮枯柏隂翳以連巻髫豎彎弓以彈射兮爰飛鳴而悲唁展悽惻其若兹兮又何長生之足羨徐生入海兮五利以為師攀龍髯之蜿蜿兮射魚鬛之狋狋雞犬不獲偕升兮卒賢聖之見咍豈徒誚其尠成兮缺心呰其貪癡道坦坦其平廣兮罔矞怪以炫竒靈臺淈滑以不守兮胥日用而抎之余焉庸此詭誕兮祗貿貿其狂馳泝蓬壺以迅征兮䇿余服乎吾將反逕有俴而難循兮理有訬而匪逺羌昕夕與食寢兮余乃衺騖而旁遁速黽勉以遵路兮趁曜靈之未晚既律崛其遄歸兮弛吾轍乎故閭彼紜紜祗攪心兮冲舉又夸虚攝浮氛以復正兮屏萬慮而獨居束汎剽之纖慧兮信卬志于古初羌焠掌而𣙜精兮密追琢其瑹璵逄萌視恐或霣兮敢慆慢而趺諸螾罔爪牙之犀利兮穴槁壒而為居蟹二螯又八跪兮顧曾螾之弗如余乃寤夫繕修兮厪夢寐之拮据椓中貞為基兮葺禮儀為廬築沉深為㝠兮豁神識為疏蹇憔悴卬弗憚兮跂往聖之髙衢慜余質之凡駑兮單千百猶未迨望平原而勇趨兮猝遭躓于峞􅐑意蹙蹙若有所懲㣻兮忽又事去而忘改漫搖筆以雄視兮矜文章之五采綜綺縟之粲粲兮暎冰壺之皚皚啓汲冢及酉巖兮固菁華之所在潄羣芳之津潤兮振麗藻而竒侅頤墳索以諠形兮雖蓬垢其弗悔謂顓顓喪厥志兮戎相尋于罔殆閔醯雞而發覆兮徒與鼃乎語海余願斂華而為實兮先樹本以為華扈尼訓之暀暀兮株繩墨而不􅀢剪蓬艸勿繁翳兮俾昭揭于坦涂循茂則而忽悟兮超永逸乎渨窪曦皦皦其中天兮何隨侯之照車堅卓犖之貞性兮又善劑于中龢剡靈光其内葆兮允融洩以婆娑亡憤疾流俗兮局蹐為小儒蠖詘曲以局身兮蟬戢翼而長臞彼鷽鳩之諓陋兮惟榆枋之與俱勿恢張蟲伎兮凌厲乎九區鳥惡美羽句啄兮魚畏哆口而垂腴憫文豹之来田兮詎華采之不殊鳯凰翔而翾翾兮應龍陟皇之赫戲闚芒芴以隱見兮妙變化于有無瞻羣族莫絜迒兮諶卬志之攸圖筴夸父之捷步兮堙瀚海而摶塗矢余願罔卻顧兮羌弗病其為迂亶厥躬無離訧兮吾獨征乎又何需歌曰風慽慽兮薄寒雪翁􅡇兮萎柯偭辰光兮迅邁蹇蹣跚兮蹉跎閉衡門兮浩歎疚余心兮實多載歌曰遊思盪兮激卬倀踟蹰兮徬徨涉嶮谿兮惝怳眡經塗兮周詳誰與余兮同好余將往兮褰裳茅簷集巻一
